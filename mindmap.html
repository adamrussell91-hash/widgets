<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neuroanatomy and Neuroscience Nomenclature Mind Map</title>
  <style>
    :root {
      --bg: #050b15;
      --bg2: #0a1425;
      --ink: #edf7ff;
      --soft: #b8c7d8;
      --faint: #7f91a7;
      --card: rgba(13, 25, 42, 0.82);
      --card2: rgba(19, 36, 57, 0.92);
      --stroke: rgba(255,255,255,0.13);
      --teal: #7de8dc;
      --blue: #91bcff;
      --sage: #a8ddb3;
      --rose: #ffb5ac;
      --gold: #efd06f;
      --violet: #c6b7ff;
      --line: rgba(125, 232, 220, 0.52);
      --lineBright: rgba(158, 255, 242, 0.96);
      --shadow: 0 28px 90px rgba(0, 0, 0, 0.42);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 14% 16%, rgba(125, 232, 220, 0.13), transparent 30%),
        radial-gradient(circle at 78% 18%, rgba(198, 183, 255, 0.12), transparent 28%),
        radial-gradient(circle at 70% 82%, rgba(239, 208, 111, 0.08), transparent 34%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body:before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(255,255,255,0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.035) 1px, transparent 1px);
      background-size: 42px 42px;
      mask-image: radial-gradient(circle at center, black, transparent 78%);
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 420px;
      gap: 18px;
      padding: 18px;
    }

    .stage, .side {
      border: 1px solid var(--stroke);
      background: rgba(7, 16, 29, 0.70);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      overflow: hidden;
    }

    .stage {
      position: relative;
      min-width: 0;
    }

    .toolbar {
      position: absolute;
      z-index: 80;
      left: 18px;
      right: 18px;
      top: 18px;
      display: grid;
      grid-template-columns: minmax(320px, 500px) auto;
      gap: 12px;
      pointer-events: none;
    }

    .hero, .controls, .miniMap, .toast {
      border: 1px solid rgba(255,255,255,0.13);
      background: rgba(10, 22, 38, 0.78);
      backdrop-filter: blur(22px);
      box-shadow: 0 18px 50px rgba(0,0,0,0.32);
      border-radius: 22px;
      pointer-events: auto;
    }

    .hero {
      padding: 16px 18px;
    }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--soft);
      font-size: 16px;
      line-height: 1.35;
    }

    .controls {
      justify-self: end;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      flex-wrap: wrap;
      max-width: 720px;
    }

    button, input { font: inherit; }

    .search {
      width: 280px;
      border: 1px solid rgba(255,255,255,0.16);
      background: rgba(255,255,255,0.075);
      color: var(--ink);
      outline: none;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 17px;
    }

    .search:focus {
      border-color: rgba(125,232,220,0.70);
      box-shadow: 0 0 0 3px rgba(125,232,220,0.10);
    }

    .btn {
      border: 1px solid rgba(255,255,255,0.14);
      background: rgba(255,255,255,0.075);
      color: var(--ink);
      border-radius: 16px;
      padding: 11px 13px;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border 180ms ease, box-shadow 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255,255,255,0.12);
      border-color: rgba(125,232,220,0.48);
    }

    .btn.active {
      background: rgba(125,232,220,0.16);
      border-color: rgba(125,232,220,0.58);
      color: #dffffb;
    }

    .viewport {
      position: absolute;
      inset: 0;
      cursor: grab;
      touch-action: none;
    }

    .viewport.dragging { cursor: grabbing; }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .mapLayer {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      transition: transform 620ms cubic-bezier(.2, .9, .18, 1);
    }

    #links { position: absolute; inset: 0; }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 3.4;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      filter: drop-shadow(0 0 10px rgba(125,232,220,0.12));
      transition: stroke-dashoffset 780ms cubic-bezier(.2, .9, .18, 1), opacity 420ms ease, stroke 420ms ease, stroke-width 420ms ease;
    }

    .link.visible { stroke-dashoffset: 0; opacity: 1; }
    .link.hiddenLine { stroke-dashoffset: var(--len); opacity: 0; }
    .link.dim { opacity: 0.10; }
    .link.hot { stroke: var(--lineBright); stroke-width: 5.2; opacity: 1; }

    .node {
      position: absolute;
      transform: translate(-50%, -50%) scale(0.86);
      opacity: 0;
      min-width: 260px;
      max-width: 360px;
      border: 1px solid rgba(255,255,255,0.14);
      color: var(--ink);
      border-radius: 22px;
      padding: 16px 18px 15px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.10), rgba(255,255,255,0.035)),
        rgba(18, 34, 54, 0.92);
      box-shadow: 0 22px 56px rgba(0,0,0,0.28);
      cursor: pointer;
      user-select: none;
      text-align: left;
      transition:
        transform 560ms cubic-bezier(.2, .9, .18, 1),
        opacity 520ms ease,
        filter 360ms ease,
        border 220ms ease,
        background 220ms ease;
    }

    .node:before {
      content: "";
      position: absolute;
      inset: 0;
      border-radius: inherit;
      padding: 1px;
      background: linear-gradient(135deg, rgba(255,255,255,0.26), rgba(255,255,255,0.04));
      mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
      mask-composite: exclude;
      pointer-events: none;
    }

    .node.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .node.gone {
      transform: translate(-50%, -50%) scale(0.84);
      opacity: 0;
      pointer-events: none;
    }

    .node:hover {
      border-color: rgba(125,232,220,0.64);
      background:
        linear-gradient(150deg, rgba(255,255,255,0.14), rgba(255,255,255,0.045)),
        rgba(22, 44, 68, 0.96);
    }

    .node.dim {
      opacity: 0.18;
      filter: saturate(0.35) blur(0.2px);
    }

    .node.hot {
      border-color: rgba(125,232,220,0.95);
      box-shadow: 0 0 0 1px rgba(125,232,220,0.28), 0 24px 62px rgba(0,0,0,0.34);
    }

    .root {
      min-width: 430px;
      padding: 22px 24px;
      background:
        linear-gradient(150deg, rgba(198,183,255,0.18), rgba(125,232,220,0.08)),
        rgba(16, 29, 50, 0.96);
    }

    .branch { min-width: 350px; }
    .sub { min-width: 315px; }
    .leaf { min-width: 285px; }

    .nodeTitle {
      font-size: 20px;
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: -0.015em;
      padding-right: 36px;
    }

    .root .nodeTitle { font-size: 27px; }
    .branch .nodeTitle { font-size: 23px; }

    .micro {
      margin-top: 9px;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.35;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .bead {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--teal);
      box-shadow: 0 0 18px rgba(125,232,220,0.78);
      flex: 0 0 auto;
    }

    [data-family="technology"] .bead { background: var(--blue); box-shadow: 0 0 18px rgba(145,188,255,0.78); }
    [data-family="terminology"] .bead { background: var(--sage); box-shadow: 0 0 18px rgba(168,221,179,0.78); }
    [data-family="eponyms"] .bead { background: var(--rose); box-shadow: 0 0 18px rgba(255,181,172,0.78); }
    [data-family="institution"] .bead { background: var(--gold); box-shadow: 0 0 18px rgba(239,208,111,0.78); }

    .toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(255,255,255,0.09);
      color: var(--ink);
      font-size: 20px;
      font-weight: 950;
      transition: transform 300ms ease, background 300ms ease;
    }

    .node.open .toggle {
      transform: rotate(180deg);
      background: rgba(125,232,220,0.16);
    }

    .badgeRow {
      position: absolute;
      z-index: 70;
      left: 18px;
      bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 760px;
    }

    .badge {
      border: 1px solid rgba(255,255,255,0.12);
      background: rgba(10, 22, 38, 0.72);
      backdrop-filter: blur(14px);
      color: var(--soft);
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 15px;
      line-height: 1.2;
    }

    .side {
      padding: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
    }

    .sideTop {
      padding: 22px;
      border-bottom: 1px solid rgba(255,255,255,0.10);
      background:
        radial-gradient(circle at 20% 20%, rgba(125,232,220,0.12), transparent 36%),
        rgba(255,255,255,0.025);
    }

    .sideBody {
      padding: 22px;
      overflow: auto;
    }

    .tag {
      display: inline-flex;
      margin: 0 0 14px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(125,232,220,0.22);
      color: var(--teal);
      background: rgba(125,232,220,0.08);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 950;
    }

    .side h2 {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .side p {
      margin: 0 0 18px;
      color: #dce9f7;
      font-size: 19px;
      line-height: 1.55;
    }

    .sectionTitle {
      margin: 24px 0 10px;
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      font-weight: 950;
    }

    .eduCard {
      border: 1px solid rgba(255,255,255,0.11);
      background: rgba(255,255,255,0.055);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .eduCard strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 18px;
    }

    .eduCard span {
      color: var(--soft);
      font-size: 17px;
      line-height: 1.48;
    }

    .crumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .crumb {
      color: var(--soft);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.10);
      border-radius: 999px;
      padding: 7px 9px;
      font-size: 13px;
    }

    .quiz {
      margin-top: 18px;
      border: 1px solid rgba(239,208,111,0.18);
      background: rgba(239,208,111,0.07);
      border-radius: 20px;
      padding: 16px;
    }

    .quiz .q {
      color: var(--gold);
      font-size: 13px;
      letter-spacing: 0.10em;
      font-weight: 950;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    mark {
      background: rgba(239,208,111,0.30);
      color: var(--ink);
      padding: 0 3px;
      border-radius: 5px;
    }

    @media (max-width: 1150px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 340px;
      }

      .toolbar {
        grid-template-columns: 1fr;
      }

      .controls {
        justify-self: start;
        max-width: none;
      }

      .search { width: 220px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Interactive neuroscience mind map">
      <div class="toolbar">
        <div class="hero">
          <p class="eyebrow">Interactive study map</p>
          <h1>Neuroscience Nomenclature</h1>
          <p class="subtitle">Trace how brain language moves through anatomy, metaphor, ethics, and standardisation.</p>
        </div>
        <div class="controls">
          <input id="search" class="search" placeholder="Search the map" aria-label="Search map" />
          <button class="btn" id="zoomOut">−</button>
          <button class="btn" id="zoomIn">+</button>
          <button class="btn" id="fit">Fit</button>
          <button class="btn" id="focus">Focus</button>
          <button class="btn" id="expandAll">Expand all</button>
          <button class="btn" id="collapseAll">Collapse</button>
        </div>
      </div>

      <div id="viewport" class="viewport">
        <svg aria-hidden="true"><g id="links" class="mapLayer"></g></svg>
        <div id="nodes" class="mapLayer"></div>
      </div>

      <div class="badgeRow">
        <span class="badge">Click nodes to expand</span>
        <span class="badge">Hover to trace pathways</span>
        <span class="badge">Scroll to zoom</span>
        <span class="badge">Drag to pan</span>
      </div>
    </section>

    <aside class="side" aria-live="polite">
      <div class="sideTop" id="sideTop"></div>
      <div class="sideBody" id="sideBody"></div>
    </aside>
  </main>

  <script>
    const data = {
      id: "root",
      title: "Neuroanatomy and Neuroscience Nomenclature",
      family: "overview",
      type: "Course map",
      text: "This map shows how neuroscience language is built from historical anatomy, cultural metaphor, contested naming practices, and modern standards.",
      learn: "Scientific vocabulary is not neutral. Names carry assumptions about function, history, status, and whose work is recognised.",
      question: "When does a name help understanding, and when does it hide more than it explains?",
      children: [
        {
          id: "technology",
          title: "The Technology Metaphor",
          family: "technology",
          type: "Metaphor pathway",
          text: "Neuroscience often borrows language from the dominant technologies of an era. These metaphors make invisible processes easier to picture, but they shape interpretation.",
          learn: "Metaphors are useful teaching tools, but they also set limits. A brain is not a machine, computer, or communications network in a literal sense.",
          question: "Which metaphor gives the clearest explanation without oversimplifying the brain?",
          children: [
            { id: "historical", title: "Historical Origins", family: "technology", type: "Historical frame", text: "Older anatomical explanation drew on architecture, machinery, and spiritual philosophy.", learn: "Early terms reveal how anatomy was interpreted before modern neuroscience existed.", question: "What does each older metaphor make visible or invisible?", children: [
              { id: "vesalius", title: "Vesalius: Mechanical and Fortification", family: "technology", type: "Example", text: "Vesalius helped shift anatomy towards observation, while description still used structural language such as walls, chambers, and defences.", learn: "Anatomical language often begins with visible structure before later being linked to function.", question: "How does structural language influence how students picture the body?" },
              { id: "harvey", title: "Harvey: Heart as Pump", family: "technology", type: "Example", text: "Harvey’s explanation of circulation made mechanical comparison central. The heart became easier to understand through the pump model.", learn: "A good metaphor helps explain function, but it does not capture every feature of living tissue.", question: "Why is the pump metaphor so memorable?" },
              { id: "descartes", title: "Descartes: Seat of the Soul", family: "technology", type: "Example", text: "Descartes linked mind, body, and soul through anatomical speculation, especially around the pineal gland.", learn: "Some terms preserve outdated theories because language often lasts longer than the theory behind it.", question: "Should outdated concepts stay in teaching if they have historical value?" }
            ]},
            { id: "communications", title: "Modern Communications", family: "technology", type: "Modern metaphor", text: "Modern neuroscience often describes neural activity as communication. Neurons encode, transmit, route, and output information.", learn: "Communication language makes neural systems easier to model, especially when describing networks and signalling.", question: "Where does communication language become too neat for biological systems?", children: [
              { id: "encoding", title: "Encoding and Transmission", family: "technology", type: "Key term", text: "Neural activity is often described as information being encoded and transmitted through signals.", learn: "This supports clear explanation of sensory processing, memory, and motor output.", question: "What is gained by calling neural activity information?" },
              { id: "networks", title: "Neural Networks", family: "technology", type: "Key term", text: "Network language describes distributed activity, connectivity, and system level processing.", learn: "This helps students move beyond single structure explanations towards system level thinking.", question: "How does network thinking change the way we explain learning?" },
              { id: "encryption", title: "Encryption and Output", family: "technology", type: "Extension", text: "Terms such as decoding, signal, and output show how computational and communications models influence neuroscience.", learn: "The language suggests hidden codes, which is useful but sometimes overstates precision.", question: "Does decoding language make cognition sound too mechanical?" }
            ]},
            { id: "computing", title: "Computing Metaphors", family: "technology", type: "Modern metaphor", text: "Computing metaphors frame the brain as a system of storage, processing, programming, and error correction.", learn: "These terms are vivid and teachable, but biological memory and plasticity are more dynamic than digital files.", question: "Which brain processes resist computer comparison?", children: [
              { id: "reprogramming", title: "Reprogramming Circuits", family: "technology", type: "Applied language", text: "Clinical and educational language often describes intervention as rewiring or reprogramming circuits.", learn: "This language conveys change and plasticity, but it can make learning sound more direct than it is.", question: "What does reprogramming imply about agency and effort?" },
              { id: "erasing", title: "Hard Drive Erasing", family: "technology", type: "Applied language", text: "Memory is often compared with storage, although biological memory is reconstructed and context sensitive.", learn: "This is useful for beginners but weak for explaining trauma, emotion, and retrieval.", question: "Why is memory not like deleting a file?" },
              { id: "viruses", title: "Infection by Viruses", family: "technology", type: "Applied language", text: "Virus language appears when describing intrusive ideas, spreading patterns, or biological infection.", learn: "Such language is vivid, but it can stigmatise psychological experience if used carelessly.", question: "When does metaphor become harmful?" }
            ]}
          ]
        },
        {
          id: "terminology",
          title: "Evolution of Terminologies",
          family: "terminology",
          type: "Language pathway",
          text: "Many neuroscience terms come from classical languages, shape based naming, early medical traditions, and later reinterpretation.",
          learn: "Naming often begins with analogy. Structures are named because they look like something familiar.",
          question: "Does etymology make terms easier to remember or easier to misunderstand?",
          children: [
            { id: "classical", title: "Classical Roots", family: "terminology", type: "Etymology", text: "Greek and Latin roots gave anatomy a shared scholarly vocabulary. Many labels began as visual comparisons rather than precise scientific explanations.", learn: "Shape based labels help memory, but they rarely explain function by themselves.", question: "What happens when students memorise labels without function?", children: [
              { id: "greeklatin", title: "Greek and Latin Origins", family: "terminology", type: "Origin", text: "Greek and Latin terms gave anatomical naming a formal structure across medical traditions.", learn: "Shared roots supported communication across languages and institutions.", question: "Why did classical language become so durable in science?" },
              { id: "metaphoric", title: "Metaphoric Labels", family: "terminology", type: "Concept", text: "Many anatomical labels compare structures with familiar objects or shapes.", learn: "Metaphoric labels are memory aids, not full explanations.", question: "Which terms in science are really metaphors?" },
              { id: "hippocampus", title: "Hippocampus: Seahorse", family: "terminology", type: "Example", text: "The hippocampus was named through resemblance to a seahorse shape.", learn: "The name is visually memorable, but memory function must be taught separately.", question: "Does the name hippocampus help students understand memory?" },
              { id: "amygdala", title: "Amygdala: Almond", family: "terminology", type: "Example", text: "Amygdala comes from a word meaning almond, reflecting shape based anatomical naming.", learn: "The label captures shape, not the complexity of fear, salience, or emotional learning.", question: "What does the almond metaphor leave out?" }
            ]},
            { id: "thalamus", title: "The Thalamus Journey", family: "terminology", type: "Term history", text: "The thalamus shows how terms travel across languages and meanings before becoming fixed in scientific use.", learn: "A term can shift meaning as it moves across medical traditions, translation, and new anatomical knowledge.", question: "How much history should sit behind a modern scientific label?", children: [
              { id: "galen", title: "Galen: Inner Chamber", family: "terminology", type: "Historical meaning", text: "Older anatomical traditions linked thalamus language with chamber like meanings.", learn: "Spatial language was central because anatomy was first mapped through visible form.", question: "Why do so many anatomical terms sound architectural?" },
              { id: "arabic", title: "Arabic: Canopy or Alcove", family: "terminology", type: "Translation history", text: "Arabic medical translation traditions helped carry and reshape anatomical vocabulary.", learn: "Scientific language is often a chain of translations, not a single clean origin.", question: "How do translation pathways affect scientific authority?" },
              { id: "willis", title: "Willis: Optic Chambers", family: "terminology", type: "Reinterpretation", text: "Willis used terms connected to optic pathways, showing how function and location influenced naming.", learn: "Naming shifted as anatomy became linked to emerging functional theories.", question: "Should function or location dominate anatomical naming?" }
            ]}
          ]
        },
        {
          id: "eponyms",
          title: "Eponyms Debate",
          family: "eponyms",
          type: "Ethics pathway",
          text: "Eponyms honour people by attaching names to discoveries or structures, but they raise questions about accuracy, ethics, memory, and inclusion.",
          learn: "Eponyms are compact, but they often hide function and reproduce uneven histories of recognition.",
          question: "Should neuroscience keep contested names or replace them with descriptive terms?",
          children: [
            { id: "support", title: "Support for Eponyms", family: "eponyms", type: "Position", text: "Supporters argue eponyms preserve history, recognise researchers, and open discussion about science as a human activity.", learn: "Names can act as historical prompts when taught critically.", question: "Can an eponym be useful if it is taught with context?", children: [
              { id: "significance", title: "Historical Significance", family: "eponyms", type: "Argument", text: "Eponyms act as reminders of scientific history and discovery contexts.", learn: "They can lead students into the history of science rather than only content recall.", question: "When does historical memory belong in terminology?" },
              { id: "honouring", title: "Honouring Scientists", family: "eponyms", type: "Argument", text: "They recognise people who shaped anatomical or clinical knowledge.", learn: "Recognition matters, but it depends on fair attribution.", question: "Who gets named, and who gets forgotten?" },
              { id: "bioethical", title: "Bioethical Discussion Tool", family: "eponyms", type: "Teaching use", text: "Contested names give students a way to discuss ethics, attribution, and the social history of science.", learn: "A problematic term can become a useful discussion point if not treated as neutral.", question: "How should teachers handle ethically difficult names?" }
            ]},
            { id: "opposition", title: "Opposition to Eponyms", family: "eponyms", type: "Position", text: "Critics argue eponyms often hide function, misattribute discovery, or preserve names linked to unethical conduct.", learn: "Descriptive terms usually support clearer learning because they encode more scientific information.", question: "Is clarity more important than tradition?", children: [
              { id: "accuracy", title: "Lack of Scientific Accuracy", family: "eponyms", type: "Critique", text: "An eponym rarely tells a learner what a structure does, where it is, or how it connects.", learn: "This increases memorisation burden without supporting understanding.", question: "What makes a term educationally useful?" },
              { id: "infamy", title: "Historical Infamy: Max Clara", family: "eponyms", type: "Ethical concern", text: "Some eponyms are tied to figures whose research history raises serious ethical problems.", learn: "Scientific naming can preserve harms if ethical history is ignored.", question: "Should ethically compromised names be removed?" },
              { id: "misattrib", title: "Misattribution of Discovery", family: "eponyms", type: "Critique", text: "Names often credit a single person even when discovery involved earlier or collaborative work.", learn: "Eponyms can simplify history into a false single discoverer story.", question: "How should science acknowledge collaboration?" },
              { id: "cognitive", title: "Cognitive Load on Students", family: "eponyms", type: "Learning issue", text: "Memorising names adds load without always adding conceptual understanding.", learn: "For students, descriptive names often work better because the term itself carries meaning.", question: "Which terms reduce unnecessary memory load?" }
            ]},
            { id: "inclusivity", title: "Inclusivity Concerns", family: "eponyms", type: "Equity issue", text: "Eponym traditions often reflect who had access to scientific institutions, publication, and recognition.", learn: "Naming systems can reproduce gender, cultural, and institutional bias.", question: "What would a more inclusive naming system look like?", children: [
              { id: "male", title: "Male Dominance", family: "eponyms", type: "Pattern", text: "Many eponyms preserve male names because scientific recognition historically excluded women.", learn: "The naming record reflects unequal access to professional science.", question: "How does naming shape who students see as scientific authorities?" },
              { id: "diversity", title: "Lack of Diversity", family: "eponyms", type: "Pattern", text: "Eponym lists often underrepresent researchers outside dominant institutions and traditions.", learn: "Recognition patterns reflect social structures, not pure scientific merit.", question: "Whose contributions are missing from common terms?" },
              { id: "western", title: "Western Centralisation", family: "eponyms", type: "Pattern", text: "Western naming traditions sometimes obscure contributions from other medical and scientific cultures.", learn: "Scientific vocabulary often centralises European academic histories.", question: "How should global scientific histories appear in teaching?" }
            ]}
          ]
        },
        {
          id: "institution",
          title: "Institutionalisation",
          family: "institution",
          type: "Discipline pathway",
          text: "Modern neuroscience became more unified through research programmes, societies, shared terminology, and digital standards.",
          learn: "A discipline becomes stable when communities agree on shared language, methods, and institutional structures.",
          question: "Who gets to decide which terms become official?",
          children: [
            { id: "unified", title: "Unified Discipline", family: "institution", type: "Field formation", text: "Neuroscience became more coherent when biology, psychology, medicine, and computation were brought into shared research structures.", learn: "The field grew through interdisciplinary synthesis rather than one single origin point.", question: "What makes neuroscience a discipline rather than a collection of topics?", children: [
              { id: "schmitt", title: "Schmitt: NRP at MIT", family: "institution", type: "Institutional example", text: "Francis O. Schmitt’s Neurosciences Research Program helped bring together researchers across disciplines.", learn: "Institutional programmes shaped the field by creating networks of researchers and shared problems.", question: "How do institutions shape what counts as knowledge?" },
              { id: "sfn", title: "Society for Neuroscience: 1969", family: "institution", type: "Professional body", text: "The Society for Neuroscience helped formalise neuroscience as a shared professional field.", learn: "Professional societies stabilise a field through conferences, publications, and shared identity.", question: "Why do disciplines need societies?" },
              { id: "synthesis", title: "Interdisciplinary Synthesis", family: "institution", type: "Concept", text: "Neuroscience developed through the synthesis of anatomy, physiology, psychology, chemistry, computation, and medicine.", learn: "The field is strongest when it connects levels of explanation, from cells to behaviour.", question: "Which disciplines matter most for explaining learning?" }
            ]},
            { id: "standards", title: "Standardisation", family: "institution", type: "System building", text: "Standardisation reduces confusion, supports shared databases, and helps teaching, research, and clinical practice communicate clearly.", learn: "Shared terms matter more as fields become digital, collaborative, and data intensive.", question: "What is lost when terms become standardised?", children: [
              { id: "terminologia", title: "Terminologia Anatomica", family: "institution", type: "Standard", text: "Terminologia Anatomica supports standard naming across anatomical science.", learn: "Standard lists reduce ambiguity in medical and anatomical communication.", question: "Does standardisation improve learning or flatten history?" },
              { id: "neuronames", title: "Neuroscience Based Nomenclature", family: "institution", type: "Standard", text: "Neuroscience based naming seeks clearer labels connected to function, anatomy, and systems.", learn: "Descriptive naming can reduce memory load and support conceptual clarity.", question: "What should a good neuroscience name include?" },
              { id: "informatics", title: "Neuroinformatics Standards", family: "institution", type: "Digital standard", text: "Digital neuroscience needs consistent terms so data, models, and atlases connect accurately.", learn: "Informatics turns naming into infrastructure because databases depend on shared labels.", question: "Why does terminology matter more in digital science?" }
            ]}
          ]
        }
      ]
    };

    const coords = {
      root: [180, 850],
      technology: [560, 260], terminology: [560, 700], eponyms: [560, 1125], institution: [560, 1545],
      historical: [960, 105], communications: [960, 285], computing: [960, 465],
      vesalius: [1370, 35], harvey: [1370, 105], descartes: [1370, 175],
      encoding: [1370, 260], networks: [1370, 330], encryption: [1370, 400],
      reprogramming: [1370, 500], erasing: [1370, 570], viruses: [1370, 640],
      classical: [960, 685], thalamus: [960, 910],
      greeklatin: [1370, 650], metaphoric: [1370, 720], hippocampus: [1370, 790], amygdala: [1370, 860],
      galen: [1370, 950], arabic: [1370, 1020], willis: [1370, 1090],
      support: [960, 1115], opposition: [960, 1320], inclusivity: [960, 1515],
      significance: [1370, 1080], honouring: [1370, 1150], bioethical: [1370, 1220],
      accuracy: [1370, 1290], infamy: [1370, 1360], misattrib: [1370, 1430], cognitive: [1370, 1500],
      male: [1370, 1580], diversity: [1370, 1650], western: [1370, 1720],
      unified: [960, 1720], standards: [960, 1905],
      schmitt: [1370, 1760], sfn: [1370, 1830], synthesis: [1370, 1900],
      terminologia: [1370, 1980], neuronames: [1370, 2050], informatics: [1370, 2120]
    };

    const all = new Map();
    const parent = new Map();
    const kids = new Map();
    const expanded = new Set(["root"]);
    let selected = "root";
    let focusMode = false;
    let scale = 0.58;
    let tx = 110;
    let ty = 70;
    let dragging = false;
    let start = null;

    const nodesEl = document.getElementById("nodes");
    const linksEl = document.getElementById("links");
    const viewport = document.getElementById("viewport");
    const search = document.getElementById("search");
    const focusBtn = document.getElementById("focus");
    const sideTop = document.getElementById("sideTop");
    const sideBody = document.getElementById("sideBody");

    function walk(n, p = null) {
      all.set(n.id, n);
      parent.set(n.id, p);
      kids.set(n.id, (n.children || []).map(c => c.id));
      (n.children || []).forEach(c => walk(c, n.id));
    }
    walk(data);

    function depth(id) {
      let d = 0, p = parent.get(id);
      while (p) { d++; p = parent.get(p); }
      return d;
    }

    function pathTo(id) {
      const arr = [];
      let x = id;
      while (x) { arr.unshift(x); x = parent.get(x); }
      return arr;
    }

    function descendants(id) {
      const set = new Set([id]);
      function rec(x) { for (const c of kids.get(x) || []) { set.add(c); rec(c); } }
      rec(id);
      return set;
    }

    function activeSet(id) {
      const set = new Set(pathTo(id));
      descendants(id).forEach(x => set.add(x));
      return set;
    }

    function visibleSet() {
      const set = new Set(["root"]);
      function rec(id) {
        if (!expanded.has(id)) return;
        for (const c of kids.get(id) || []) { set.add(c); rec(c); }
      }
      rec("root");
      return set;
    }

    function curve(a, b) {
      const [x1, y1] = coords[a];
      const [x2, y2] = coords[b];
      const pad1 = depth(a) === 0 ? 190 : 150;
      const pad2 = depth(b) >= 3 ? 150 : 160;
      const bend = Math.max(120, (x2 - x1) * 0.55);
      return `M ${x1 + pad1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2 - pad2} ${y2}`;
    }

    function shortText(n) {
      if (kids.get(n.id).length) return `${kids.get(n.id).length} connected ideas`;
      return n.type;
    }

    function build() {
      for (const [id, n] of all.entries()) {
        const d = depth(id);
        const node = document.createElement("button");
        node.className = `node ${id === "root" ? "root" : d === 1 ? "branch" : d === 2 ? "sub" : "leaf"}`;
        node.dataset.id = id;
        node.dataset.family = n.family;
        node.style.left = coords[id][0] + "px";
        node.style.top = coords[id][1] + "px";
        node.innerHTML = `<div class="nodeTitle">${n.title}</div><div class="micro"><span class="bead"></span><span>${shortText(n)}</span></div>${kids.get(id).length ? `<span class="toggle">+</span>` : ""}`;
        node.addEventListener("click", e => {
          e.stopPropagation();
          selected = id;
          if (kids.get(id).length) {
            if (expanded.has(id)) collapse(id); else expanded.add(id);
          }
          updateSide(id);
          render();
        });
        node.addEventListener("mouseenter", () => highlight(id));
        node.addEventListener("mouseleave", () => renderHot());
        nodesEl.appendChild(node);
      }

      for (const [id] of all.entries()) {
        const p = parent.get(id);
        if (!p) continue;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", curve(p, id));
        path.classList.add("link");
        path.dataset.from = p;
        path.dataset.to = id;
        linksEl.appendChild(path);
        const len = path.getTotalLength();
        path.style.setProperty("--len", len);
      }
    }

    function collapse(id) {
      expanded.delete(id);
      descendants(id).forEach(x => { if (x !== id) expanded.delete(x); });
    }

    function render() {
      const visible = visibleSet();
      document.querySelectorAll(".node").forEach(el => {
        const id = el.dataset.id;
        const isVisible = visible.has(id);
        el.classList.toggle("visible", isVisible);
        el.classList.toggle("gone", !isVisible);
        el.classList.toggle("open", expanded.has(id));
        const t = el.querySelector(".toggle");
        if (t) t.textContent = expanded.has(id) ? "−" : "+";
      });

      document.querySelectorAll(".link").forEach(link => {
        const on = visible.has(link.dataset.from) && visible.has(link.dataset.to);
        link.classList.toggle("visible", on);
        link.classList.toggle("hiddenLine", !on);
      });
      renderHot();
    }

    function renderHot() {
      const set = focusMode ? activeSet(selected) : null;
      document.querySelectorAll(".node").forEach(el => {
        const id = el.dataset.id;
        const hot = id === selected || (set && set.has(id));
        el.classList.toggle("hot", hot);
        el.classList.toggle("dim", Boolean(set && !set.has(id)));
      });
      document.querySelectorAll(".link").forEach(link => {
        const hot = set && set.has(link.dataset.from) && set.has(link.dataset.to);
        link.classList.toggle("hot", Boolean(hot));
        link.classList.toggle("dim", Boolean(set && !hot));
      });
    }

    function highlight(id) {
      const set = activeSet(id);
      document.querySelectorAll(".node").forEach(el => {
        const hot = set.has(el.dataset.id);
        el.classList.toggle("hot", hot);
        el.classList.toggle("dim", !hot);
      });
      document.querySelectorAll(".link").forEach(link => {
        const hot = set.has(link.dataset.from) && set.has(link.dataset.to);
        link.classList.toggle("hot", hot);
        link.classList.toggle("dim", !hot);
      });
    }

    function crumbs(id) {
      return pathTo(id).map(x => `<span class="crumb">${all.get(x).title}</span>`).join("");
    }

    function updateSide(id) {
      const n = all.get(id);
      sideTop.innerHTML = `<span class="tag">${n.type}</span><h2>${n.title}</h2><div class="crumbs">${crumbs(id)}</div>`;
      sideBody.innerHTML = `
        <p>${n.text}</p>
        <div class="sectionTitle">Why it matters</div>
        <div class="eduCard"><strong>Educational value</strong><span>${n.learn}</span></div>
        <div class="sectionTitle">Thinking prompt</div>
        <div class="quiz"><div class="q">Question</div><p>${n.question}</p></div>
        <div class="sectionTitle">How to use this node</div>
        <div class="eduCard"><strong>${kids.get(id).length ? "Expand the branch" : "Trace the pathway"}</strong><span>${kids.get(id).length ? "Open this node to compare its linked examples. Use Focus mode to remove visual noise while keeping the conceptual pathway visible." : "Follow the breadcrumb trail above to connect this detail back to the larger argument."}</span></div>
      `;
    }

    function applyTransform(soft = true) {
      if (!soft) {
        nodesEl.style.transition = "none";
        linksEl.style.transition = "none";
      } else {
        nodesEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
        linksEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
      }
      const t = `translate(${tx}px, ${ty}px) scale(${scale})`;
      nodesEl.style.transform = t;
      linksEl.style.transform = t;
      if (!soft) requestAnimationFrame(() => {
        nodesEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
        linksEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
      });
    }

    function fit() {
      const box = document.querySelector(".stage").getBoundingClientRect();
      scale = Math.max(0.36, Math.min(0.66, (box.height - 150) / 2200));
      tx = 95;
      ty = 100;
      applyTransform();
    }

    function expandParents(id) {
      let p = parent.get(id);
      while (p) { expanded.add(p); p = parent.get(p); }
    }

    function doSearch(term) {
      const q = term.trim().toLowerCase();
      document.querySelectorAll(".nodeTitle").forEach(t => t.innerHTML = t.textContent);
      if (!q) { render(); return; }
      let found = null;
      for (const [id, n] of all.entries()) {
        if (n.title.toLowerCase().includes(q) || n.text.toLowerCase().includes(q) || n.learn.toLowerCase().includes(q)) {
          found ||= id;
          expandParents(id);
        }
      }
      if (found) {
        selected = found;
        updateSide(found);
        render();
        highlight(found);
        const el = document.querySelector(`[data-id="${found}"] .nodeTitle`);
        if (el) el.innerHTML = el.textContent.replace(new RegExp(q, "ig"), m => `<mark>${m}</mark>`);
      }
    }

    document.getElementById("zoomIn").onclick = () => { scale = Math.min(1.22, scale + 0.08); applyTransform(); };
    document.getElementById("zoomOut").onclick = () => { scale = Math.max(0.30, scale - 0.08); applyTransform(); };
    document.getElementById("fit").onclick = fit;
    document.getElementById("focus").onclick = () => { focusMode = !focusMode; focusBtn.classList.toggle("active", focusMode); renderHot(); };
    document.getElementById("expandAll").onclick = () => { for (const [id] of all) if (kids.get(id).length) expanded.add(id); render(); };
    document.getElementById("collapseAll").onclick = () => { expanded.clear(); expanded.add("root"); selected = "root"; updateSide("root"); render(); };
    search.addEventListener("input", e => doSearch(e.target.value));

    viewport.addEventListener("pointerdown", e => {
      if (e.target.closest(".node") || e.target.closest(".toolbar")) return;
      dragging = true;
      viewport.classList.add("dragging");
      start = { x: e.clientX, y: e.clientY, tx, ty };
    });

    window.addEventListener("pointermove", e => {
      if (!dragging) return;
      tx = start.tx + e.clientX - start.x;
      ty = start.ty + e.clientY - start.y;
      applyTransform(false);
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("wheel", e => {
      e.preventDefault();
      const old = scale;
      const delta = e.deltaY > 0 ? -0.045 : 0.045;
      scale = Math.max(0.30, Math.min(1.22, scale + delta));
      const rect = viewport.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      tx = mx - (mx - tx) * (scale / old);
      ty = my - (my - ty) * (scale / old);
      applyTransform(false);
    }, { passive: false });

    build();
    updateSide("root");
    fit();
    render();
  </script>
</body>
</html>
