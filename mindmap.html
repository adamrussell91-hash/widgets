<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Neuroanatomy and Neuroscience Nomenclature Mind Map</title>
  <style>
    :root {
      --bg: #f6f4ef;
      --bg2: #eef4f1;
      --ink: #1f2d38;
      --soft: #526574;
      --faint: #7a8b96;
      --card: rgba(255, 255, 255, 0.82);
      --card2: rgba(255, 255, 255, 0.94);
      --stroke: rgba(75, 91, 103, 0.16);
      --teal: #4f9f98;
      --blue: #5f82b8;
      --sage: #719b75;
      --clay: #bd796e;
      --gold: #b38d3c;
      --lavender: #8576b8;
      --line: rgba(89, 132, 128, 0.42);
      --lineBright: rgba(58, 126, 120, 0.92);
      --shadow: 0 24px 70px rgba(38, 55, 70, 0.14);
    }

    * { box-sizing: border-box; }

    html, body {
      height: 100%;
      margin: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 12% 10%, rgba(79, 159, 152, 0.12), transparent 32%),
        radial-gradient(circle at 76% 18%, rgba(133, 118, 184, 0.10), transparent 30%),
        radial-gradient(circle at 72% 84%, rgba(179, 141, 60, 0.10), transparent 36%),
        linear-gradient(135deg, var(--bg), var(--bg2));
      color: var(--ink);
      font-family: ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    body:before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(31, 45, 56, 0.035) 1px, transparent 1px),
        linear-gradient(90deg, rgba(31, 45, 56, 0.035) 1px, transparent 1px);
      background-size: 48px 48px;
      mask-image: radial-gradient(circle at center, black, transparent 76%);
    }

    .app {
      height: 100%;
      display: grid;
      grid-template-columns: minmax(0, 1fr) 430px;
      gap: 18px;
      padding: 18px;
    }

    .stage, .side {
      border: 1px solid var(--stroke);
      background: rgba(255, 255, 255, 0.54);
      box-shadow: var(--shadow);
      backdrop-filter: blur(18px);
      border-radius: 30px;
      overflow: hidden;
    }

    .stage {
      position: relative;
      min-width: 0;
    }

    .toolbar {
      position: absolute;
      z-index: 80;
      left: 18px;
      right: 18px;
      top: 18px;
      display: grid;
      grid-template-columns: minmax(330px, 520px) auto;
      gap: 12px;
      pointer-events: none;
    }

    .hero, .controls, .badge {
      border: 1px solid rgba(75, 91, 103, 0.15);
      background: rgba(255, 255, 255, 0.74);
      backdrop-filter: blur(22px);
      box-shadow: 0 16px 42px rgba(38, 55, 70, 0.10);
      border-radius: 22px;
      pointer-events: auto;
    }

    .hero { padding: 16px 18px; }

    .eyebrow {
      margin: 0 0 6px;
      color: var(--teal);
      text-transform: uppercase;
      letter-spacing: 0.14em;
      font-size: 12px;
      font-weight: 900;
    }

    h1 {
      margin: 0;
      font-size: 26px;
      line-height: 1.08;
      letter-spacing: -0.035em;
    }

    .subtitle {
      margin: 8px 0 0;
      color: var(--soft);
      font-size: 16px;
      line-height: 1.35;
    }

    .controls {
      justify-self: end;
      display: flex;
      gap: 8px;
      align-items: center;
      padding: 10px;
      flex-wrap: wrap;
      max-width: 760px;
    }

    button, input { font: inherit; }

    .search {
      width: 280px;
      border: 1px solid rgba(75, 91, 103, 0.18);
      background: rgba(255, 255, 255, 0.78);
      color: var(--ink);
      outline: none;
      border-radius: 16px;
      padding: 12px 14px;
      font-size: 17px;
    }

    .search:focus {
      border-color: rgba(79, 159, 152, 0.70);
      box-shadow: 0 0 0 4px rgba(79, 159, 152, 0.10);
    }

    .btn {
      border: 1px solid rgba(75, 91, 103, 0.16);
      background: rgba(255, 255, 255, 0.72);
      color: var(--ink);
      border-radius: 16px;
      padding: 11px 13px;
      font-size: 15px;
      font-weight: 850;
      cursor: pointer;
      transition: transform 180ms ease, background 180ms ease, border 180ms ease, box-shadow 180ms ease;
    }

    .btn:hover {
      transform: translateY(-1px);
      background: rgba(255, 255, 255, 0.95);
      border-color: rgba(79, 159, 152, 0.48);
    }

    .btn.active {
      background: rgba(79, 159, 152, 0.13);
      border-color: rgba(79, 159, 152, 0.55);
      color: #1b5d58;
    }

    .viewport {
      position: absolute;
      inset: 0;
      cursor: grab;
      touch-action: none;
    }

    .viewport.dragging { cursor: grabbing; }

    svg {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      overflow: visible;
    }

    .mapLayer {
      position: absolute;
      inset: 0;
      transform-origin: 0 0;
      transition: transform 620ms cubic-bezier(.2, .9, .18, 1);
    }

    #links { position: absolute; inset: 0; }

    .link {
      fill: none;
      stroke: var(--line);
      stroke-width: 3.2;
      stroke-linecap: round;
      stroke-linejoin: round;
      stroke-dasharray: var(--len);
      stroke-dashoffset: var(--len);
      transition: stroke-dashoffset 780ms cubic-bezier(.2, .9, .18, 1), opacity 420ms ease, stroke 420ms ease, stroke-width 420ms ease;
    }

    .link.visible { stroke-dashoffset: 0; opacity: 1; }
    .link.hiddenLine { stroke-dashoffset: var(--len); opacity: 0; }
    .link.dim { opacity: 0.10; }
    .link.hot { stroke: var(--lineBright); stroke-width: 5; opacity: 1; }

    .node {
      position: absolute;
      transform: translate(-50%, -50%) scale(0.86);
      opacity: 0;
      min-width: 270px;
      max-width: 380px;
      border: 1px solid rgba(75, 91, 103, 0.16);
      color: var(--ink);
      border-radius: 22px;
      padding: 16px 18px 15px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.98), rgba(248,250,249,0.82)),
        rgba(255,255,255,0.90);
      box-shadow: 0 18px 46px rgba(45, 64, 80, 0.13);
      cursor: pointer;
      user-select: none;
      text-align: left;
      transition:
        transform 560ms cubic-bezier(.2, .9, .18, 1),
        opacity 520ms ease,
        filter 360ms ease,
        border 220ms ease,
        background 220ms ease,
        box-shadow 220ms ease;
    }

    .node.visible {
      transform: translate(-50%, -50%) scale(1);
      opacity: 1;
    }

    .node.gone {
      transform: translate(-50%, -50%) scale(0.84);
      opacity: 0;
      pointer-events: none;
    }

    .node:hover {
      border-color: rgba(79,159,152,0.52);
      box-shadow: 0 22px 54px rgba(45, 64, 80, 0.17);
    }

    .node.dim {
      opacity: 0.18;
      filter: saturate(0.45);
    }

    .node.hot {
      border-color: rgba(79,159,152,0.84);
      box-shadow: 0 0 0 1px rgba(79,159,152,0.20), 0 22px 58px rgba(45, 64, 80, 0.18);
    }

    .root {
      min-width: 440px;
      padding: 22px 24px;
      background:
        linear-gradient(150deg, rgba(255,255,255,0.98), rgba(238,244,241,0.88)),
        rgba(255,255,255,0.96);
      border-color: rgba(133, 118, 184, 0.25);
    }

    .branch { min-width: 360px; }
    .sub { min-width: 330px; }
    .leaf { min-width: 305px; }

    .nodeTitle {
      font-size: 20px;
      line-height: 1.16;
      font-weight: 900;
      letter-spacing: -0.015em;
      padding-right: 36px;
    }

    .root .nodeTitle { font-size: 27px; }
    .branch .nodeTitle { font-size: 23px; }

    .micro {
      margin-top: 9px;
      color: var(--soft);
      font-size: 15px;
      line-height: 1.35;
      display: flex;
      align-items: center;
      gap: 9px;
    }

    .bead {
      width: 10px;
      height: 10px;
      border-radius: 99px;
      background: var(--teal);
      box-shadow: 0 0 0 5px rgba(79,159,152,0.11);
      flex: 0 0 auto;
    }

    [data-family="technology"] .bead { background: var(--blue); box-shadow: 0 0 0 5px rgba(95,130,184,0.12); }
    [data-family="terminology"] .bead { background: var(--sage); box-shadow: 0 0 0 5px rgba(113,155,117,0.12); }
    [data-family="eponyms"] .bead { background: var(--clay); box-shadow: 0 0 0 5px rgba(189,121,110,0.12); }
    [data-family="institution"] .bead { background: var(--gold); box-shadow: 0 0 0 5px rgba(179,141,60,0.12); }

    .toggle {
      position: absolute;
      top: 14px;
      right: 14px;
      width: 34px;
      height: 34px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      background: rgba(31,45,56,0.055);
      color: var(--ink);
      font-size: 20px;
      font-weight: 950;
      transition: transform 300ms ease, background 300ms ease;
    }

    .node.open .toggle {
      transform: rotate(180deg);
      background: rgba(79,159,152,0.13);
    }

    .badgeRow {
      position: absolute;
      z-index: 70;
      left: 18px;
      bottom: 18px;
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      max-width: 760px;
    }

    .badge {
      color: var(--soft);
      border-radius: 999px;
      padding: 10px 13px;
      font-size: 15px;
      line-height: 1.2;
    }

    .side {
      padding: 0;
      display: grid;
      grid-template-rows: auto 1fr;
      min-width: 0;
      background: rgba(255,255,255,0.68);
    }

    .sideTop {
      padding: 22px;
      border-bottom: 1px solid rgba(75, 91, 103, 0.12);
      background:
        radial-gradient(circle at 18% 15%, rgba(79,159,152,0.11), transparent 35%),
        rgba(255,255,255,0.50);
    }

    .sideBody {
      padding: 22px;
      overflow: auto;
    }

    .tag {
      display: inline-flex;
      margin: 0 0 14px;
      padding: 8px 11px;
      border-radius: 999px;
      border: 1px solid rgba(79,159,152,0.24);
      color: #2b746f;
      background: rgba(79,159,152,0.09);
      font-size: 12px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      font-weight: 950;
    }

    .side h2 {
      margin: 0;
      font-size: 31px;
      line-height: 1.08;
      letter-spacing: -0.04em;
    }

    .side p {
      margin: 0 0 18px;
      color: #304553;
      font-size: 19px;
      line-height: 1.55;
    }

    .sectionTitle {
      margin: 24px 0 10px;
      color: var(--ink);
      font-size: 15px;
      letter-spacing: 0.10em;
      text-transform: uppercase;
      font-weight: 950;
    }

    .infoCard {
      border: 1px solid rgba(75, 91, 103, 0.12);
      background: rgba(255,255,255,0.62);
      border-radius: 20px;
      padding: 16px;
      margin-bottom: 12px;
    }

    .infoCard strong {
      display: block;
      margin-bottom: 6px;
      color: var(--ink);
      font-size: 18px;
    }

    .infoCard span, .infoCard li {
      color: var(--soft);
      font-size: 17px;
      line-height: 1.48;
    }

    .infoCard ul {
      margin: 8px 0 0;
      padding-left: 20px;
    }

    .crumbs {
      display: flex;
      flex-wrap: wrap;
      gap: 7px;
      margin-top: 14px;
    }

    .crumb {
      color: var(--soft);
      background: rgba(255,255,255,0.62);
      border: 1px solid rgba(75,91,103,0.12);
      border-radius: 999px;
      padding: 7px 9px;
      font-size: 13px;
    }

    .quiz {
      margin-top: 12px;
      border: 1px solid rgba(179,141,60,0.18);
      background: rgba(179,141,60,0.07);
      border-radius: 20px;
      padding: 16px;
    }

    .quiz .q {
      color: #8d6a23;
      font-size: 13px;
      letter-spacing: 0.10em;
      font-weight: 950;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    mark {
      background: rgba(179,141,60,0.22);
      color: var(--ink);
      padding: 0 3px;
      border-radius: 5px;
    }

    @media (max-width: 1150px) {
      .app {
        grid-template-columns: 1fr;
        grid-template-rows: 1fr 360px;
      }
      .toolbar { grid-template-columns: 1fr; }
      .controls { justify-self: start; max-width: none; }
      .search { width: 220px; }
    }
  </style>
</head>
<body>
  <main class="app">
    <section class="stage" aria-label="Interactive neuroscience mind map">
      <div class="toolbar">
        <div class="hero">
          <p class="eyebrow">Interactive study map</p>
          <h1>Neuroscience Nomenclature</h1>
          <p class="subtitle">How brain language moves through anatomy, metaphor, ethics, and standards.</p>
        </div>
        <div class="controls">
          <input id="search" class="search" placeholder="Search the map" aria-label="Search map" />
          <button class="btn" id="zoomOut">−</button>
          <button class="btn" id="zoomIn">+</button>
          <button class="btn" id="fit">Fit</button>
          <button class="btn" id="focus">Focus</button>
          <button class="btn" id="expandAll">Expand all</button>
          <button class="btn" id="collapseAll">Collapse</button>
        </div>
      </div>

      <div id="viewport" class="viewport">
        <svg aria-hidden="true"><g id="links" class="mapLayer"></g></svg>
        <div id="nodes" class="mapLayer"></div>
      </div>

      <div class="badgeRow">
        <span class="badge">Click nodes to expand</span>
        <span class="badge">Hover to trace pathways</span>
        <span class="badge">Scroll to zoom</span>
        <span class="badge">Drag to pan</span>
      </div>
    </section>

    <aside class="side" aria-live="polite">
      <div class="sideTop" id="sideTop"></div>
      <div class="sideBody" id="sideBody"></div>
    </aside>
  </main>

  <script>

          question: "Which metaphor gives the clearest explanation without oversimplifying the brain?",
          children: [

              { id: "vesalius", title: "Vesalius: Mechanical and Fortification", family: "technology", type: "Example", text: "Vesalius helped shift anatomy towards observation, while description still used structural language such as walls, chambers, and defences.", rule: "Structure first naming often treats the body as a built environment.", examples: ["Ventricles", "Walls", "Canals", "Chambers"], fact: "Vesalius corrected many inherited anatomical errors by placing observation above classical authority.", question: "How does structural language influence how students picture the body?" },
              { id: "harvey", title: "Harvey: Heart as Pump", family: "technology", type: "Example", text: "Harvey’s explanation of circulation made mechanical comparison central. The heart became easier to understand through the pump model.", rule: "A strong metaphor explains function by linking an unfamiliar process to a familiar tool.", examples: ["Pump", "Pressure", "Flow", "Circulation"], fact: "Harvey’s circulation model was persuasive partly because it turned the heart into a functional system, not merely an anatomical part.", question: "Why is the pump metaphor so memorable?" },
              { id: "descartes", title: "Descartes: Seat of the Soul", family: "technology", type: "Example", text: "Descartes linked mind, body, and soul through anatomical speculation, especially around the pineal gland.", rule: "Some names and explanations preserve old theories long after the theory weakens.", examples: ["Pineal gland", "Mind body dualism", "Seat of the soul"], fact: "The pineal gland attracted philosophical interest partly because it looked singular, unlike many paired brain structures.", question: "Should outdated concepts stay in teaching if they have historical value?" }

              { id: "encoding", title: "Encoding and Transmission", family: "technology", type: "Key term", text: "Neural activity is often described as information being encoded and transmitted through signals.", rule: "Encoding language links brain activity to representation.", examples: ["Sensory encoding", "Motor output", "Synaptic transmission"], fact: "The term encoding can make a process sound more exact than it is. Neural patterns often vary across context and individuals.", question: "What is gained by calling neural activity information?" },
              { id: "networks", title: "Neural Networks", family: "technology", type: "Key term", text: "Network language describes distributed activity, connectivity, and system level processing.", rule: "Network language shifts attention from isolated parts to relationships between parts.", examples: ["Default mode network", "Salience network", "Executive control network"], fact: "Modern brain imaging helped make network language common because it shows patterns of activity across regions.", question: "How does network thinking change the way we explain learning?" },
              { id: "encryption", title: "Encryption and Output", family: "technology", type: "Extension", text: "Terms such as decoding, signal, and output show how computational and communications models influence neuroscience.", rule: "Decoding language treats brain activity as patterned information to interpret.", examples: ["Signal decoding", "Neural code", "Output pathway"], fact: "Decoding is a useful research term, but it can make cognition sound like a hidden file waiting to be opened.", question: "Does decoding language make cognition sound too mechanical?" }

            { id: "computing", title: "Computing Metaphors", family: "technology", type: "Modern metaphor", text: "Computing metaphors frame the brain as a system of storage, processing, programming, and error correction.", rule: "Computer language makes the brain teachable through storage, processing, coding, and circuits.", examples: ["Hard drive", "Reprogramming", "Processing", "Inputs and outputs", "Circuits"], fact: "The computer metaphor is common because it fits modern life, but biological memory is reconstructed, not retrieved like a file.", question: "Which brain processes resist computer comparison?", children: [
              { id: "reprogramming", title: "Reprogramming Circuits", family: "technology", type: "Applied language", text: "Clinical and educational language often describes intervention as rewiring or reprogramming circuits.", rule: "Reprogramming language frames change as technical intervention.", examples: ["Rewiring", "Habit loops", "Neural circuits", "Cognitive retraining"], fact: "The phrase can motivate students by implying change is possible, but it can also oversimplify learning and recovery.", question: "What does reprogramming imply about agency and effort?" },

              { id: "hippocampus", title: "Hippocampus: Seahorse", family: "terminology", type: "Example", text: "The hippocampus was named through resemblance to a seahorse shape.", rule: "Shape based names often survive because they are vivid and easy to remember.", examples: ["Hippocampus", "Cochlea", "Vermis", "Pons"], fact: "The hippocampus is strongly linked to memory, but the word itself tells you shape, not function.", question: "Does the name hippocampus help students understand memory?" },

            ]},
            { id: "thalamus", title: "The Thalamus Journey", family: "terminology", type: "Term history", text: "The thalamus shows how terms travel across languages and meanings before becoming fixed in scientific use.", rule: "Terms shift as they move through translation, anatomy, and new theories of function.", examples: ["Inner chamber", "Canopy", "Alcove", "Optic chambers"], fact: "The thalamus is a good case study because its name history reflects structure, translation, and changing ideas about sensory pathways.", question: "How much history should sit behind a modern scientific label?", children: [
              { id: "galen", title: "Galen: Inner Chamber", family: "terminology", type: "Historical meaning", text: "Older anatomical traditions linked thalamus language with chamber like meanings.", rule: "Architectural terms were common because anatomy was mapped spatially.", examples: ["Chamber", "Ventricle", "Atrium", "Foramen"], fact: "Words such as chamber and ventricle remind us anatomy was first organised through visible compartments.", question: "Why do so many anatomical terms sound architectural?" },
              { id: "arabic", title: "Arabic: Canopy or Alcove", family: "terminology", type: "Translation history", text: "Arabic medical translation traditions helped carry and reshape anatomical vocabulary.", rule: "Translation can preserve, bend, or enrich the meaning of a scientific term.", examples: ["Canopy", "Alcove", "Chamber", "Seat"], fact: "Arabic medicine was central to preserving and extending classical medical knowledge, so anatomical language often travelled through Arabic scholarly traditions before later European use.", question: "How do translation pathways affect scientific authority?" },
              { id: "willis", title: "Willis: Optic Chambers", family: "terminology", type: "Reinterpretation", text: "Willis used terms connected to optic pathways, showing how function and location influenced naming.", rule: "A term can be reinterpreted when new anatomical relationships become important.", examples: ["Optic chambers", "Optic tract", "Sensory relay", "Thalamic nuclei"], fact: "The thalamus is now often taught as a relay hub, but that modern function label sits on top of a much older word history.", question: "Should function or location dominate anatomical naming?" }

        },
        {
          id: "eponyms",

          children: [

              { id: "significance", title: "Historical Significance", family: "eponyms", type: "Argument", text: "Eponyms act as reminders of scientific history and discovery contexts.", rule: "A name can act as a prompt for historical inquiry.", examples: ["Broca", "Wernicke", "Golgi", "Parkinson"], fact: "The strongest use of eponyms in teaching is not memorisation. It is using them to ask how knowledge was made.", question: "When does historical memory belong in terminology?" },
              { id: "honouring", title: "Honouring Scientists", family: "eponyms", type: "Argument", text: "They recognise people who shaped anatomical or clinical knowledge.", rule: "Naming is a form of professional recognition.", examples: ["Golgi apparatus", "Purkinje cells", "Broca area"], fact: "Honouring one person can obscure teams, assistants, translators, patients, and earlier observers.", question: "Who gets named, and who gets forgotten?" },
              { id: "bioethical", title: "Bioethical Discussion Tool", family: "eponyms", type: "Teaching use", text: "Contested names give students a way to discuss ethics, attribution, and the social history of science.", rule: "A problematic name can become useful when it opens ethical analysis.", examples: ["Clara cells", "Reiter syndrome", "Hallervorden Spatz disease"], fact: "Some medical eponyms have been replaced because the people named were linked to unethical research or Nazi medicine.", question: "How should teachers handle ethically difficult names?" }
            ]},
            { id: "opposition", title: "Opposition to Eponyms", family: "eponyms", type: "Position", text: "Critics argue eponyms often hide function, misattribute discovery, or preserve names linked to unethical conduct.", rule: "Descriptive terms usually teach more than personal names.", examples: ["Club cell instead of Clara cell", "Reactive airway disease labels", "Function based anatomical terms"], fact: "Renaming does not erase history. It can shift a term from honouring to analysing history.", question: "Is clarity more important than tradition?", children: [
              { id: "accuracy", title: "Lack of Scientific Accuracy", family: "eponyms", type: "Critique", text: "An eponym rarely tells a learner what a structure does, where it is, or how it connects.", rule: "A descriptive name lowers the amount of extra memory work required.", examples: ["Medial temporal lobe", "Sensory relay", "Prefrontal cortex", "Club cell"], fact: "Students learn faster when a term contains a clue about location, shape, or function.", question: "What makes a term educationally useful?" },
              { id: "infamy", title: "Historical Infamy: Max Clara", family: "eponyms", type: "Ethical concern", text: "Some eponyms are tied to figures whose research history raises serious ethical problems.", rule: "Names can become honours, even when the history behind them is ethically compromised.", examples: ["Clara cells", "Reiter syndrome", "Hallervorden Spatz disease"], fact: "Clara cells are now widely called club cells to avoid honouring Max Clara and to use a more descriptive term.", question: "Should ethically compromised names be removed?" },
              { id: "misattrib", title: "Misattribution of Discovery", family: "eponyms", type: "Critique", text: "Names often credit a single person even when discovery involved earlier or collaborative work.", rule: "An eponym can create a false single discoverer story.", examples: ["Broca area", "Wernicke area", "Golgi apparatus", "Parkinson disease"], fact: "Scientific discovery is often cumulative, but eponyms compress it into one remembered name.", question: "How should science acknowledge collaboration?" },
              { id: "cognitive", title: "Cognitive Load on Students", family: "eponyms", type: "Learning issue", text: "Memorising names adds load without always adding conceptual understanding.", rule: "A term should ideally carry meaning, not only require recall.", examples: ["Descriptive anatomy", "Function based terms", "Location based terms"], fact: "Eponyms are harder for novices because they give few clues unless the story has been taught.", question: "Which terms reduce unnecessary memory load?" }
            ]},
            { id: "inclusivity", title: "Inclusivity Concerns", family: "eponyms", type: "Equity issue", text: "Eponym traditions often reflect who had access to scientific institutions, publication, and recognition.", rule: "Naming systems can reproduce the inequalities of the institutions that created them.", examples: ["Male eponyms", "European eponyms", "Clinical names from elite institutions"], fact: "The list of famous names in science often tells us as much about access and status as it does about discovery.", question: "What would a more inclusive naming system look like?", children: [
              { id: "male", title: "Male Dominance", family: "eponyms", type: "Pattern", text: "Many eponyms preserve male names because scientific recognition historically excluded women.", rule: "Recognition patterns reflect access to education, publication, and authority.", examples: ["Male named areas", "Male named diseases", "Male named instruments"], fact: "Absence from eponym lists does not mean absence from scientific labour.", question: "How does naming shape who students see as scientific authorities?" },
              { id: "diversity", title: "Lack of Diversity", family: "eponyms", type: "Pattern", text: "Eponym lists often underrepresent researchers outside dominant institutions and traditions.", rule: "A naming tradition can make a narrow group appear more central than it was.", examples: ["Western clinical eponyms", "European anatomical eponyms", "Elite university traditions"], fact: "Many contributions from technicians, patients, translators, nurses, and non western scholars are hard to see in eponym based teaching.", question: "Whose contributions are missing from common terms?" },
              { id: "western", title: "Western Centralisation", family: "eponyms", type: "Pattern", text: "Western naming traditions sometimes obscure contributions from other medical and scientific cultures.", rule: "The language of a field can centralise one historical tradition over others.", examples: ["Greek roots", "Latin standards", "European eponyms", "Western textbook conventions"], fact: "A global view of neuroscience vocabulary shows translation, preservation, and reinterpretation across many cultures.", question: "How should global scientific histories appear in teaching?" }
            ]}
          ]
        },
        {
          id: "institution",
          title: "Institutionalisation",
          family: "institution",
          type: "Discipline pathway",

          children: [

              { id: "schmitt", title: "Schmitt: NRP at MIT", family: "institution", type: "Institutional example", text: "Francis O. Schmitt’s Neurosciences Research Program helped bring together researchers across disciplines.", rule: "Interdisciplinary fields need structures that help different experts work on shared problems.", examples: ["Neurosciences Research Program", "MIT", "Interdisciplinary research groups"], fact: "Programmes like this helped make neuroscience a meeting point for anatomy, psychology, physiology, chemistry, and computation.", question: "How do institutions shape what counts as knowledge?" },
              { id: "sfn", title: "Society for Neuroscience: 1969", family: "institution", type: "Professional body", text: "The Society for Neuroscience helped formalise neuroscience as a shared professional field.", rule: "Professional societies stabilise identity, standards, and communication in a field.", examples: ["Annual meetings", "Professional networks", "Shared publications"], fact: "A society gives a field a public structure. It helps researchers see themselves as part of the same discipline.", question: "Why do disciplines need societies?" },
              { id: "synthesis", title: "Interdisciplinary Synthesis", family: "institution", type: "Concept", text: "Neuroscience developed through the synthesis of anatomy, physiology, psychology, chemistry, computation, and medicine.", rule: "Neuroscience works across levels, from cells to behaviour.", examples: ["Cellular neuroscience", "Cognitive neuroscience", "Clinical neurology", "Computational neuroscience"], fact: "Many neuroscience explanations fail when they stay at only one level of analysis.", question: "Which disciplines matter most for explaining learning?" }
            ]},
            { id: "standards", title: "Standardisation", family: "institution", type: "System building", text: "Standardisation reduces confusion, supports shared databases, and helps teaching, research, and clinical practice communicate clearly.", rule: "Shared terms make collaboration possible, especially when knowledge is stored digitally.", examples: ["Terminologia Anatomica", "Brain atlases", "Neuroinformatics standards", "Ontologies"], fact: "The more data a field produces, the more important naming becomes.", question: "What is lost when terms become standardised?", children: [
              { id: "terminologia", title: "Terminologia Anatomica", family: "institution", type: "Standard", text: "Terminologia Anatomica supports standard naming across anatomical science.", rule: "A standard list reduces ambiguity between teachers, clinicians, and researchers.", examples: ["Latin anatomical terms", "International anatomical terminology", "Descriptive structure names"], fact: "Anatomical standards try to replace local variation with shared reference language.", question: "Does standardisation improve learning or flatten history?" },
              { id: "neuronames", title: "Neuroscience Based Nomenclature", family: "institution", type: "Standard", text: "Neuroscience based naming seeks clearer labels connected to function, anatomy, and systems.", rule: "Better names connect the term to useful scientific information.", examples: ["Location based terms", "Function based terms", "System based terms"], fact: "A useful neuroscience term often combines anatomical location with functional relevance.", question: "What should a good neuroscience name include?" },
              { id: "informatics", title: "Neuroinformatics Standards", family: "institution", type: "Digital standard", text: "Digital neuroscience needs consistent terms so data, models, and atlases connect accurately.", rule: "Databases need consistent labels or related findings become hard to connect.", examples: ["Brain atlases", "Ontologies", "Data dictionaries", "Model repositories"], fact: "In digital science, terminology becomes infrastructure. Bad labels create bad search, weak comparison, and broken data links.", question: "Why does terminology matter more in digital science?" }
            ]}

    };

    const coords = {
      root: [190, 1120],
      technology: [610, 320], terminology: [610, 930], eponyms: [610, 1540], institution: [610, 2150],
      historical: [1070, 110], communications: [1070, 360], computing: [1070, 610],
      vesalius: [1530, 35], harvey: [1530, 120], descartes: [1530, 205],
      encoding: [1530, 320], networks: [1530, 405], encryption: [1530, 490],
      reprogramming: [1530, 610], erasing: [1530, 695], viruses: [1530, 780],
      classical: [1070, 900], thalamus: [1070, 1235],
      greeklatin: [1530, 860], metaphoric: [1530, 945], hippocampus: [1530, 1030], amygdala: [1530, 1115],
      galen: [1530, 1250], arabic: [1530, 1335], willis: [1530, 1420],
      support: [1070, 1510], opposition: [1070, 1815], inclusivity: [1070, 2105],
      significance: [1530, 1470], honouring: [1530, 1555], bioethical: [1530, 1640],
      accuracy: [1530, 1775], infamy: [1530, 1860], misattrib: [1530, 1945], cognitive: [1530, 2030],
      male: [1530, 2170], diversity: [1530, 2255], western: [1530, 2340],
      unified: [1070, 2440], standards: [1070, 2725],
      schmitt: [1530, 2400], sfn: [1530, 2485], synthesis: [1530, 2570],
      terminologia: [1530, 2700], neuronames: [1530, 2785], informatics: [1530, 2870]
    };

    const all = new Map();
    const parent = new Map();
    const kids = new Map();
    const expanded = new Set(["root"]);
    let selected = "root";
    let focusMode = false;
    let scale = 0.44;
    let tx = 110;
    let ty = 70;
    let dragging = false;
    let start = null;

    const nodesEl = document.getElementById("nodes");
    const linksEl = document.getElementById("links");
    const viewport = document.getElementById("viewport");
    const search = document.getElementById("search");
    const focusBtn = document.getElementById("focus");
    const sideTop = document.getElementById("sideTop");
    const sideBody = document.getElementById("sideBody");

    function walk(n, p = null) {
      all.set(n.id, n);
      parent.set(n.id, p);
      kids.set(n.id, (n.children || []).map(c => c.id));
      (n.children || []).forEach(c => walk(c, n.id));
    }
    walk(data);

    function depth(id) {
      let d = 0, p = parent.get(id);
      while (p) { d++; p = parent.get(p); }
      return d;
    }

    function pathTo(id) {
      const arr = [];
      let x = id;
      while (x) { arr.unshift(x); x = parent.get(x); }
      return arr;
    }

    function descendants(id) {
      const set = new Set([id]);
      function rec(x) { for (const c of kids.get(x) || []) { set.add(c); rec(c); } }
      rec(id);
      return set;
    }

    function activeSet(id) {
      const set = new Set(pathTo(id));
      descendants(id).forEach(x => set.add(x));
      return set;
    }

    function visibleSet() {
      const set = new Set(["root"]);
      function rec(id) {
        if (!expanded.has(id)) return;
        for (const c of kids.get(id) || []) { set.add(c); rec(c); }
      }
      rec("root");
      return set;
    }

    function curve(a, b) {
      const [x1, y1] = coords[a];
      const [x2, y2] = coords[b];
      const pad1 = depth(a) === 0 ? 200 : 160;
      const pad2 = depth(b) >= 3 ? 165 : 170;
      const bend = Math.max(145, (x2 - x1) * 0.55);
      return `M ${x1 + pad1} ${y1} C ${x1 + bend} ${y1}, ${x2 - bend} ${y2}, ${x2 - pad2} ${y2}`;
    }

    function shortText(n) {
      if (kids.get(n.id).length) return `${kids.get(n.id).length} connected ideas`;
      return n.type;
    }

    function build() {
      for (const [id, n] of all.entries()) {
        const d = depth(id);
        const node = document.createElement("button");
        node.className = `node ${id === "root" ? "root" : d === 1 ? "branch" : d === 2 ? "sub" : "leaf"}`;
        node.dataset.id = id;
        node.dataset.family = n.family;
        node.style.left = coords[id][0] + "px";
        node.style.top = coords[id][1] + "px";
        node.innerHTML = `<div class="nodeTitle">${n.title}</div><div class="micro"><span class="bead"></span><span>${shortText(n)}</span></div>${kids.get(id).length ? `<span class="toggle">+</span>` : ""}`;
        node.addEventListener("click", e => {
          e.stopPropagation();
          selected = id;
          if (kids.get(id).length) {
            if (expanded.has(id)) collapse(id); else expanded.add(id);
          }
          updateSide(id);
          render();
        });
        node.addEventListener("mouseenter", () => highlight(id));
        node.addEventListener("mouseleave", () => renderHot());
        nodesEl.appendChild(node);
      }

      for (const [id] of all.entries()) {
        const p = parent.get(id);
        if (!p) continue;
        const path = document.createElementNS("http://www.w3.org/2000/svg", "path");
        path.setAttribute("d", curve(p, id));
        path.classList.add("link");
        path.dataset.from = p;
        path.dataset.to = id;
        linksEl.appendChild(path);
        const len = path.getTotalLength();
        path.style.setProperty("--len", len);
      }
    }

    function collapse(id) {
      expanded.delete(id);
      descendants(id).forEach(x => { if (x !== id) expanded.delete(x); });
    }

    function render() {
      const visible = visibleSet();
      document.querySelectorAll(".node").forEach(el => {
        const id = el.dataset.id;
        const isVisible = visible.has(id);
        el.classList.toggle("visible", isVisible);
        el.classList.toggle("gone", !isVisible);
        el.classList.toggle("open", expanded.has(id));
        const t = el.querySelector(".toggle");
        if (t) t.textContent = expanded.has(id) ? "−" : "+";
      });

      document.querySelectorAll(".link").forEach(link => {
        const on = visible.has(link.dataset.from) && visible.has(link.dataset.to);
        link.classList.toggle("visible", on);
        link.classList.toggle("hiddenLine", !on);
      });
      renderHot();
    }

    function renderHot() {
      const set = focusMode ? activeSet(selected) : null;
      document.querySelectorAll(".node").forEach(el => {
        const id = el.dataset.id;
        const hot = id === selected || (set && set.has(id));
        el.classList.toggle("hot", hot);
        el.classList.toggle("dim", Boolean(set && !set.has(id)));
      });
      document.querySelectorAll(".link").forEach(link => {
        const hot = set && set.has(link.dataset.from) && set.has(link.dataset.to);
        link.classList.toggle("hot", Boolean(hot));
        link.classList.toggle("dim", Boolean(set && !hot));
      });
    }

    function highlight(id) {
      const set = activeSet(id);
      document.querySelectorAll(".node").forEach(el => {
        const hot = set.has(el.dataset.id);
        el.classList.toggle("hot", hot);
        el.classList.toggle("dim", !hot);
      });
      document.querySelectorAll(".link").forEach(link => {
        const hot = set.has(link.dataset.from) && set.has(link.dataset.to);
        link.classList.toggle("hot", hot);
        link.classList.toggle("dim", !hot);
      });
    }

    function crumbs(id) {
      return pathTo(id).map(x => `<span class="crumb">${all.get(x).title}</span>`).join("");
    }

    function listItems(items) {
      return `<ul>${items.map(item => `<li>${item}</li>`).join("")}</ul>`;
    }

    function updateSide(id) {
      const n = all.get(id);
      sideTop.innerHTML = `<span class="tag">${n.type}</span><h2>${n.title}</h2><div class="crumbs">${crumbs(id)}</div>`;
      sideBody.innerHTML = `
        <p>${n.text}</p>
        <div class="sectionTitle">Naming rule</div>
        <div class="infoCard"><strong>Pattern to notice</strong><span>${n.rule}</span></div>
        <div class="sectionTitle">Where else this appears</div>
        <div class="infoCard"><strong>Related terms</strong>${listItems(n.examples || [])}</div>
        <div class="sectionTitle">Interesting detail</div>
        <div class="infoCard"><strong>Useful fact</strong><span>${n.fact}</span></div>
        <div class="sectionTitle">Thinking prompt</div>
        <div class="quiz"><div class="q">Question</div><p>${n.question}</p></div>
      `;
    }

    function applyTransform(soft = true) {
      if (!soft) {
        nodesEl.style.transition = "none";
        linksEl.style.transition = "none";
      } else {
        nodesEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
        linksEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
      }
      const t = `translate(${tx}px, ${ty}px) scale(${scale})`;
      nodesEl.style.transform = t;
      linksEl.style.transform = t;
      if (!soft) requestAnimationFrame(() => {
        nodesEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
        linksEl.style.transition = "transform 620ms cubic-bezier(.2, .9, .18, 1)";
      });
    }

    function fit() {
      const box = document.querySelector(".stage").getBoundingClientRect();
      const xScale = (box.width - 160) / 1900;
      const yScale = (box.height - 160) / 2960;
      scale = Math.max(0.25, Math.min(0.58, Math.min(xScale, yScale)));
      tx = 85;
      ty = 90;
      applyTransform();
    }

    function expandParents(id) {
      let p = parent.get(id);
      while (p) { expanded.add(p); p = parent.get(p); }
    }

    function doSearch(term) {
      const q = term.trim().toLowerCase();
      document.querySelectorAll(".nodeTitle").forEach(t => t.innerHTML = t.textContent);
      if (!q) { render(); return; }
      let found = null;
      for (const [id, n] of all.entries()) {
        const haystack = [n.title, n.text, n.rule, n.fact, ...(n.examples || [])].join(" ").toLowerCase();
        if (haystack.includes(q)) {
          found ||= id;
          expandParents(id);
        }
      }
      if (found) {
        selected = found;
        updateSide(found);
        render();
        highlight(found);
        const el = document.querySelector(`[data-id="${found}"] .nodeTitle`);
        if (el) el.innerHTML = el.textContent.replace(new RegExp(q, "ig"), m => `<mark>${m}</mark>`);
      }
    }

    document.getElementById("zoomIn").onclick = () => { scale = Math.min(1.10, scale + 0.07); applyTransform(); };
    document.getElementById("zoomOut").onclick = () => { scale = Math.max(0.22, scale - 0.07); applyTransform(); };
    document.getElementById("fit").onclick = fit;
    document.getElementById("focus").onclick = () => { focusMode = !focusMode; focusBtn.classList.toggle("active", focusMode); renderHot(); };
    document.getElementById("expandAll").onclick = () => { for (const [id] of all) if (kids.get(id).length) expanded.add(id); render(); };
    document.getElementById("collapseAll").onclick = () => { expanded.clear(); expanded.add("root"); selected = "root"; updateSide("root"); render(); };
    search.addEventListener("input", e => doSearch(e.target.value));

    viewport.addEventListener("pointerdown", e => {
      if (e.target.closest(".node") || e.target.closest(".toolbar")) return;
      dragging = true;
      viewport.classList.add("dragging");
      start = { x: e.clientX, y: e.clientY, tx, ty };
    });

    window.addEventListener("pointermove", e => {
      if (!dragging) return;
      tx = start.tx + e.clientX - start.x;
      ty = start.ty + e.clientY - start.y;
      applyTransform(false);
    });

    window.addEventListener("pointerup", () => {
      dragging = false;
      viewport.classList.remove("dragging");
    });

    viewport.addEventListener("wheel", e => {
      e.preventDefault();
      const old = scale;
      const delta = e.deltaY > 0 ? -0.045 : 0.045;
      scale = Math.max(0.22, Math.min(1.10, scale + delta));
      const rect = viewport.getBoundingClientRect();
      const mx = e.clientX - rect.left;
      const my = e.clientY - rect.top;
      tx = mx - (mx - tx) * (scale / old);
      ty = my - (my - ty) * (scale / old);
      applyTransform(false);
    }, { passive: false });

    build();
    updateSide("root");
    fit();
    render();
  </script>
</body>
