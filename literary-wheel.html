<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Literary Techniques — Taxonomic Diagram</title>

<style>
* { box-sizing: border-box; margin: 0; padding: 0; }

body {
  background: #f5f0e8;
  font-family: 'Georgia', 'Times New Roman', serif;
  overflow: hidden;
  height: 100vh;
  width: 100vw;
  user-select: none;
}

/* ─── HEADER ─── */
#header {
  position: fixed;
  top: 0; left: 0; right: 0;
  height: 58px;
  background: #f5f0e8;
  border-bottom: 1px solid #d9d0c2;
  display: flex;
  align-items: center;
  padding: 0 28px;
  z-index: 100;
  justify-content: space-between;
}
#header h1 {
  font-size: 15px;
  font-weight: normal;
  letter-spacing: 0.18em;
  text-transform: uppercase;
  color: #1c1c1c;
}
#header .subtitle {
  font-size: 11px;
  color: #a09080;
  letter-spacing: 0.06em;
  margin-top: 3px;
  font-style: italic;
}
#controls {
  display: flex;
  gap: 8px;
  align-items: center;
}
.btn {
  padding: 6px 16px;
  border: 1px solid #2d2d2d;
  background: transparent;
  color: #2d2d2d;
  font-family: 'Georgia', serif;
  font-size: 10px;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.22s ease;
}
.btn:hover { background: #2d2d2d; color: #f5f0e8; }

/* ─── CANVAS ─── */
#svg-container {
  position: fixed;
  top: 58px; left: 0; right: 0; bottom: 0;
}
svg { width: 100%; height: 100%; }

/* ─── LINKS ─── */
.link {
  fill: none;
  stroke-linecap: round;
  pointer-events: none;
}

/* ─── NODES ─── */
.node { cursor: pointer; }
.node circle {
  transition: r 0.3s ease, fill 0.3s ease;
}
.node text { pointer-events: none; }

/* ─── INFO PANEL ─── */
#info-panel {
  position: fixed;
  width: 330px;
  background: #fff;
  border: 1px solid #d9d0c2;
  border-top: 3px solid #c0674f;
  box-shadow: 6px 6px 28px rgba(0,0,0,0.09);
  z-index: 300;
  display: none;
  font-family: 'Georgia', serif;
}
#info-panel-header {
  padding: 15px 18px 11px;
  border-bottom: 1px solid #f0ebe3;
  cursor: move;
  display: flex;
  justify-content: space-between;
  align-items: flex-start;
  background: #fdfaf6;
}
#info-name {
  font-size: 15px;
  font-weight: normal;
  letter-spacing: 0.04em;
  color: #1c1c1c;
}
#info-panel-type {
  font-size: 9.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c0674f;
  margin-top: 4px;
  font-family: 'Arial', sans-serif;
}
#info-close {
  width: 22px; height: 22px;
  border: none; background: none;
  cursor: pointer; color: #bbb;
  font-size: 18px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0; padding: 0; line-height: 1;
  font-family: Arial, sans-serif;
}
#info-close:hover { color: #1c1c1c; }
#info-panel-body { padding: 16px 18px 20px; }
.info-section { margin-bottom: 13px; }
.info-section:last-child { margin-bottom: 0; }
.info-label {
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #c0674f;
  margin-bottom: 5px;
  font-family: 'Arial', sans-serif;
}
.info-text {
  font-size: 12.5px;
  line-height: 1.65;
  color: #3c3c3c;
}
.info-example {
  font-size: 12px;
  line-height: 1.65;
  color: #5a5a5a;
  font-style: italic;
  border-left: 2px solid #e8e0d4;
  padding-left: 10px;
  margin-top: 2px;
}
.related-tag {
  display: inline-block;
  padding: 3px 9px;
  border: 1px solid #d9d0c2;
  font-size: 10px;
  color: #666;
  margin: 2px 3px 2px 0;
  cursor: default;
  font-family: 'Georgia', serif;
  font-style: italic;
  transition: all 0.15s;
}
.related-tag:hover { background: #4a6fa5; border-color: #4a6fa5; color: #fff; font-style: normal; }

/* ─── LEGEND ─── */
#legend {
  position: fixed;
  bottom: 22px; left: 22px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 7px;
  background: rgba(245,240,232,0.88);
  padding: 12px 14px;
  border: 1px solid #d9d0c2;
}
#legend-title {
  font-size: 8.5px;
  letter-spacing: 0.14em;
  text-transform: uppercase;
  color: #a09080;
  margin-bottom: 4px;
  font-family: 'Arial', sans-serif;
}
.legend-item {
  display: flex; align-items: center; gap: 9px;
  font-size: 10.5px; color: #555;
  font-style: italic;
}
.legend-dot {
  width: 10px; height: 10px;
  border-radius: 50%;
  flex-shrink: 0;
}

/* ─── ZOOM CONTROLS ─── */
#zoom-controls {
  position: fixed;
  bottom: 22px; right: 22px;
  z-index: 100;
  display: flex;
  flex-direction: column;
  gap: 3px;
}
.zoom-btn {
  width: 34px; height: 34px;
  border: 1px solid #2d2d2d;
  background: #f5f0e8;
  color: #2d2d2d;
  font-size: 20px;
  cursor: pointer;
  display: flex; align-items: center; justify-content: center;
  transition: all 0.2s;
  font-family: Arial, sans-serif;
  line-height: 1;
}
.zoom-btn:hover { background: #2d2d2d; color: #f5f0e8; }

/* ─── NODE HOVER GLOW ─── */
.node:hover circle {
  filter: brightness(1.12);
}

/* ─── COLLAPSED INDICATOR ─── */
.collapse-ring {
  fill: none;
  stroke-width: 1.5;
  opacity: 0;
  pointer-events: none;
}
</style>
</head>

<div id="info-panel">

</div>

<div id="legend">

  <div class="legend-item"><div class="legend-dot" style="background:#c0674f"></div>Family</div>
  <div class="legend-item"><div class="legend-dot" style="background:#4a6fa5"></div>Subgroup</div>
  <div class="legend-item"><div class="legend-dot" style="background:#6a7a6a"></div>Technique</div>
  <div class="legend-item"><div class="legend-dot" style="background:#b8a898"></div>Secondary</div>
</div>

<div id="zoom-controls">
  <button class="zoom-btn" id="zoom-in">+</button>
  <button class="zoom-btn" id="zoom-out">&#8722;</button>
</div>

                example: "Tolstoy's omniscient third-person narration in 'War and Peace' moves effortlessly between thousands of minds across a continent and a decade of history.",
                related: ["First Person", "Free Indirect Discourse", "Omniscient Narrator"]
              },
              children: [
                {
                  name: "Free Indirect Discourse",
                  type: "secondary",
                  info: {
                    definition: "A narrative mode blending third-person narration with a character's thoughts and speech — without quotation marks or reporting clauses.",
                    effect: "Creates a double voice — narrator and character speaking simultaneously — enabling both intimacy and ironic distance in the same sentence.",
                    example: "Austen: 'It is a truth universally acknowledged...' — the irony depends on the gap between the narrator's voice and the character's credulous acceptance of the 'truth'.",
                    related: ["Third Person", "Stream of Consciousness", "Irony"]
                  }
                },
                {
                  name: "Omniscient Narrator",
                  type: "secondary",
                  info: {
                    definition: "A narrator with total knowledge — access to every character's thoughts, feelings, motivations, and the full arc of events.",
                    effect: "Allows vast social panoramas and explicit moral commentary; the godlike perspective confers authority but also implies responsibility.",
                    example: "George Eliot's narrators in 'Middlemarch' have access to every character and explicitly comment on human nature — 'If we had a keen vision... it would be like hearing the grass grow.'",
                    related: ["Third Person", "Free Indirect Discourse"]
                  }
                }
              ]
            },
            {
              name: "Stream of Consciousness",
              type: "technique",
              info: {
                definition: "A narrative technique that attempts to render the continuous, associative flow of a character's thoughts and perceptions directly on the page.",
                effect: "Creates radical psychological immediacy — the reader inhabits a mind rather than observing it from outside.",
                example: "Molly Bloom's soliloquy closes Joyce's 'Ulysses': forty-seven pages of unpunctuated interior monologue that ends — triumphantly — with 'yes'.",
                related: ["Free Indirect Discourse", "Interior Monologue", "First Person"]
              },
              children: [
                {
                  name: "Interior Monologue",
                  type: "secondary",
                  info: {
                    definition: "A character's inner thoughts rendered directly, as if overheard — more grammatically structured than stream of consciousness.",
                    effect: "Creates self-revelation through the character's own words — we understand them through their own consciousness rather than authorial description.",
                    example: "The structured interior monologues of Faulkner's 'The Sound and the Fury' give each of four narrators a radically different relationship to language and reality.",
                    related: ["Stream of Consciousness", "First Person", "Free Indirect Discourse"]
                  }
                }
              ]
            }
          ]
        },
        {
          name: "Rhetorical Devices",
          type: "subgroup",
          info: {
            definition: "Techniques originally developed for persuasive speech and argument — designed to engage reason, emotion, and credibility in an audience.",
            effect: "The classical tools of persuasion: ethos (credibility), pathos (emotion), and logos (reason) — still the architecture of all effective argument.",
            example: "The three classical rhetorical appeals — ethos, pathos, logos — underpin all effective argumentative writing from Aristotle to the present day.",
            related: ["Syntactic Devices", "Repetitive", "Structural Repetition"]
          },
          children: [
            {
              name: "Rhetorical Question",
              type: "technique",
              info: {
                definition: "A question posed for rhetorical effect rather than to elicit an answer — the answer is assumed, implied, or obvious.",
                effect: "Draws the audience into apparent agreement, implies that the answer is self-evident, and makes the questioner seem reasonable rather than argumentative.",
                example: "Shylock: 'If you prick us, do we not bleed? If you tickle us, do we not laugh? If you poison us, do we not die?' — each question is an unanswerable argument for humanity.",
                related: ["Apostrophe", "Pathos", "Logos", "Anaphora"]
              }
            },
            {
              name: "Hyperbole",
              type: "technique",
              info: {
                definition: "Deliberate and obvious exaggeration used for rhetorical emphasis — not intended to be taken literally.",
                effect: "Creates rhetorical emphasis, comic exaggeration, or expresses emotional states too intense for literal language to capture.",
                example: "Marvell's 'To His Coy Mistress': 'I would love you ten years before the Flood / And you should, if you please, refuse / Till the conversion of the Jews' — eternity as a rhetorical gambit.",
                related: ["Litotes", "Irony", "Satire"]
              }
            },
            {
              name: "Litotes",
              type: "technique",
              info: {
                definition: "Understatement achieved by denying the opposite — saying something is 'not bad' to communicate that it is good, or 'not nothing' to mean 'a great deal'.",
                effect: "Creates ironic understatement; characteristically British reserve uses litotes to signal powerful feeling through apparent dismissal.",
                example: "Beowulf's account of his swimming match: 'I have heard that you have undertaken not a few adventures.' A Norse warrior's litotes for extraordinary feats.",
                related: ["Hyperbole", "Irony", "Meiosis"]
              }
            },
            {
              name: "Satire",
              type: "technique",
              info: {
                definition: "The use of irony, exaggeration, wit, and ridicule to expose, critique, and mock human folly, vice, and institutional failure.",
                effect: "Allows critique of power under the guise of comedy — satire has historically protected writers from censure while enabling the most pointed social criticism.",
                example: "Swift's 'A Modest Proposal', Pope's 'The Rape of the Lock', Voltaire's 'Candide', Orwell's 'Animal Farm' — satire is the literature of moral outrage.",
                related: ["Irony", "Hyperbole", "Parody", "Burlesque"]
              },
              children: [
                {
                  name: "Parody",
                  type: "secondary",
                  info: {
                    definition: "A comic imitation of a specific literary work, genre, or author's style — exaggerating its characteristic features for comic or critical effect.",
                    effect: "By mimicking and distorting, parody illuminates the conventions, limitations, and ideological assumptions of what it imitates.",
                    example: "Fielding's 'Shamela' parodies Richardson's 'Pamela'; Cervantes's 'Don Quixote' parodies the entire tradition of chivalric romance.",
                    related: ["Satire", "Pastiche", "Irony", "Burlesque"]
                  }
                },
                {
                  name: "Burlesque",
                  type: "secondary",
                  info: {
                    definition: "Comic treatment achieved by applying grand, elevated style to trivial subjects (mock-heroic) or by treating serious subjects in a degraded, undignified manner.",
                    effect: "The gap between subject and treatment is itself the comic mechanism — dignity and indignity collide, exposing both.",
                    example: "Pope's 'The Rape of the Lock' applies the full apparatus of Homeric epic — invocations, epic similes, supernatural machinery — to a society scandal about a lock of hair.",
                    related: ["Parody", "Satire", "Irony"]
                  }
                }
              ]
            }
          ]
        }
      ]
    }
  ]
};

// ═══════════════════════════════════════════════════════════════
// COLOUR CONFIGURATION
// ═══════════════════════════════════════════════════════════════
const colors = {
  root:      { fill: "#1c1c1c", stroke: "#1c1c1c", text: "#1c1c1c", link: "#888" },
  family:    { fill: "#c0674f", stroke: "#c0674f", text: "#c0674f", link: "#c0674f" },
  subgroup:  { fill: "#4a6fa5", stroke: "#4a6fa5", text: "#4a6fa5", link: "#4a6fa5" },
  technique: { fill: "#6a7a6a", stroke: "#6a7a6a", text: "#5a6a5a", link: "#9aaa9a" },
  secondary: { fill: "#b8a898", stroke: "#b8a898", text: "#8a7a6a", link: "#c8b8a8" }
};

const radii = { root: 13, family: 10, subgroup: 8, technique: 6, secondary: 4.5 };

// ═══════════════════════════════════════════════════════════════
// TREE SETUP
// ═══════════════════════════════════════════════════════════════
const DURATION = 580;
const NODE_X = 170;   // horizontal separation between sibling nodes
const NODE_Y = 160;   // vertical distance between depth levels

let nodeIdCounter = 0;

const svg = d3.select("#main-svg");
const g = d3.select("#zoom-group");
const linksGroup = d3.select("#links-group");
const nodesGroup = d3.select("#nodes-group");

let W = window.innerWidth;
let H = window.innerHeight - 58;

// Vertical tree layout (top → down). nodeSize([x-spread, y-depth])
const treeLayout = d3.tree()
  .nodeSize([NODE_X, NODE_Y])
  .separation((a, b) => a.parent === b.parent ? 1 : 1.4);

// Build hierarchy
let root = d3.hierarchy(taxonomyData);
root.x0 = 0;
root.y0 = 0;

// Collapse helpers
function collapseNode(d) {
  if (d.children) {
    d._children = d.children;
    d._children.forEach(collapseNode);
    d.children = null;
  }
}
function expandNode(d) {
  if (d._children) { d.children = d._children; d._children = null; }
}
function expandAll(d) {
  expandNode(d);
  if (d.children) d.children.forEach(expandAll);
}
function collapseAll(d) {
  if (d.children) { d.children.forEach(collapseAll); collapseNode(d); }
}

// Start: families visible, everything below collapsed
root.children.forEach(collapseNode);

// ═══════════════════════════════════════════════════════════════
// ZOOM & PAN
// ═══════════════════════════════════════════════════════════════
const zoom = d3.zoom()
  .scaleExtent([0.1, 3.5])
  .on("zoom", (event) => g.attr("transform", event.transform));

svg.call(zoom);

// Vertical tree: root centred horizontally, near the top
const initialTransform = d3.zoomIdentity.translate(W / 2, 90).scale(0.5);
svg.call(zoom.transform, initialTransform);

// ═══════════════════════════════════════════════════════════════
// UPDATE / RENDER
// ═══════════════════════════════════════════════════════════════
function update(source) {
  const treeData = treeLayout(root);
  const nodes = treeData.descendants();
  const links = treeData.links();

  // ─── NODES ───────────────────────────────────────────────
  const nodeJoin = nodesGroup.selectAll("g.node")
    .data(nodes, d => d.id || (d.id = ++nodeIdCounter));

  // ENTER
  const nodeEnter = nodeJoin.enter().append("g")
    .attr("class", d => `node node--${d.data.type}`)
    .attr("transform", `translate(${source.x0 || 0},${source.y0 || 0})`)
    .style("opacity", 0)
    .on("click", (event, d) => {
      event.stopPropagation();
      // Toggle
      if (d.children) {
        d._children = d.children;
        d.children = null;
      } else if (d._children) {
        d.children = d._children;
        d._children = null;
      }
      update(d);
      // Show info panel
      if (d.data.info) showInfo(d, event);
    });

  // Circle
  nodeEnter.append("circle")
    .attr("r", 0)
    .attr("fill", d => colors[d.data.type].fill)
    .attr("stroke", d => colors[d.data.type].stroke)
    .attr("stroke-width", d => d.data.type === "family" ? 2.5 : 1.8)
    .attr("filter", d => d.data.type === "root" ? "url(#shadow-lg)" : d.data.type === "family" ? "url(#shadow-sm)" : null);

  // Collapsed ring indicator
  nodeEnter.append("circle")
    .attr("class", "collapse-ring")
    .attr("r", 0)
    .attr("stroke", d => colors[d.data.type].stroke)
    .attr("stroke-dasharray", "3,2");

  // ── Text background rect: prevents link lines showing through labels ──
  nodeEnter.append("rect")
    .attr("class", "label-bg")
    .attr("fill", "#f5f0e8")
    .attr("fill-opacity", 0.92)
    .attr("rx", 2)
    .attr("x", d => radii[d.data.type] + 4)
    .attr("y", -7)
    .attr("height", 14)
    .attr("width", d => {
      const fs = {root:13,family:12,subgroup:11,technique:10,secondary:9.5}[d.data.type];
      return d.data.name.length * fs * 0.58 + 10;
    });

  // Label — always to the RIGHT of the circle, text-anchor start
  nodeEnter.append("text")
    .attr("dy", "0.32em")
    .attr("x", d => radii[d.data.type] + 7)
    .style("text-anchor", "start")
    .style("opacity", 0)
    .style("fill", d => colors[d.data.type].text)
    .style("font-size", d => ({root:13,family:12,subgroup:11,technique:10,secondary:9.5}[d.data.type]) + "px")
    .style("font-weight", d => ["root","family"].includes(d.data.type) ? "600" : "normal")
    .style("font-style", d => d.data.type === "secondary" ? "italic" : "normal")
    .style("letter-spacing", d => d.data.type === "root" ? "0.04em" : "0.02em")
    .text(d => d.data.name);

  // MERGE
  const nodeUpdate = nodeEnter.merge(nodeJoin);

  // Vertical layout: x = horizontal position, y = depth (vertical)
  nodeUpdate.transition().duration(DURATION)
    .attr("transform", d => `translate(${d.x},${d.y})`)
    .style("opacity", 1);

  // Circle update
  nodeUpdate.select("circle:not(.collapse-ring)")
    .transition().duration(DURATION)
    .attr("r", d => radii[d.data.type])
    .attr("fill", d => d._children
      ? colors[d.data.type].fill
      : d.data.type === "root" ? colors.root.fill : colors[d.data.type].fill + "dd");

  // Collapse ring
  nodeUpdate.select(".collapse-ring")
    .transition().duration(DURATION)
    .attr("r", d => d._children ? radii[d.data.type] + 4.5 : 0)
    .style("opacity", d => d._children ? 0.45 : 0)
    .attr("stroke", d => colors[d.data.type].stroke);

  // Update label background width (radius doesn't change but keeps position correct)
  nodeUpdate.select("rect.label-bg")
    .transition().duration(DURATION)
    .attr("x", d => radii[d.data.type] + 4);

  // Label always to the right — text-anchor stays "start"
  nodeUpdate.select("text")
    .transition().duration(DURATION)
    .style("opacity", 1)
    .attr("x", d => radii[d.data.type] + 7)
    .style("text-anchor", "start");

  // EXIT
  const nodeExit = nodeJoin.exit()
    .transition().duration(DURATION)
    .attr("transform", `translate(${source.x},${source.y})`)
    .style("opacity", 0)
    .remove();

  nodeExit.select("circle").attr("r", 0);

  // ─── LINKS ───────────────────────────────────────────────
  // Orthogonal step-link: goes straight down, then horizontal, then straight down.
  // This avoids diagonal lines crossing node labels.
  function stepPath(s, t) {
    const sx = s.x, sy = s.y, tx = t.x, ty = t.y;
    const midY = (sy + ty) / 2;
    const dx = tx - sx;
    if (Math.abs(dx) < 1) {
      return `M${sx},${sy} L${tx},${ty}`;
    }
    const r = Math.min(10, Math.abs(dx) / 2, (ty - sy) / 3);
    const sign = dx > 0 ? 1 : -1;
    return [
      `M${sx},${sy}`,
      `L${sx},${midY - r}`,
      `Q${sx},${midY} ${sx + sign * r},${midY}`,
      `L${tx - sign * r},${midY}`,
      `Q${tx},${midY} ${tx},${midY + r}`,
      `L${tx},${ty}`
    ].join(' ');
  }

  const degenerate = stepPath(
    { x: source.x0 || 0, y: source.y0 || 0 },
    { x: source.x0 || 0, y: source.y0 || 0 }
  );

  const linkJoin = linksGroup.selectAll("path.link")
    .data(links, d => d.target.id);

  const linkEnter = linkJoin.enter().insert("path", "g")
    .attr("class", "link")
    .attr("d", degenerate)
    .attr("stroke", d => colors[d.target.data.type].link)
    .attr("stroke-width", d => ({ root:2, family:1.8, subgroup:1.4, technique:1.2, secondary:0.9 }[d.target.data.type]))
    .attr("stroke-opacity", 0)
    .attr("stroke-dasharray", d => d.target.data.type === "secondary" ? "5,3" : null);

  linkEnter.merge(linkJoin)
    .transition().duration(DURATION)
    .attr("d", d => stepPath(d.source, d.target))
    .attr("stroke-opacity", d => ({ root:0.4, family:0.5, subgroup:0.45, technique:0.4, secondary:0.35 }[d.target.data.type]));

  const exitPoint = { x: source.x, y: source.y };
  linkJoin.exit()
    .transition().duration(DURATION)
    .attr("d", stepPath(exitPoint, exitPoint))
    .attr("stroke-opacity", 0)
    .remove();

  // Store for transitions
  nodes.forEach(d => { d.x0 = d.x; d.y0 = d.y; });
}

// First render
update(root);

// ═══════════════════════════════════════════════════════════════
// INFO PANEL
// ═══════════════════════════════════════════════════════════════
const infoPanel = document.getElementById("info-panel");
const infoClose = document.getElementById("info-close");

function showInfo(d, event) {
  const info = d.data.info || {};
  const typeColor = colors[d.data.type].fill;

  document.getElementById("info-name").textContent = d.data.name;
  document.getElementById("info-panel-type").textContent = d.data.type.charAt(0).toUpperCase() + d.data.type.slice(1);
  document.getElementById("info-panel-type").style.color = typeColor;
  document.getElementById("info-definition").textContent = info.definition || "—";
  document.getElementById("info-effect").textContent = info.effect || "—";
  document.getElementById("info-example").textContent = info.example || "—";
  infoPanel.style.borderTopColor = typeColor;

  const relatedEl = document.getElementById("info-related");
  const relatedSection = document.getElementById("info-related-section");
  relatedEl.innerHTML = "";
  if (info.related && info.related.length > 0) {
    info.related.forEach(r => {
      const tag = document.createElement("span");
      tag.className = "related-tag";
      tag.textContent = r;
      relatedEl.appendChild(tag);
    });
    relatedSection.style.display = "block";
  } else {
    relatedSection.style.display = "none";
  }

  // Default: top-right corner of the viewport
  infoPanel.style.right = "20px";
  infoPanel.style.left  = "auto";
  infoPanel.style.top   = "68px";
  infoPanel.style.display = "block";
}

infoClose.addEventListener("click", () => infoPanel.style.display = "none");

// Draggable panel — on drag start, convert from right-anchored to left-anchored positioning
let dragging = false, dragX, dragY;
document.getElementById("info-panel-header").addEventListener("mousedown", e => {
  dragging = true;
  const rect = infoPanel.getBoundingClientRect();
  // Switch to left-based so we can drag freely
  infoPanel.style.left  = rect.left + "px";
  infoPanel.style.right = "auto";
  dragX = e.clientX - rect.left;
  dragY = e.clientY - rect.top;
  e.preventDefault();
});
document.addEventListener("mousemove", e => {
  if (!dragging) return;
  infoPanel.style.left = (e.clientX - dragX) + "px";
  infoPanel.style.top  = (e.clientY - dragY) + "px";
});
document.addEventListener("mouseup", () => dragging = false);

// ═══════════════════════════════════════════════════════════════
// CONTROLS
// ═══════════════════════════════════════════════════════════════
document.getElementById("btn-expand-all").addEventListener("click", () => {
  root.children.forEach(expandAll);
  update(root);
});

document.getElementById("btn-collapse-all").addEventListener("click", () => {
  root.children.forEach(collapseAll);
  update(root);
});

document.getElementById("btn-reset").addEventListener("click", () => {
  svg.transition().duration(480).call(
    zoom.transform,
    d3.zoomIdentity.translate(W / 2, 90).scale(0.5)
  );
});

document.getElementById("zoom-in").addEventListener("click", () => {
  svg.transition().duration(280).call(zoom.scaleBy, 1.45);
});
document.getElementById("zoom-out").addEventListener("click", () => {
  svg.transition().duration(280).call(zoom.scaleBy, 1 / 1.45);
});

// Close info panel on background click
svg.on("click", () => { infoPanel.style.display = "none"; });

// Resize
window.addEventListener("resize", () => {
  W = window.innerWidth;
  H = window.innerHeight - 58;
});
</script>
</body>
</html>
