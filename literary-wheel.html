am of Consciousness",axis:"cross"},{from:"Parody",to:"Pastiche",axis:"mirror"},{from:"Allusion",to:"Quotation",axis:"subtype"},{from:"Quotation",to:"Epigraph",axis:"subtype"},{from:"Mise en Abyme",to:"Frame Narrative",axis:"cross"},{from:"Zeugma",to:"Syllepsis",axis:"gradient"},{from:"Flashback (Analepsis)",to:"Flash-Forward (Prolepsis)",axis:"mirror"},{from:"Accumulation",to:"Gradatio",axis:"subtype"},{from:"Alliteration",to:"Consonance",axis:"gradient"},{from:"Alliteration",to:"Sibilance",axis:"subtype"},{from:"Rhyme",to:"Slant Rhyme",axis:"gradient"},{from:"Rhyme",to:"Internal Rhyme",axis:"subtype"},{from:"Cacophony",to:"Euphony",axis:"mirror"},{from:"Symbol",to:"Motif",axis:"cross"},{from:"Archetype",to:"Symbol",axis:"cross"},{from:"Unreliable Narrator",to:"Naive Narrator",axis:"subtype"},{from:"Dramatic Monologue",to:"Interior Monologue",axis:"cross"},{from:"Antanaclasis",to:"Polyptoton",axis:"effect"},{from:"Periodic Sentence",to:"Loose Sentence",axis:"mirror"},{from:"Ethos",to:"Pathos",axis:"effect"},{from:"Pathos",to:"Logos",axis:"effect"},{from:"Hyperbaton",to:"Anastrophe",axis:"subtype"},{from:"Frame Narrative",to:"Non-Linear Narrative",axis:"effect"},{from:"Synaesthesia",to:"Visual Imagery",axis:"cross"},{from:"Binary Opposition",to:"Antithesis",axis:"effect"},{from:"Intertextuality (Explicit)",to:"Intertextuality (Implicit)",axis:"gradient"},{from:"Metafiction",to:"Breaking the Fourth Wall",axis:"subtype"},{from:"Mise en Abyme",to:"Self-Referentiality",axis:"subtype"}
    ];

    const colors = {

    };

    const radii = { root: 14, family: 11, subgroup: 9, technique: 7 };
    const NODE_X = 230, NODE_Y = 175, DURATION = 500;
    const W = window.innerWidth, H = window.innerHeight;

    const taxonomyData = {"name":"Literary Techniques","type":"root","info":{definition:"A comprehensive taxonomy of literary devices and techniques.",effect:"",example:"",related:[]},"children":[{"name":"Descriptive","type":"family","info":{definition:"Techniques that create vivid sensory impressions and establish diction/tone.",effect:"",example:"",related:[]},"children":[{"name":"Imagery","type":"subgroup","info":{definition:"The use of concrete sensory language to evoke mental images.",effect:"",example:"",related:[]},"children":[{name:"Visual Imagery",type:"technique",info:{definition:"Language that appeals to the sense of sight.",effect:"Creates mental pictures for the reader.",example:"Keats: 'Season of mists and mellow fruitfulness'",related:["Auditory Imagery","Tactile Imagery","Synaesthesia","Ekphrasis"]}},{name:"Auditory Imagery",type:"technique",info:{definition:"Language describing sounds and auditory experiences.",effect:"Engages the reader's sense of hearing.",example:"Poe: 'The tintinnabulation of the bells'",related:["Visual Imagery","Onomatopoeia","Cacophony","Euphony"]}},{name:"Olfactory Imagery",type:"technique",info:{definition:"Language that appeals to the sense of smell.",effect:"Evokes powerful sensory and emotional memories.",example:"Proust: descriptions of madeleines and tea",related:["Gustatory Imagery","Tactile Imagery","Synaesthesia"]}},{name:"Gustatory Imagery",type:"technique",info:{definition:"Language that appeals to the sense of taste.",effect:"Creates intimate, immediate sensory experience.",example:"Joyce: sensory food descriptions in Ulysses",related:["Olfactory Imagery","Tactile Imagery","Synaesthesia"]}},{name:"Tactile Imagery",type:"technique",info:{definition:"Language describing physical sensations and textures.",effect:"Engages the reader's tactile sense.",example:"Hardy: 'the rough texture of bark'",related:["Kinaesthetic Imagery","Visual Imagery","Synaesthesia"]}},{name:"Kinaesthetic Imagery",type:"technique",info:{definition:"Language evoking physical movement and body sensation.",effect:"Makes readers feel physically engaged with the text.",example:"D.H. Lawrence descriptions of movement and energy",related:["Tactile Imagery","Synaesthesia"]}},{name:"Synaesthesia",type:"technique",info:{definition:"Describing one sensory experience using language of another sense.",effect:"Creates unexpected, striking sensory juxtapositions.",example:"Baudelaire: 'I love the beautiful spring—colored sounds'",related:["Visual Imagery","Auditory Imagery","Kinaesthetic Imagery"]}},{name:"Pathetic Fallacy",type:"technique",info:{definition:"Attributing human emotions to nature or inanimate objects.",effect:"Reflects character states through environmental description.",example:"Shakespeare: stormy weather during emotional turmoil",related:["Personification","Transferred Epithet","Visual Imagery"]}},{name:"Ekphrasis",type:"technique",info:{definition:"Detailed description of a work of art within a literary work.",effect:"Allows exploration of aesthetic and philosophical themes.",example:"Keats: 'Ode on a Grecian Urn'",related:["Visual Imagery","Allusion"]}},{name:"Sensory Accumulation",type:"technique",info:{definition:"Piling multiple sensory images in sequence.",effect:"Overwhelms and immerses the reader in an atmosphere.",example:"Modernist poetry: multiple sensory impressions layered together",related:["Accumulation","Visual Imagery","Cataloguing"]}}]},{"name":"Diction","type":"subgroup","info":{definition:"The choice and use of words and their effects.",effect:"",example:"",related:[]},"children":[{name:"Connotation",type:"technique",info:{definition:"The emotional or cultural associations of a word beyond its definition.",effect:"Shapes the reader's emotional response to language.",example:"'Slim' vs 'skinny': same meaning, different connotations",related:["Denotation","Loaded Language","Register Shift"]}},{name:"Denotation",type:"technique",info:{definition:"The literal, dictionary definition of a word.",effect:"Provides precise meaning independent of emotion.",example:"'Chair' denotes: a piece of furniture for sitting",related:["Connotation","Abstract Diction","Concrete Diction"]}},{name:"Archaism",type:"technique",info:{definition:"Use of outdated or obsolete words.",effect:"Creates a sense of historical distance or formality.",example:"Shakespeare: 'thee,' 'thou,' 'hath'",related:["Latinate Diction","Register Shift","Neologism"]}},{name:"Neologism",type:"technique",info:{definition:"A newly created or recently adopted word.",effect:"Conveys innovation, strangeness, or novelty.",example:"Joyce: 'quiddity,' 'snollygoster' in experimental fiction",related:["Archaism","Jargon","Register Shift"]}},{name:"Colloquialism",type:"technique",info:{definition:"Informal, conversational language or idioms.",effect:"Creates voice, accessibility, and realism.",example:"'Gonna,' 'ain't,' 'that's cool'",related:["Slang","Jargon","Register Shift"]}},{name:"Jargon",type:"technique",info:{definition:"Technical or specialized vocabulary of a field.",effect:"Creates authenticity within a professional context.",example:"Medical jargon in clinical novels; legal jargon in courtroom drama",related:["Colloquialism","Slang","Loaded Language"]}},{name:"Slang",type:"technique",info:{definition:"Very informal, often youth-oriented language.",effect:"Establishes voice, character, and temporal setting.",example:"Street slang in urban fiction; dated slang shows era",related:["Colloquialism","Jargon","Register Shift"]}},{name:"Euphemism",type:"technique",info:{definition:"A mild or indirect word substituted for something harsh or blunt.",effect:"Softens difficult topics or maintains politeness.",example:"'Passed away' for died; 'ladies' room' for bathroom",related:["Dysphemism","Loaded Language","Understatement"]}},{name:"Dysphemism",type:"technique",info:{definition:"A harsh or blunt term substituted for a mild one.",effect:"Creates shock, vulgarity, or brutal honesty.",example:"'Croak' for die; offensive slurs for clinical terms",related:["Euphemism","Loaded Language","Sarcasm"]}},{name:"Register Shift",type:"technique",info:{definition:"Sudden change in formality or style of language.",effect:"Creates jarring effects or highlights character duality.",example:"Mixing 'thee' with modern slang; formal speech suddenly becoming crude",related:["Archaism","Colloquialism","Connotation"]}},{name:"Abstract Diction",type:"technique",info:{definition:"Use of general, intangible words (ideas, emotions, concepts).",effect:"Creates philosophical tone and emotional distance.",example:"'Love,' 'freedom,' 'truth' without concrete referents",related:["Concrete Diction","Denotation","Loaded Language"]}},{name:"Concrete Diction",type:"technique",info:{definition:"Use of specific, tangible, sensory words.",effect:"Creates vividness and immediate sensory engagement.",example:"'Red rose' instead of 'symbol of love'",related:["Abstract Diction","Denotation","Visual Imagery"]}},{name:"Latinate Diction",type:"technique",info:{definition:"Vocabulary derived from Latin, often polysyllabic and formal.",effect:"Creates elevated, scholarly, or archaic tone.",example:"Legal and academic writing; 'perspicacious' instead of 'sharp'",related:["Anglo-Saxon Diction","Archaism","Register Shift"]}},{name:"Anglo-Saxon Diction",type:"technique",info:{definition:"Vocabulary from Germanic roots, typically short and plain.",effect:"Creates immediacy, directness, and simplicity.",example:"'Help' instead of 'assistance'; 'way' instead of 'pathway'",related:["Latinate Diction","Concrete Diction","Colloquialism"]}},{name:"Loaded Language",type:"technique",info:{definition:"Words chosen for their strong emotional associations.",effect:"Manipulates the reader's emotional response.",example:"'Freedom fighter' vs 'terrorist' for the same person",related:["Connotation","Dysphemism","Jargon"]}},{name:"Nominalization",type:"technique",info:{definition:"Converting verbs or adjectives into nouns.",effect:"Creates abstraction and distance from action.",example:"'Beauty' (noun) instead of 'beautify' (verb)",related:["Abstract Diction","Verbing"]}},{name:"Verbing",type:"technique",info:{definition:"Converting nouns or other words into verbs.",effect:"Creates energy and unconventional usage.",example:"'Google it,' 'Xerox this,' 'to author a book'",related:["Nominalization","Neologism"]}}]},{"name":"Tone & Mood","type":"subgroup","info":{definition:"The emotional atmosphere and author's attitude conveyed in text.",effect:"",example:"",related:[]},"children":[{name:"Irony",type:"technique",info:{definition:"Expression where the intended meaning contradicts the literal meaning.",effect:"Creates depth and invites interpretation.",example:"Saying 'Great job!' when someone fails catastrophically",related:["Sarcasm","Verbal Irony","Dramatic Irony","Situational Irony"]}},{name:"Sarcasm",type:"technique",info:{definition:"Bitter, cutting irony often using exaggeration.",effect:"Conveys contempt or mockery.",example:"'Oh sure, that's a brilliant idea!' (when it isn't)",related:["Verbal Irony","Cynicism","Dysphemism"]}},{name:"Cynicism",type:"technique",info:{definition:"Belief that people are motivated by self-interest; tone of contempt.",effect:"Creates world-weary, disillusioned atmosphere.",example:"Dostoevsky's Underground Man; noir fiction",related:["Sarcasm","Detachment","Sardonic Tone"]}},{name:"Melancholy",type:"technique",info:{definition:"Tone of deep, reflective sadness.",effect:"Evokes contemplative, nostalgic mood.",example:"Keats: 'When I Have Fears'; Romantic poetry generally",related:["Wistfulness","Elegy"]}},{name:"Wistfulness",type:"technique",info:{definition:"Tone of yearning for something lost or unattainable.",effect:"Creates bittersweet, longing atmosphere.",example:"Fitzgerald: The Great Gatsby's nostalgic tone",related:["Melancholy","Nostalgia","Elegy"]}},{name:"Reverence",type:"technique",info:{definition:"Tone of deep respect or awe.",effect:"Elevates subject matter and invites admiration.",example:"Religious poetry; Milton's treatment of divinity",related:["Lyric Intensity","Archaism","Elevated Diction"]}},{name:"Detachment",type:"technique",info:{definition:"Tone of emotional distance or clinical observation.",effect:"Creates objectivity or alienation.",example:"Hemingway's sparse, emotionally distant prose",related:["Cynicism","Understatement","Stream of Consciousness"]}},{name:"Urgency",type:"technique",info:{definition:"Tone conveying pressure, haste, or imminent action.",effect:"Increases pacing and reader tension.",example:"Exclamatory syntax; short, breathless sentences",related:["Caesura","Enjambment","Free Verse"]}},{name:"Ambivalence",type:"technique",info:{definition:"Tone expressing mixed or contradictory feelings.",effect:"Reflects psychological complexity.",example:"Sylvia Plath's simultaneous love and hatred",related:["Paradox","Oxymoron","Irony"]}},{name:"Elegy",type:"technique",info:{definition:"Mournful tone expressing grief or lamentation.",effect:"Evokes solemn, contemplative response to loss.",example:"Gray: 'Elegy Written in a Country Churchyard'",related:["Melancholy","Wistfulness","Reverence"]}},{name:"Sardonic Tone",type:"technique",info:{definition:"Bitterly mocking or scornfully ironic tone.",effect:"Conveys scathing criticism wrapped in humor.",example:"Oscar Wilde; Jonathan Swift's satirical works",related:["Sarcasm","Cynicism","Verbal Irony"]}},{name:"Lyric Intensity",type:"technique",info:{definition:"Heightened emotional expression in personal, subjective tone.",effect:"Draws reader into immediate emotional experience.",example:"Romantic and contemporary lyric poetry",related:["Reverence","Ambivalence","Free Verse"]}},{name:"Understatement",type:"technique",info:{definition:"Expressing something with less force than warranted.",effect:"Creates subtlety, irony, or understated elegance.",example:"British comedy: 'That's rather unpleasant' for disasters",related:["Litotes","Meiosis","Irony","Hyperbole"]}},{name:"Hyperbole",type:"technique",info:{definition:"Extreme exaggeration for emphasis or effect.",effect:"Creates emphasis, humor, or emotional intensity.",example:"'I've told you a million times!' 'I'm so hungry I could eat a horse'",related:["Understatement","Bathos","Anticlimax"]}}]}]},{"name":"Repetitive","type":"family","info":{definition:"Techniques using recurring patterns of sound, words, or structure.",effect:"",example:"",related:[]},"children":[{"name":"Phonetic","type":"subgroup","info":{definition:"Repetition and patterns of sounds within words.",effect:"",example:"",related:[]},"children":[{name:"Alliteration",type:"technique",info:{definition:"Repetition of initial consonant sounds in nearby words.",effect:"Creates musicality, emphasis, and mnemonic quality.",example:"'Peter Piper picked a peck of pickled peppers'",related:["Assonance","Consonance","Sibilance"]}},{name:"Assonance",type:"technique",info:{definition:"Repetition of vowel sounds within or across words.",effect:"Creates musicality and internal harmony.",example:"'The cat sat on the mat' (repetition of 'a' sound)",related:["Alliteration","Consonance"]}},{name:"Consonance",type:"technique",info:{definition:"Repetition of consonant sounds within or at the end of words.",effect:"Creates subtle sonic reinforcement.",example:"'Click, clack, clock' (repetition of 'ck')",related:["Alliteration","Assonance","Plosive Sounds"]}},{name:"Sibilance",type:"technique",info:{definition:"Repetition of 's' and 'sh' sounds.",effect:"Creates hissing, whispered, or menacing quality.",example:"'Surely the pale princess saw the sunset'",related:["Alliteration","Fricative Sounds","Cacophony"]}},{name:"Onomatopoeia",type:"technique",info:{definition:"Words that imitate the sounds they represent.",effect:"Creates immediate sensory engagement through sound.",example:"'Buzz,' 'hiss,' 'splash,' 'crash'",related:["Auditory Imagery","Cacophony","Fricative Sounds"]}},{name:"Rhyme",type:"technique",info:{definition:"Correspondence of sound between words, typically at line endings.",effect:"Creates musicality, expectation, and unity.",example:"End rhyme: 'night' and 'light'; 'sing' and 'ring'",related:["Internal Rhyme","Slant Rhyme","Eye Rhyme"]}},{name:"Internal Rhyme",type:"technique",info:{definition:"Rhyme occurring within a line rather than at the end.",effect:"Creates internal rhythm and musicality.",example:"Poe: 'Once upon a midnight dreary, while I pondered, weary'",related:["Rhyme","Slant Rhyme","Rhythm"]}},{name:"Slant Rhyme",type:"technique",info:{definition:"Words that are close but not perfect rhymes.",effect:"Creates tension and modernity; avoids predictability.",example:"'Home' and 'come'; 'soul' and 'shell'",related:["Rhyme","Eye Rhyme","Free Verse"]}},{name:"Eye Rhyme",type:"technique",info:{definition:"Words that look similar but don't sound alike.",effect:"Creates visual rhyme effect.",example:"'Love' and 'move'; 'through' and 'tough'",related:["Rhyme","Slant Rhyme"]}},{name:"Cacophony",type:"technique",info:{definition:"Harsh, discordant sounds that are difficult to pronounce.",effect:"Creates discomfort or negative emotional response.",example:"Plosive consonants: 'blunt brick bat'",related:["Euphony","Sibilance","Plosive Sounds"]}},{name:"Euphony",type:"technique",info:{definition:"Pleasant, smooth, easy-to-pronounce sounds.",effect:"Creates musical, pleasant auditory effect.",example:"Soft vowels and liquid consonants: 'Louisa, the lilies float'",related:["Cacophony","Assonance","Fricative Sounds"]}},{name:"Rhythm",type:"technique",info:{definition:"The pattern of stressed and unstressed syllables in language.",effect:"Creates musicality and emphasis.",example:"da-DUM da-DUM da-DUM (iambic)",related:["Metre","Enjambment","Caesura"]}},{name:"Metre",type:"technique",info:{definition:"Regular pattern of stressed and unstressed syllables.",effect:"Creates predictable, musical structure.",example:"Iambic pentameter; trochaic tetrameter",related:["Rhythm","Iambic Pentameter","Enjambment"]}},{name:"Iambic Pentameter",type:"technique",info:{definition:"Five iambic feet (unstressed-stressed) per line.",effect:"Creates natural speech rhythm in English poetry.",example:"Shakespeare: 'Shall I | com-PARE | thee TO | a SUM | mer's DAY'",related:["Metre","Rhythm","Pentameter"]}},{name:"Free Verse",type:"technique",info:{definition:"Poetry without regular metre or rhyme scheme.",effect:"Allows natural speech rhythms and emotional emphasis.",example:"Modern poetry; Whitman; contemporary poetics",related:["Rhyme","Metre","Enjambment"]}},{name:"Plosive Sounds",type:"technique",info:{definition:"Abrupt, explosive consonant sounds (p, b, t, d, k, g).",effect:"Creates percussive, emphasized quality.",example:"'Pit, pat, pit' or 'Bad, big, bag'",related:["Cacophony","Alliteration","Rhythm"]}},{name:"Fricative Sounds",type:"technique",info:{definition:"Consonant sounds created by friction (f, v, s, z, sh, th).",effect:"Creates hissing or whooshing quality.",example:"'Soft, swift, swish' or 'The thief's feathered van'",related:["Euphony","Sibilance","Assonance"]}}]},{"name":"Lexical","type":"subgroup","info":{definition:"Repetition of words, phrases, and meanings.",effect:"",example:"",related:[]},"children":[{name:"Anaphora",type:"technique",info:{definition:"Repetition of a word or phrase at the beginning of successive clauses.",effect:"Creates emphasis, rhythm, and building intensity.",example:"King: 'I have a dream that...I have a dream that...'",related:["Epistrophe","Symploce","Refrain"]}},{name:"Epistrophe",type:"technique",info:{definition:"Repetition of a word or phrase at the end of successive clauses.",effect:"Creates emphasis and circularity.",example:"'Never give up. The fight gives up. We never give up.'",related:["Anaphora","Symploce","Refrain"]}},{name:"Symploce",type:"technique",info:{definition:"Combination of anaphora and epistrophe.",effect:"Creates powerful, memorable rhythm.",example:"'Where there is hate, let me sow love; where there is injury, let me sow pardon'",related:["Anaphora","Epistrophe","Parallelism"]}},{name:"Epizeuxis",type:"technique",info:{definition:"Immediate repetition of a word for emphasis.",effect:"Creates urgency and intensity.",example:"'Never, never, never!' or 'No, no, no!'",related:["Diacope","Refrain","Anaphora"]}},{name:"Diacope",type:"technique",info:{definition:"Repetition of a word with words between the repetitions.",effect:"Creates emphasis and echoing effect.",example:"'To be or not to be'; 'Then he went, he went, he went'",related:["Epizeuxis","Anadiplosis","Refrain"]}},{name:"Antanaclasis",type:"technique",info:{definition:"Repetition of a word in different senses.",effect:"Creates wordplay and semantic irony.",example:"'If we do not hang together, we shall surely hang separately' (hang=unite vs. hang=execute)",related:["Polyptoton","Zeugma","Pun"]}},{name:"Polyptoton",type:"technique",info:{definition:"Repetition of a word in different grammatical forms.",effect:"Creates emphasis through semantic variation.",example:"'Love is love and love is pain'; 'speak, speech, speaker'",related:["Antanaclasis","Zeugma","Anaphora"]}},{name:"Leitmotif",type:"technique",info:{definition:"A recurring word, phrase, image, or theme associated with a character or idea.",effect:"Creates cohesion and psychological depth.",example:"Wuthering Heights: repeated references to the moor",related:["Motif","Symbol","Refrain"]}},{name:"Refrain",type:"technique",info:{definition:"A line or phrase repeated at intervals within a poem.",effect:"Creates musical structure and mnemonic effect.",example:"Poe: 'Nevermore' in The Raven",related:["Anaphora","Epistrophe","Leitmotif"]}},{name:"Anadiplosis",type:"technique",info:{definition:"Repetition of the last word of one clause at the beginning of the next.",effect:"Creates linking, flowing effect.",example:"'The end of a thing is the beginning of thought.'",related:["Epanalepsis","Conduplicatio","Diacope"]}},{name:"Epanalepsis",type:"technique",info:{definition:"Repetition of a word at the beginning and end of a clause.",effect:"Creates circularity and emphasis.",example:"'Myself, I see myself in you.'",related:["Anadiplosis","Conduplicatio"]}},{name:"Conduplicatio",type:"technique",info:{definition:"Repetition of words at the end of one clause at the start of the next.",effect:"Creates links and intensification.",example:"'Peace, if you understand peace. Peace demands truth.'",related:["Anadiplosis","Epanalepsis"]}}]},{"name":"Structural","type":"subgroup","info":{definition:"Repetition in structure, syntax, and composition.",effect:"",example:"",related:[]},"children":[{name:"Parallelism",type:"technique",info:{definition:"Repeated grammatical structures expressing related ideas.",effect:"Creates balance, emphasis, and aesthetic satisfaction.",example:"'I came, I saw, I conquered'; Bible: parallel psalms",related:["Chiasmus","Isocolon","Tricolon"]}},{name:"Tricolon",type:"technique",info:{definition:"A series of three parallel structures.",effect:"Creates rhythm and emphasis through rule of three.",example:"'Life, liberty, and the pursuit of happiness'",related:["Parallelism","Isocolon","Cataloguing"]}},{name:"Antithesis (Structural)",type:"technique",info:{definition:"Juxtaposing contrasting ideas in parallel structures.",effect:"Creates emphasis and reveals relationship between opposites.",example:"'It was the best of times, it was the worst of times'",related:["Parallelism","Oxymoron","Binary Opposition"]}},{name:"Chiasmus",type:"technique",info:{definition:"Reversal of grammatical structures in successive phrases.",effect:"Creates memorable, punchy effect.",example:"'Ask not what your country can do for you; ask what you can do for your country'",related:["Parallelism","Antithesis (Structural)","Isocolon"]}},{name:"Isocolon",type:"technique",info:{definition:"Successive clauses of equal length and similar structure.",effect:"Creates rhythmic balance and harmony.",example:"Balanced clauses of identical syllable count or stress pattern",related:["Parallelism","Tricolon","Symmetry"]}},{name:"Accumulation",type:"technique",info:{definition:"Piling of similar items or clauses to build emphasis.",effect:"Creates crescendo effect and overwhelm.",example:"'He was strong, determined, ambitious, tireless, and brilliant'",related:["Cataloguing","Gradatio","Amplification"]}},{name:"Cataloguing",type:"technique",info:{definition:"Listing items, people, or qualities in sequence.",effect:"Creates comprehensiveness and abundance.",example:"Whitman: extensive lists; Homer's catalogs of ships",related:["Accumulation","Amplification","Sensory Accumulation"]}},{name:"Incremental Repetition",type:"technique",info:{definition:"Repetition of phrases with slight additions or changes.",effect:"Creates building, developmental effect.",example:"Folk songs and ballads: repeated verses with minor variations",related:["Anadiplosis","Conduplicatio","Refrain"]}},{name:"Amplification",type:"technique",info:{definition:"Expanding a statement through repetition and elaboration.",effect:"Provides emphasis and detailed development.",example:"'It was not merely bad; it was atrocious, repugnant, and destructive'",related:["Accumulation","Cataloguing","Gradatio"]}},{name:"Gradatio",type:"technique",info:{definition:"Arrangement of ideas in ascending or descending order of emphasis.",effect:"Creates climactic or anti-climactic effect.",example:"'The thought annoyed him, angered him, enraged him, destroyed him'",related:["Accumulation","Amplification","Climax"]}}]}]},{"name":"Comparative","type":"family","info":{definition:"Techniques drawing relationships between unlike things or opposing forces.",effect:"",example:"",related:[]},"children":[{"name":"Figurative","type":"subgroup","info":{definition:"Non-literal language comparing or transforming one thing into another.",effect:"",example:"",related:[]},"children":[{name:"Simile",type:"technique",info:{definition:"Direct comparison between two unlike things using 'like' or 'as'.",effect:"Makes abstract concepts concrete and memorable.",example:"'Her voice was like a bell' or 'as pale as death'",related:["Metaphor","Analogy","Hypocatastasis"]}},{name:"Metaphor",type:"technique",info:{definition:"Comparison between two unlike things stated as if identical.",effect:"Transforms understanding through imaginative identification.",example:"'Life is a journey' or 'Time is money'",related:["Simile","Extended Metaphor","Dead Metaphor"]}},{name:"Extended Metaphor",type:"technique",info:{definition:"Sustained metaphor developed throughout a passage or work.",effect:"Creates coherence and philosophical depth.",example:"Shakespeare: life as a stage; Dante: spiritual journey",related:["Metaphor","Conceit","Allegory"]}},{name:"Conceit",type:"technique",info:{definition:"An elaborate, far-fetched metaphor or simile.",effect:"Creates intellectual wit and surprise.",example:"Metaphysical poets: comparing love to geometry or alchemy",related:["Extended Metaphor","Metaphor","Oxymoron"]}},{name:"Personification",type:"technique",info:{definition:"Attributing human characteristics to non-human entities.",effect:"Creates accessibility and emotional resonance.",example:"'Death came knocking at the door'; 'The wind whispered secrets'",related:["Anthropomorphism","Apostrophe","Pathetic Fallacy"]}},{name:"Anthropomorphism",type:"technique",info:{definition:"Attributing specifically human form or traits to non-humans.",effect:"Creates familiarity and emotional connection.",example:"Fables: animals with human characteristics and dialogue",related:["Personification","Apostrophe","Allegory"]}},{name:"Apostrophe",type:"technique",info:{definition:"Directly addressing an absent person, object, or abstract idea.",effect:"Creates intimacy and emotional immediacy.",example:"'O Death, where is thy sting?' or 'Hello, old friend'",related:["Personification","Rhetorical Question","Address"]}},{name:"Metonymy",type:"technique",info:{definition:"Substituting the name of one thing with something associated with it.",effect:"Creates concision and layers of meaning.",example:"'The Crown declared it law' (Crown=the king); 'Hollywood loves celebrities'",related:["Synecdoche","Symbol","Zeugma"]}},{name:"Synecdoche",type:"technique",info:{definition:"Using a part to represent the whole or vice versa.",effect:"Creates compression and unexpected perspective.",example:"'All hands on deck' (hands=people); 'He is a good heart' (heart=person)",related:["Metonymy","Symbol","Zeugma"]}},{name:"Allegory",type:"technique",info:{definition:"A narrative in which characters and events represent abstract ideas or moral lessons.",effect:"Allows exploration of universal themes through story.",example:"Pilgrim's Progress; Animal Farm; Medieval morality plays",related:["Extended Metaphor","Symbol","Parable"]}},{name:"Analogy",type:"technique",info:{definition:"Extended comparison explaining one thing by comparing it to another.",effect:"Clarifies complex concepts through familiar comparisons.",example:"'A cell is like a factory' (biology explanation)",related:["Simile","Metaphor","Allegory"]}},{name:"Transferred Epithet",type:"technique",info:{definition:"Attributing a quality to something that logically belongs to something else.",effect:"Creates surprising and poetic image.",example:"'A cheerful fire' (fire isn't cheerful, but seems so); 'a sleepless night'",related:["Personification","Pathetic Fallacy","Metaphor"]}},{name:"Dead Metaphor",type:"technique",info:{definition:"A metaphor so common it's lost its figurative impact.",effect:"Functions as literal language; often unnoticed.",example:"'Leg of a table,' 'head of a department,' 'run out of time'",related:["Metaphor","Cliché","Idiom"]}},{name:"Mixed Metaphor",type:"technique",info:{definition:"Combining two or more inconsistent metaphors.",effect:"Can be unintentionally comic or deliberately discordant.",example:"'Swimming through the chess match of life'; 'the heart of the storm is burning'",related:["Metaphor","Extended Metaphor","Oxymoron"]}},{name:"Vehicle & Tenor",type:"technique",info:{definition:"Tenor: what is being described; Vehicle: what it's compared to.",effect:"Analytical tool for understanding metaphor structure.",example:"In 'Love is a rose': tenor=love, vehicle=rose",related:["Metaphor","Simile","Analogy"]}},{name:"Hypocatastasis",type:"technique",info:{definition:"An implied comparison where the comparison is suggested but not stated.",effect:"Creates subtle connection and reader participation.",example:"'He was a lion in battle' (implies: he was as brave/fierce as a lion)",related:["Metaphor","Simile","Understatement"]}}]},{"name":"Symbolic","type":"subgroup","info":{definition:"Objects, characters, and images representing abstract ideas or concepts.",effect:"",example:"",related:[]},"children":[{name:"Symbol",type:"technique",info:{definition:"A person, object, or image representing an abstract concept or idea.",effect:"Adds layers of meaning and universality to narrative.",example:"The green light in Gatsby (hope/dreams); the white whale in Moby Dick (nature's power)",related:["Motif","Archetype","Metaphor"]}},{name:"Motif",type:"technique",info:{definition:"A recurring image, idea, or pattern that develops a theme.",effect:"Creates coherence and reinforces thematic concerns.",example:"Repeated mirrors in gothic fiction; journeys in adventure tales",related:["Symbol","Leitmotif","Theme"]}},{name:"Archetype",type:"technique",info:{definition:"A universal character type or situation recurring across literature and culture.",effect:"Taps into collective unconscious and universal recognition.",example:"The hero, the mentor, the shadow; the quest, the journey, the fall",related:["Symbol","Motif","Foil"]}},{name:"Colour Symbolism",type:"technique",info:{definition:"Using colour to represent abstract concepts or emotional states.",effect:"Creates mood and thematic resonance.",example:"Red: passion/danger; white: purity/death; black: evil/mystery",related:["Symbol","Visual Imagery","Symbolism"]}},{name:"Object Symbolism",type:"technique",info:{definition:"Specific objects representing larger ideas or themes.",effect:"Makes abstract concepts tangible and memorable.",example:"The ring in LOTR (power/corruption); the scarlet letter (shame/sin)",related:["Symbol","Metaphor","Leitmotif"]}},{name:"Animal Symbolism",type:"technique",info:{definition:"Animals representing character traits or thematic concepts.",effect:"Taps into cultural and literary associations.",example:"Fox: cunning; owl: wisdom; snake: betrayal/temptation",related:["Symbol","Archetype","Allegory"]}},{name:"Mythological Allusion",type:"technique",info:{definition:"Reference to characters, events, or themes from mythology.",effect:"Enriches text with cultural and universal resonance.",example:"Joyce: Ulysses as modern Odysseus; Ovid references in literature",related:["Allusion","Archetype","Symbol"]}},{name:"Biblical Allusion",type:"technique",info:{definition:"Reference to characters, events, or passages from the Bible.",effect:"Invokes moral and spiritual dimensions.",example:"Scapegoat; sacrifice; resurrection; fall from paradise",related:["Allusion","Mythological Allusion","Symbol"]}},{name:"Literary Allusion",type:"technique",info:{definition:"Reference to another literary work, character, or passage.",effect:"Creates intertextual dialogue and enriches meaning.",example:"Referencing Shakespearean themes; quoting Dante",related:["Allusion","Quotation","Intertextuality (Explicit)"]}},{name:"Cultural Allusion",type:"technique",info:{definition:"Reference to events, figures, or concepts from culture or history.",effect:"Grounds text in historical and social context.",example:"References to historical events, famous figures, or cultural moments",related:["Allusion","Historical Reference","Contextual Meaning"]}},{name:"Emblem",type:"technique",info:{definition:"A visual or symbolic representation of an abstract concept.",effect:"Makes ideas immediately recognizable and memorable.",example:"Dove: peace; scales: justice; skull: death/mortality",related:["Symbol","Iconography","Allegory"]}},{name:"Iconography",type:"technique",info:{definition:"The use of images and symbols with specific cultural or religious meanings.",effect:"Communicates complex ideas through visual/symbolic shorthand.",example:"Christian iconography: halo=holiness; cross=redemption",related:["Symbol","Emblem","Colour Symbolism"]}}]},{"name":"Contrast","type":"subgroup","info":{definition:"Opposing forces, ideas, or qualities creating emphasis and meaning.",effect:"",example:"",related:[]},"children":[{name:"Antithesis",type:"technique",info:{definition:"Contrasting ideas placed in parallel structures for effect.",effect:"Creates emphasis and reveals relationships between opposites.",example:"'Man proposes; God disposes' or 'Give me liberty or give me death'",related:["Juxtaposition","Parallelism","Oxymoron"]}},{name:"Juxtaposition",type:"technique",info:{definition:"Placing two contrasting things side by side for comparison.",effect:"Highlights differences and creates meaning through contrast.",example:"Placing wealthy character next to poor; beauty next to ugliness",related:["Antithesis","Oxymoron","Foil"]}},{name:"Oxymoron",type:"technique",info:{definition:"Combining two contradictory terms or ideas.",effect:"Creates paradox and intellectual surprise.",example:"'Deafening silence,' 'bitter sweet,' 'living death'",related:["Paradox","Antithesis","Conceit"]}},{name:"Paradox",type:"technique",info:{definition:"A seemingly contradictory statement that may be true.",effect:"Forces reconsideration and reveals deeper truths.",example:"'The only way to win is to lose'; 'This statement is false'",related:["Oxymoron","Irony","Ambivalence"]}},{name:"Foil",type:"technique",info:{definition:"A character whose traits contrast with and highlight another character's.",effect:"Reveals character traits through comparison.",example:"Iago emphasizes Othello's nobility; Watson highlights Holmes's deduction",related:["Character Foiling","Juxtaposition","Archetype"]}},{name:"Situational Irony",type:"technique",info:{definition:"When what happens contradicts what is expected to happen.",effect:"Creates surprise and often tragic or comic effect.",example:"Fireman's house burns down; traffic accident on way to avoid accident",related:["Verbal Irony","Dramatic Irony","Paradox"]}},{name:"Dramatic Irony",type:"technique",info:{definition:"When audience knows something characters don't, creating tension.",effect:"Creates suspense and emotional investment.",example:"Audience knows villain's identity; Oedipus unknowingly marrying mother",related:["Verbal Irony","Situational Irony","Foreshadowing"]}},{name:"Verbal Irony",type:"technique",info:{definition:"Saying the opposite of what is meant.",effect:"Creates tone and deeper meaning.",example:"Saying 'Great job!' when someone fails catastrophically",related:["Sarcasm","Dramatic Irony","Situational Irony"]}},{name:"Bathos",type:"technique",info:{definition:"Sudden drop from elevated to mundane, creating anticlimax.",effect:"Creates humorous or disappointed effect.",example:"Building grand narrative then ending triviality: 'He died valiantly...of hiccups'",related:["Anticlimax","Batetic Effect","Irony"]}},{name:"Anticlimax",type:"technique",info:{definition:"A descent in intensity or importance at a crucial moment.",effect:"Creates deflation or humorous effect.",example:"Buildup of tension resolving in something mundane",related:["Bathos","Gradatio","Irony"]}},{name:"Binary Opposition",type:"technique",info:{definition:"Structuring a text around fundamental opposing concepts.",effect:"Reveals underlying assumptions and power structures.",example:"Nature vs. civilization; good vs. evil; male vs. female",related:["Antithesis","Juxtaposition","Dualism"]}},{name:"Chiaroscuro",type:"technique",info:{definition:"Striking contrast between light and dark (visual or metaphorical).",effect:"Creates dramatic visual and thematic impact.",example:"Gothic literature: darkness suggesting mystery and danger",related:["Contrast","Juxtaposition","Visual Imagery"]}}]}]},{"name":"Structural","type":"family","info":{definition:"Techniques organizing narrative, syntax, and narrative perspective.",effect:"",example:"",related:[]},"children":[{"name":"Narrative","type":"subgroup","info":{definition:"Techniques organizing how a story is told and ordered.",effect:"",example:"",related:[]},"children":[{name:"In Medias Res",type:"technique",info:{definition:"Beginning a story in the middle of action rather than at the beginning.",effect:"Creates immediate engagement and dramatic tension.",example:"The Odyssey: Odysseus's journey already underway; Catch-22",related:["Flashback (Analepsis)","Flash-Forward (Prolepsis)","Exposition"]}},{name:"Flashback (Analepsis)",type:"technique",info:{definition:"Interrupting the narrative to show events from the past.",effect:"Provides context and deepens character understanding.",example:"The Kite Runner; Beloved; film noir",related:["Flash-Forward (Prolepsis)","Non-Linear Narrative","Frame Narrative"]}},{name:"Flash-Forward (Prolepsis)",type:"technique",info:{definition:"Interrupting the narrative to show events from the future.",effect:"Creates foreshadowing and anticipation.",example:"Speculative sections of future outcomes; prophecies",related:["Flashback (Analepsis)","Foreshadowing","Non-Linear Narrative"]}},{name:"Frame Narrative",type:"technique",info:{definition:"A story within a story, with an outer narrative framing inner narratives.",effect:"Creates layers of meaning and perspective shifts.",example:"Thousand and One Nights; The Canterbury Tales; Mise en Abyme structure",related:["Non-Linear Narrative","Mise en Abyme","Narrative Structure"]}},{name:"Non-Linear Narrative",type:"technique",info:{definition:"Narrating events out of chronological order.",effect:"Creates complexity and invites active reader interpretation.",example:"Pulp Fiction; Memento; modernist literature",related:["Flashback (Analepsis)","Flash-Forward (Prolepsis)","Frame Narrative"]}},{name:"Circular Narrative",type:"technique",info:{definition:"A narrative that returns to its beginning, creating closure.",effect:"Creates sense of completion or cyclical return.",example:"The Great Gatsby: ending where it began; Joyce: Finnegans Wake (circular)",related:["Frame Narrative","Non-Linear Narrative","Closure"]}},{name:"Foreshadowing",type:"technique",info:{definition:"Hints suggesting future events without fully revealing them.",effect:"Creates suspense and invites rereading.",example:"Three witches in Macbeth; the gun in Act 1",related:["Chekhov's Gun","Dramatic Irony","Flashback (Analepsis)"]}},{name:"Chekhov's Gun",type:"technique",info:{definition:"An object mentioned early that becomes crucial later; efficient narration.",effect:"Satisfies reader expectations through narrative coherence.",example:"Gun mentioned Act 1 goes off Act 3; mysterious object revealed as important",related:["Foreshadowing","Red Herring","Plot Device"]}},{name:"Red Herring",type:"technique",info:{definition:"A misleading clue or false lead distracting from the truth.",effect:"Creates misdirection and reader suspense.",example:"Mystery novels: suspect seems guilty but isn't",related:["Misdirection","Dramatic Irony","Unreliable Narrator"]}},{name:"Cliffhanger",type:"technique",info:{definition:"Ending a section or episode on unresolved tension.",effect:"Compels reader to continue; creates suspense.",example:"Serial fiction; TV episode endings; chapter breaks in novels",related:["Suspense","Rising Action","Denouement"]}},{name:"Denouement",type:"technique",info:{definition:"The final unwinding of plot threads; the resolution.",effect:"Provides closure and significance.",example:"Final scenes resolving conflicts; the 'after' in narratives",related:["Climax","Resolution","Falling Action"]}},{name:"Rising Action",type:"technique",info:{definition:"Events building tension toward the climax.",effect:"Creates escalating emotional intensity.",example:"Middle section of three-act structure",related:["Climax","Denouement","Plot Structure"]}},{name:"Falling Action",type:"technique",info:{definition:"Events after the climax showing consequences.",effect:"Provides transition to resolution.",example:"After the battle, showing character reactions",related:["Climax","Denouement","Rising Action"]}},{name:"Anagnorisis",type:"technique",info:{definition:"A character's moment of sudden recognition or realization.",effect:"Creates emotional turning point.",example:"Oedipus recognizing his identity; tragic recognition",related:["Peripeteia","Climax","Revelation"]}},{name:"Peripeteia",type:"technique",info:{definition:"A sudden reversal of fortune or circumstance.",effect:"Creates dramatic surprise and plot twist.",example:"Twist ending; unexpected defeat of hero",related:["Anagnorisis","Climax","Plot Twist"]}},{name:"Hamartia",type:"technique",info:{definition:"A tragic flaw in a protagonist leading to downfall.",effect:"Makes tragedy inevitable and cathartic.",example:"Macbeth's ambition; Oedipus's hubris; Othello's jealousy",related:["Peripeteia","Tragic Flaw","Tragedy"]}},{name:"Deus Ex Machina",type:"technique",info:{definition:"An unexpected external solution resolving an insoluble problem.",effect:"Can feel contrived; sometimes used intentionally for effect.",example:"Gods intervening in Greek plays; convenient coincidence",related:["Plotting","Resolution","Conventionality"]}},{name:"Ellipsis (Narrative)",type:"technique",info:{definition:"Omitting events or time periods from narrative.",effect:"Allows focus on significant moments.",example:"'Years passed.' or jumping seasons without detail",related:["Time Leap","Narrative Concision","Pacing"]}},{name:"Subplot",type:"technique",info:{definition:"A secondary narrative running parallel to the main plot.",effect:"Adds complexity and thematic resonance.",example:"B-plot in films; secondary relationships in novels",related:["Plot Structure","Narrative Complexity","Theme"]}},{name:"Parallel Narrative",type:"technique",info:{definition:"Multiple storylines occurring simultaneously or alternating.",effect:"Creates comparison and thematic connection.",example:"Intercut scenes; multiple POV chapters",related:["Non-Linear Narrative","Frame Narrative","Multiple Narratives"]}}]},{"name":"Syntactic","type":"subgroup","info":{definition:"Techniques shaping sentence structure and grammatical patterns.",effect:"",example:"",related:[]},"children":[{name:"Syndeton",type:"technique",info:{definition:"Using conjunctions between all items in a series.",effect:"Creates careful, measured, formal effect.",example:"'Apples and oranges and bananas and pears' vs. 'apples, oranges, bananas, pears'",related:["Asyndeton","Polysyndeton","Coordination"]}},{name:"Asyndeton",type:"technique",info:{definition:"Omitting conjunctions between items in a series.",effect:"Creates rapid-fire effect and staccato rhythm.",example:"'I came, I saw, I conquered' (no 'and')",related:["Polysyndeton","Syndeton","Parataxis"]}},{name:"Polysyndeton",type:"technique",info:{definition:"Using many conjunctions between items.",effect:"Creates emphatic, flowing, expansive effect.",example:"'And then and then and then...'; 'Blood and death and destruction and horror'",related:["Asyndeton","Syndeton","Conjunction Overload"]}},{name:"Parataxis",type:"technique",info:{definition:"Arranging clauses in parallel structure without subordination.",effect:"Creates equal importance and fragmentary effect.",example:"Hemingway: 'The sun rose. The day began. Life continued.'",related:["Hypotaxis","Asyndeton","Juxtaposition"]}},{name:"Hypotaxis",type:"technique",info:{definition:"Using subordination to create hierarchy among clauses.",effect:"Creates complex relationships and dependent meaning.",example:"Subordinate clauses create layers: 'After the rain, which had been cold, the sun appeared'",related:["Parataxis","Subordination","Sentence Complexity"]}},{name:"Periodic Sentence",type:"technique",info:{definition:"A sentence with the main clause at the end.",effect:"Builds suspense; creates elegant formality.",example:"'After years of struggle, heartbreak, and perseverance, she finally succeeded'",related:["Loose Sentence","Sentence Structure","Syntax"]}},{name:"Loose Sentence",type:"technique",info:{definition:"A sentence with the main clause at the beginning.",effect:"Creates clear, direct, conversational effect.",example:"'She finally succeeded, after years of struggle, heartbreak, and perseverance'",related:["Periodic Sentence","Sentence Structure","Directness"]}},{name:"Rhetorical Question",type:"technique",info:{definition:"A question asked not expecting an answer but for effect.",effect:"Creates engagement and emphasizes a point.",example:"'Who doesn't want happiness?' (obviously everyone)",related:["Question","Apostrophe","Address"]}},{name:"Sentence Fragment",type:"technique",info:{definition:"An incomplete sentence missing subject or predicate.",effect:"Creates emphasis and stylistic effect.",example:"'Not good. Not good at all.' or 'Why? Because.'",related:["Run-On Sentence","Ellipsis (Grammatical)","Stylistic Syntax"]}},{name:"Run-On Sentence",type:"technique",info:{definition:"Multiple independent clauses without proper punctuation.",effect:"Creates breathlessness or lack of control.",example:"'I ran and ran and couldn't stop and kept going and finally collapsed'",related:["Sentence Fragment","Stream of Consciousness","Comma Splice"]}},{name:"Anastrophe",type:"technique",info:{definition:"Inversion of normal word order in a sentence.",effect:"Creates emphasis and poetic effect.",example:"'Yoda-like, his speech was' or 'Fled the warrior'",related:["Hyperbaton","Inversion","Word Order"]}},{name:"Parenthesis",type:"technique",info:{definition:"Inserting a word, phrase, or clause as an aside.",effect:"Creates ss","Third-Person Limited","Unreliable Narrator"]}},{name:"Second-Person Address",type:"technique",info:{definition:"Narrative using 'you', directly addressing the reader.",effect:"Creates direct engagement and unusual perspective.",example:"Choose-your-own-adventure; Jay McInerney's Bright Lights, Big City",related:["First-Person Narrator","Third-Person Limited","Address"]}},{name:"Third-Person Omniscient",type:"technique",info:{definition:"Narrative from outside perspective with access to all minds.",effect:"Creates broad scope and detached authority.",example:"Victorian novels; some fantasy epics",related:["Third-Person Limited","First-Person Narrator","Narrator Authority"]}},{name:"Third-Person Limited",type:"technique",info:{definition:"Narrative from outside perspective limited to one character's mind.",effect:"Creates objectivity with character-based focus.",example:"Most contemporary literary fiction; James: Portrait of a Lady",related:["Third-Person Omniscient","First-Person Narrator","Point of View"]}},{name:"Unreliable Narrator",type:"technique",info:{definition:"A narrator whose account is doubtful or distorted.",effect:"Creates ambiguity and invites reader suspicion.",example:"Lolita; Shutter Island; The Turn of the Screw",related:["Naive Narrator","Red Herring","Dramatic Irony"]}},{name:"Stream of Consciousness",type:"technique",info:{definition:"Representing the unfiltered flow of a character's thoughts.",effect:"Creates immediacy and psychological depth.",example:"Joyce: Ulysses; Faulkner: The Sound and the Fury",related:["Interior Monologue","Free Indirect Discourse","Psychological Realism"]}},{name:"Interior Monologue",type:"technique",info:{definition:"Direct representation of a character's unspoken thoughts.",effect:"Reveals inner life without external narration.",example:"Character thinking without quotation marks: 'What could she mean?'",related:["Stream of Consciousness","Free Indirect Discourse","Psychological Insight"]}},{name:"Free Indirect Discourse",type:"technique",info:{definition:"Representing character thoughts/speech without quotation marks or explicit attribution.",effect:"Blurs boundaries between narrator and character.",example:"'She wondered if he would come. Surely he would.'",related:["Stream of Consciousness","Interior Monologue","Narrative Voice"]}},{name:"Epistolary Mode",type:"technique",info:{definition:"Narrative told through letters, emails, or documents.",effect:"Creates authenticity and multiple perspectives.",example:"Pamela; The Perks of Being a Wallflower; Dracula",related:["Documentary Form","Multiple Narratives","Authenticity"]}},{name:"Dramatic Monologue",type:"technique",info:{definition:"A character speaking at length to a silent listener.",effect:"Reveals character psychology and situation.",example:"Browning poems; characters addressing absent others",related:["Interior Monologue","Apostrophe","Voice"]}},{name:"Collective Narrator",type:"technique",info:{definition:"Narrative from the perspective of a group using 'we'.",effect:"Creates communal perspective and group identity.",example:"Faulkner: 'The Hamlet'; stories narrated by community",related:["First-Person Narrator","Chorus","Group Perspective"]}},{name:"Naive Narrator",type:"technique",info:{definition:"A narrator innocent or limited in understanding, often a child.",effect:"Creates dramatic irony through gaps in comprehension.",example:"Huckleberry Finn; Catcher in the Rye; A Child's Christmas in Wales",related:["Unreliable Narrator","Innocence","Coming of Age"]}}]},{"name":"Rhetorical","type":"subgroup","info":{definition:"Techniques employing persuasion and classical rhetoric.",effect:"",example:"",related:[]},"children":[{name:"Ethos",type:"technique",info:{definition:"Appeal to credibility and character of the speaker.",effect:"Establishes trustworthiness and authority.",example:"'As a doctor, I can tell you...' or trusted character speaking",related:["Pathos","Logos","Persuasion"]}},{name:"Pathos",type:"technique",info:{definition:"Appeal to emotion and sympathy.",effect:"Creates emotional engagement and response.",example:"Tragic scenes; heartbreaking stories; descriptions of suffering",related:["Ethos","Logos","Emotional Appeal"]}},{name:"Logos",type:"technique",info:{definition:"Appeal to logic and reason.",effect:"Creates rational persuasion.",example:"Statistical evidence; logical arguments; syllogisms",related:["Ethos","Pathos","Logical Appeal"]}},{name:"Kairos",type:"technique",info:{definition:"Appeal to timely circumstances; the right moment.",effect:"Creates urgency and timeliness.",example:"'Now is the time to act'; seizing the moment",related:["Timing","Opportunity","Rhetoric"]}},{name:"Antistrophe",type:"technique",info:{definition:"In classical drama, the choral response after the strophe.",effect:"Creates symmetry in choral odes.",example:"Greek tragedy: strophe and antistrophe exchanges",related:["Strophe","Antiphony","Classical Technique"]}},{name:"Hendiadys",type:"technique",info:{definition:"Using two connected words to express one idea.",effect:"Creates emphasis and linguistic interest.",example:"'Nice and warm' (meaning comfortably warm); 'dead and gone'",related:["Figure of Speech","Rhetoric","Word Pairing"]}},{name:"Litotes",type:"technique",info:{definition:"Expressing idea by affirming the opposite; double negative.",effect:"Creates understatement and irony.",example:"'Not bad!' (meaning good); 'no small feat' (meaning significant)",related:["Understatement","Meiosis","Irony"]}},{name:"Meiosis",type:"technique",info:{definition:"Deliberate understatement or minimization.",effect:"Creates irony or comic effect.",example:"'It's just a scratch' (for major wound); 'slightly unfortunate'",related:["Litotes","Understatement","Irony"]}},{name:"Apophasis",type:"technique",info:{definition:"Rhetorically denying something while actually saying it.",effect:"Creates ironic emphasis.",example:"'I won't mention his stupidity' (while mentioning it); 'Let's not talk about his wealth'",related:["Irony","Denial","Rhetoric"]}},{name:"Procatalepsis",type:"technique",info:{definition:"Anticipating and answering an objection before it's raised.",effect:"Creates persuasive preemption.",example:"'You might say X, but actually...' or addressing counterarguments",related:["Rhetorical Question","Anticipation","Argument"]}},{name:"Enthymeme",type:"technique",info:{definition:"A rhetorical argument with an implicit premise.",effect:"Engages audience in completing the logic.",example:"'He's a lawyer, so he must be educated' (assuming lawyers are educated)",related:["Syllogism","Logic","Implication"]}},{name:"Anecdote",type:"technique",info:{definition:"A brief, illustrative story supporting a point.",effect:"Makes abstract ideas concrete and memorable.",example:"Opening a speech with a personal story",related:["Narrative","Illustration","Example"]}},{name:"Exemplum",type:"technique",info:{definition:"A narrative example illustrating a moral or lesson.",effect:"Creates moral instruction through story.",example:"Medieval exempla; fables; teaching tales",related:["Allegory","Anecdote","Moral Teaching"]}},{name:"Enumeratio",type:"technique",info:{definition:"Detailed listing of particulars.",effect:"Creates comprehensiveness and accumulation.",example:"Cataloguing details; itemized descriptions",related:["Accumulation","Cataloguing","Listing"]}},{name:"Hyperbaton",type:"technique",info:{definition:"Inversion of normal word order for effect.",effect:"Creates emphasis and poetic quality.",example:"'The book read I' (instead of 'I read the book')",related:["Anastrophe","Inversion","Word Order"]}},{name:"Zeugma",type:"technique",info:{definition:"Using a word in different senses with multiple parts of a sentence.",effect:"Creates wordplay and semantic wit.",example:"'He broke his heart and the vase'; 'He lost his temper and his keys'",related:["Syllepsis","Polyptoton","Wordplay"]}},{name:"Syllepsis",type:"technique",info:{definition:"Using a word in multiple senses simultaneously (literal and figurative).",effect:"Creates semantic complexity and humor.",example:"'He broke his heart and the law'; 'She lost her mind and her purse'",related:["Zeugma","Pun","Double Meaning"]}}]}]},{"name":"Intertextual & Metafictional","type":"family","info":{definition:"Techniques referencing other texts and calling attention to narrative construction.",effect:"",example:"",related:[]},"children":[{"name":"Intertextual","type":"subgroup","info":{definition:"References and connections between texts.",effect:"",example:"",related:[]},"children":[{name:"Allusion",type:"technique",info:{definition:"An indirect reference to another work, person, or event.",effect:"Enriches meaning through connection to larger tradition.",example:"Referencing mythology, history, or other literature without explanation",related:["Quotation","Epigraph","Intertextuality (Explicit)"]}},{name:"Quotation",type:"technique",info:{definition:"A direct excerpt from another text.",effect:"Brings authority and another voice into the text.",example:"Character quoting Shakespeare; dialogue incorporating exact phrases",related:["Allusion","Epigraph","Citation"]}},{name:"Epigraph",type:"technique",info:{definition:"A quotation placed at the beginning of a work.",effect:"Sets tone and thematic direction.",example:"Books opening with relevant quotes; dedication epigraphs",related:["Quotation","Allusion","Preface"]}},{name:"Parody",type:"technique",info:{definition:"Humorous imitation of a work, style, or genre.",effect:"Creates comedy through exaggeration and contrast.",example:"Spoof films; Shrek parodying fairy tales; Blazing Saddles",related:["Pastiche","Satire","Imitation"]}},{name:"Pastiche",type:"technique",info:{definition:"Imitation of a style, without necessarily mocking it.",effect:"Creates homage or homogenization of styles.",example:"Works imitating detective noir without mockery; loving tribute",related:["Parody","Homage","Imitation"]}},{name:"Homage",type:"technique",info:{definition:"A respectful reference or tribute to another work or artist.",effect:"Shows influence and builds literary conversation.",example:"Film dedicated to Hitchcock; novel in style of Jane Austen",related:["Allusion","Pastiche","Tribute"]}},{name:"Adaptation",type:"technique",info:{definition:"Remaking a work in a different form or context.",effect:"Extends life of source material; creates new interpretations.",example:"Film versions of novels; stage adaptations; modern retellings",related:["Remake","Translation","New Version"]}},{name:"Palimpsest",type:"technique",info:{definition:"A work built on or referring to earlier texts as layers.",effect:"Creates depth through textual layering.",example:"Texts referencing historical sources; literature built on tradition",related:["Intertextuality","Allusion","Layering"]}},{name:"Intertextuality (Explicit)",type:"technique",info:{definition:"Direct, obvious references making the connection obvious.",effect:"Creates clear conversation with source texts.",example:"Named quotations; attributed allusions; obvious references",related:["Allusion","Quotation","Intertextuality (Implicit)"]}},{name:"Intertextuality (Implicit)",type:"technique",info:{definition:"Subtle, indirect references that require reader knowledge.",effect:"Rewards knowledgeable readers; adds layers of meaning.",example:"Echoing themes or structures without explicit reference",related:["Allusion","Intertextuality (Explicit)","Hidden Reference"]}},{name:"Hypotext / Hypertext",type:"technique",info:{definition:"Hypotext: source text; Hypertext: new text based on it.",effect:"Establishes genealogy and intertextual relationships.",example:"Ulysses as hypertext to Homer's Odyssey (hypotext)",related:["Source Material","Intertextuality","Derivative Work"]}}]},{"name":"Metafictional","type":"subgroup","info":{definition:"Techniques calling attention to the fictional nature of narrative.",effect:"",example:"",related:[]},"children":[{name:"Breaking the Fourth Wall",type:"technique",info:{definition:"A character or narrator directly addressing the audience/reader.",effect:"Shatters illusion of narrative; creates complicity.",example:"Deadpool; Ferris Bueller; character addresses reader",related:["Metafiction","Address","Self-Referentiality"]}},{name:"Self-Referentiality",type:"technique",info:{definition:"A work calling attention to its own status as a created work.",effect:"Creates awareness of artifice and construction.",example:"Novel mentioning its own writing; discussing narrative choices",related:["Metafiction","Breaking the Fourth Wall","Self-Awareness"]}},{name:"Metafiction",type:"technique",info:{definition:"Fiction that is aware of and comments on its own fictionality.",effect:"Creates philosophical questions about fiction and reality.",example:"If on a winter's night a traveler; The Name of the Rose; Borges stories",related:["Self-Referentiality","Breaking the Fourth Wall","Narrative Self-Consciousness"]}},{name:"Postmodern Fragmentation",type:"technique",info:{definition:"Breaking narrative into fragments, questioning coherence.",effect:"Mirrors contemporary experience; disrupts linear understanding.",example:"Pound: The Cantos; experimental fiction with discontinuity",related:["Metafiction","Non-Linear Narrative","Modernism"]}},{name:"Unreliable Text",type:"technique",info:{definition:"A text that cannot be trusted; contradicting itself.",effect:"Creates uncertainty and reader confusion deliberately.",example:"Texts with inconsistencies; Barthelme's fragmented pieces",related:["Unreliable Narrator","Paradox","Ambiguity"]}},{name:"Mise en Abyme",type:"technique",info:{definition:"A work containing an image or version of itself; infinite regression.",effect:"Creates dizzying self-reference and mirroring.",example:"Painting of painting; story within story within story",related:["Frame Narrative","Self-Referentiality","Recursion"]}},{name:"Author Intrusion",type:"technique",info:{definition:"The author appearing or commenting within the fictional world.",effect:"Violates narrative distance; creates awareness of authorship.",example:"Cervantes in Don Quixote; authorial asides",related:["Breaking the Fourth Wall","Metafiction","Narrator Intrusion"]}},{name:"Narrative Self-Consciousness",type:"technique",info:{definition:"The narrative itself aware of its own telling.",effect:"Creates sophistication and philosophical depth.",example:"Novel discussing how it's being written; storytelling awareness",related:["Metafiction","Self-Referentiality","Author Intrusion"]}}]}]}]};

    let nodeMap = new Map();
    let currentSelectedNode = null;
    let infoPanelDragOffset = { x: 0, y: 0 };
    let isPanelDragging = false;

    const svg = d3.select("#main-svg");
    const container = svg.append("g").attr("id", "zoom-group");
    const linksGroup = container.append("g").attr("id", "links-group");
    const relationsGroup = container.append("g").attr("id", "relations-group");
    const nodesGroup = container.append("g").attr("id", "nodes-group");

    const zoom = d3.zoom().on("zoom", (e) => { container.attr("transform", e.transform); });
    svg.call(zoom);

    const initialTransform = d3.zoomIdentity.translate(W / 2, 90).scale(0.45);
    svg.call(zoom.transform, initialTransform);

    let root = d3.hierarchy(taxonomyData);
    root.x0 = 0;
    root.y0 = 0;
    root.children.forEach(collapse);

    function collapse(d) {
      if (d.children) { d._children = d.children; d.children = null; }
      if (d._children) d._children.forEach(collapse);
    }

    function update(source) {
      const tree = d3.tree().nodeSize([NODE_X, NODE_Y]);
      const treeData = tree(root);
      const nodes = treeData.descendants();
      const links = treeData.links();

      nodeMap.clear();
      nodes.forEach(d => nodeMap.set(d.data.name, d));

      const link = linksGroup.selectAll(".link").data(links, d => d.target.data.name);
      link.exit().remove();
      link.enter().insert("path", ":first-child").attr("class", "link").merge(link)
        .transition().duration(DURATION).attr("d", d => stepPath(d.source, d.target));

      const node = nodesGroup.selectAll(".node").data(nodes, d => d.data.name);
      node.exit().transition().duration(DURATION).attr("opacity", 0).remove();

      const nodeEnter = node.enter().append("g").attr("class", "node")
        .attr("transform", d => `translate(${source.x0},${source.y0})`)
        .on("click", (e, d) => { e.stopPropagation(); toggleNode(d); })
        .on("dblclick", (e, d) => { e.stopPropagation(); showInfo(d); zoomToNode(d); });

      nodeEnter.append("circle").attr("r", d => radii[d.data.type])
        .attr("fill", d => colors[d.data.type].fill).attr("stroke", d => colors[d.data.type].stroke);

      nodeEnter.append("rect").attr("class", "label-bg").attr("fill", "#f5f0e8").attr("fill-opacity", 0.92)
        .attr("rx", 2).attr("x", d => radii[d.data.type] + 4).attr("y", -9).attr("height", 18)
        .attr("width", d => { const fs = {root:18,family:17,subgroup:16,technique:15}[d.data.type]; return d.data.name.length * fs * 0.56 + 12; });

      nodeEnter.append("text").attr("dy", ".31em").attr("x", d => radii[d.data.type] + 10).attr("text-anchor", "start")
        .style("font-size", d => ({root:"18px",family:"17px",subgroup:"16px",technique:"15px"})[d.data.type])
        .style("font-weight", "500").style("fill", d => colors[d.data.type].text).text(d => d.data.name);

      nodeEnter.merge(node).transition().duration(DURATION)
        .attr("transform", d => `translate(${d.x},${d.y})`).select("circle").attr("r", d => radii[d.data.type]);
    }

    function stepPath(s, t) {
      const midY = (s.y + t.y) / 2, dx = t.x - s.x;
      if (Math.abs(dx) < 1) return `M${s.x},${s.y}L${t.x},${t.y}`;
      const r = Math.min(10, Math.abs(dx) / 2, (t.y - s.y) / 3), sign = dx > 0 ? 1 : -1;
      return `M${s.x},${s.y}L${s.x},${midY - r}Q${s.x},${midY} ${s.x + sign * r},${midY}L${t.x - sign * r},${midY}Q${t.x},${midY} ${t.x},${midY + r}L${t.x},${t.y}`;
    }

    function relArcPath(sx, sy, tx, ty) {
      const mx = (sx + tx) / 2, my = (sy + ty) / 2, dx = tx - sx, dy = ty - sy, len = Math.sqrt(dx*dx+dy*dy)||1;
      const off = Math.min(100, len * 0.35), cx = mx + (-dy / len) * off, cy = my + (dx / len) * off;
      return `M${sx},${sy}Q${cx},${cy}${tx},${ty}`;
    }

    function toggleNode(d) {
      if (d.children) { d._children = d.children; d.children = null; }
      else if (d._children) { d.children = d._children; d._children = null; }
      update(d);
      showInfo(d);
      drawRelationArcs(d);
    }

    function drawRelationArcs(d) {
      relationsGroup.selectAll("*").remove();
      if (!d.data.info || !d.data.info.related || d.data.info.related.length === 0) {
        d3.select("#axis-legend").classed("visible", false);
        return;
      }

      const relatedNodes = [];
      d.data.info.related.forEach(name => {
        const rel = RELATIONS.find(r => (r.from === d.data.name && r.to === name) || (r.to === d.data.name && r.from === name));
        if (rel && nodeMap.has(name)) {
          relatedNodes.push({ node: nodeMap.get(name), axis: rel.axis });
        }
      });

      const legendBody = d3.select("#axis-legend-body");
      legendBody.selectAll(".ax-row").remove();

      const axesUsed = new Set(relatedNodes.map(r => r.axis));
      axesUsed.forEach(axis => {
        const row = legendBody.append("div").attr("class", "ax-row");
        row.append("div").attr("class", "ax-color").style("background", AXES[axis].color);
        row.append("div").attr("class", "ax-label").text(AXES[axis].label);
      });

      relatedNodes.forEach(({ node, axis }) => {
        relationsGroup.append("path").attr("class", "rel-arc").attr("d", relArcPath(d.x, d.y, node.x, node.y)).attr("stroke", AXES[axis].color);
        relationsGroup.append("circle").attr("class", "rel-node-marker").attr("cx", node.x).attr("cy", node.y)
          .attr("r", radii[node.data.type] + 3).attr("fill", AXES[axis].color);
      });

      d3.select("#axis-legend").classed("visible", true);
    }

    function showInfo(d) {
      currentSelectedNode = d;
      const info = d.data.info || {};
      d3.select("#info-type").text(d.data.type.charAt(0).toUpperCase() + d.data.type.slice(1));
      d3.select("#info-definition").text(info.definition || "");
      d3.select("#info-effect").text(info.effect || "");
      d3.select("#info-example").text(info.example || "");

      const relatedSection = d3.select("#related-section");
      if (info.related && info.related.length > 0) {
        relatedSection.style("display", "block");
        const tags = d3.select("#info-related").selectAll(".related-tag").data(info.related);
        tags.exit().remove();
        tags.enter().append("div").attr("class", "related-tag").text(t => t)
          .on("click", (e, t) => { e.stopPropagation(); navigateTo(t); }).merge(tags);
      } else {
        relatedSection.style("display", "none");
      }

      d3.select("#info-panel").classed("visible", true);
    }

    function navigateTo(name) {
      function findNodeByName(node, targetName) {
        if (node.data.name === targetName) return node;
        if (node.children) for (let child of node.children) { const found = findNodeByName(child, targetName); if (found) return found; }
        if (node._children) for (let child of node._children) { const found = findNodeByName(child, targetName); if (found) return found; }
        return null;
      }
      const targetNode = findNodeByName(root, name);
      if (!targetNode) return;
      let ancestor = targetNode.parent;
      while (ancestor) {
        if (ancestor._children) { ancestor.children = ancestor._children; ancestor._children = null; }
        ancestor = ancestor.parent;
      }
      update(root);
      setTimeout(() => { zoomToNode(targetNode); showInfo(targetNode); drawRelationArcs(targetNode); }, DURATION + 100);
    }

    function zoomToNode(d) {
      const scale = 0.8, x = d.x, y = d.y;
      const transform = d3.zoomIdentity.translate(W / 2, H / 2).scale(scale).translate(-x, -y);
      svg.transition().duration(DURATION).call(zoom.transform, transform);
    }

    function expandAll() {
      function expandRecursive(d) {
        if (d._children) { d.children = d._children; d._children = null; }
        if (d.children) d.children.forEach(expandRecursive);
      }
      expandRecursive(root);
      update(root);
      relationsGroup.selectAll("*").remove();
      d3.select("#axis-legend").classed("visible", false);
    }

    function collapseAll() {
      function collapseRecursive(d) {
        if (d.children) { d._children = d.children; d.children = null; }
        if (d._children) d._children.forEach(collapseRecursive);
      }
      collapseRecursive(root);
      update(root);
      relationsGroup.selectAll("*").remove();
      d3.select("#axis-legend").classed("visible", false);
    }

    function resetView() {
      collapseAll();
      svg.transition().duration(DURATION).call(zoom.transform, initialTransform);
      d3.select("#info-panel").classed("visible", false);
      relationsGroup.selectAll("*").remove();
      d3.select("#axis-legend").classed("visible", false);
    }

    const infoPanel = d3.select("#info-panel");
    const panelHeader = d3.select(".panel-header");

    panelHeader.on("mousedown", (e) => {
      isPanelDragging = true;
      const rect = infoPanel.node().getBoundingClientRect();
      infoPanelDragOffset.x = e.clientX - rect.left;
      infoPanelDragOffset.y = e.clientY - rect.top;
    });

    d3.select(document).on("mousemove", (e) => {
      if (!isPanelDragging) return;
      const x = e.clientX - infoPanelDragOffset.x, y = e.clientY - infoPanelDragOffset.y;
      infoPanel.style("left", x + "px").style("right", "auto").style("top", y + "px");
    });

    d3.select(document).on("mouseup", () => { isPanelDragging = false; });

    d3.select("#expand-all").on("click", expandAll);
    d3.select("#collapse-all").on("click", collapseAll);
    d3.select("#reset-view").on("click", resetView);
    d3.select("#zoom-in").on("click", () => { svg.transition().duration(300).call(zoom.scaleBy, 1.3); });
    d3.select("#zoom-out").on("click", () => { svg.transition().duration(300).call(zoom.scaleBy, 0.77); });

    update(root);
  </script>
</body>
</html>
