  <style>
    :root {
      --paper-1: #f2e8d5;
      --paper-2: #e7d8bf;
      --paper-3: #d8c19e;
      --paper-4: #c7a97c;

      --ink-soft: #6a5138;
      --ink-mid: #513826;
      --ink-deep: #2b1a10;

      --gold-1: #fff7dc;
      --gold-2: #f3e2b1;
      --gold-3: #dfc27c;
      --gold-4: #bc8f42;
      --gold-5: #7d5418;
      --gold-6: #53320d;

      --wax-darkest: #220103;
      --wax-dark: #340306;
      --wax-mid: #4d0508;
      --wax-rich: #67080d;
      --wax-light: #8d1015;

      --shadow-soft: 0 18px 40px rgba(46, 26, 10, 0.12);
      --shadow-deep: 0 24px 70px rgba(26, 10, 3, 0.16);
      --ease: cubic-bezier(0.22, 1, 0.36, 1);
      --page-max: 980px;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      min-height: 100%;
      background: #130c08;
      overflow-x: hidden;
    }

    body {
      position: relative;
      color: var(--ink-mid);
      font-family: "Cormorant Garamond", serif;
      background:
        radial-gradient(circle at 14% 18%, rgba(255,250,240,0.52) 0 140px, transparent 320px),
        radial-gradient(circle at 86% 20%, rgba(255,245,225,0.34) 0 120px, transparent 280px),
        radial-gradient(circle at 20% 82%, rgba(255,247,232,0.22) 0 170px, transparent 320px),
        radial-gradient(circle at 82% 78%, rgba(255,242,218,0.24) 0 150px, transparent 300px),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.04)),
        linear-gradient(180deg, var(--paper-1) 0%, var(--paper-2) 42%, var(--paper-3) 76%, var(--paper-4) 100%);
    }

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      opacity: 0.16;
      background:
        radial-gradient(circle at 12% 26%, rgba(120, 88, 45, 0.10) 0 2px, transparent 3px),
        radial-gradient(circle at 76% 66%, rgba(120, 88, 45, 0.09) 0 2px, transparent 3px),
        radial-gradient(circle at 58% 28%, rgba(120, 88, 45, 0.08) 0 2px, transparent 3px),
        radial-gradient(circle at 28% 72%, rgba(120, 88, 45, 0.09) 0 2px, transparent 3px),
        linear-gradient(rgba(126, 95, 58, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(126, 95, 58, 0.06) 1px, transparent 1px);
      background-size:
        180px 180px,
        220px 220px,
        200px 200px,
        240px 240px,
        34px 34px,
        34px 34px;
      mix-blend-mode: multiply;
      z-index: 0;
    }

    body::after {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background:
        radial-gradient(circle at center, transparent 38%, rgba(44, 26, 12, 0.15) 68%, rgba(18, 10, 6, 0.42) 100%);
      z-index: 0;
    }

    .bokeh {
      position: fixed;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      isolation: isolate;
    }

    .bokeh span {
      position: absolute;
      display: block;
      border-radius: 50%;
      opacity: 0;
      filter: blur(18px);
      mix-blend-mode: screen;
      animation-name: floatDown;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      background:
        radial-gradient(circle,
          rgba(255,255,255,1) 0%,
          rgba(255,249,237,0.98) 12%,
          rgba(255,244,224,0.82) 28%,
          rgba(255,236,204,0.48) 48%,
          rgba(255,230,194,0.18) 68%,
          rgba(255,225,185,0.05) 82%,
          transparent 100%);
      box-shadow:
        0 0 80px rgba(255,255,255,0.44),
        0 0 160px rgba(255,242,214,0.30),
        0 0 260px rgba(255,232,194,0.18);
    }

    .bokeh span:nth-child(1)  { left: 4%;  top: 14%; width: 420px; height: 420px; animation-duration: 72s; animation-delay: -18s; }
    .bokeh span:nth-child(2)  { left: 18%; top: -14%; width: 760px; height: 760px; animation-duration: 102s; animation-delay: -44s; }
    .bokeh span:nth-child(3)  { left: 30%; top: 48%; width: 240px; height: 240px; animation-duration: 58s; animation-delay: -16s; }

    .bokeh span:nth-child(5)  { left: 52%; top: 10%; width: 340px; height: 340px; animation-duration: 70s; animation-delay: -28s; }
    .bokeh span:nth-child(6)  { left: 64%; top: 34%; width: 820px; height: 820px; animation-duration: 108s; animation-delay: -56s; }
    .bokeh span:nth-child(7)  { left: 78%; top: -16%; width: 480px; height: 480px; animation-duration: 80s; animation-delay: -34s; }
    .bokeh span:nth-child(8)  { left: 88%; top: 54%; width: 220px; height: 220px; animation-duration: 56s; animation-delay: -14s; }
    .bokeh span:nth-child(9)  { left: -6%; top: 62%; width: 620px; height: 620px; animation-duration: 94s; animation-delay: -48s; }
    .bokeh span:nth-child(10) { left: 46%; top: -28%; width: 1080px; height: 1080px; animation-duration: 124s; animation-delay: -70s; }
    .bokeh span:nth-child(11) { left: 14%; top: 72%; width: 300px; height: 300px; animation-duration: 62s; animation-delay: -26s; }
    .bokeh span:nth-child(12) { left: 72%; top: 2%; width: 400px; height: 400px; animation-duration: 74s; animation-delay: -30s; }
    .bokeh span:nth-child(13) { left: 26%; top: 22%; width: 180px; height: 180px; animation-duration: 52s; animation-delay: -12s; }
    .bokeh span:nth-child(14) { left: 90%; top: 22%; width: 940px; height: 940px; animation-duration: 118s; animation-delay: -68s; }
    .bokeh span:nth-child(15) { left: 58%; top: 72%; width: 260px; height: 260px; animation-duration: 60s; animation-delay: -20s; }
    .bokeh span:nth-child(16) { left: 8%; top: -24%; width: 540px; height: 540px; animation-duration: 86s; animation-delay: -36s; }
    .bokeh span:nth-child(17) { left: 82%; top: 70%; width: 160px; height: 160px; animation-duration: 48s; animation-delay: -10s; }
    .bokeh span:nth-child(18) { left: 34%; top: 68%; width: 680px; height: 680px; animation-duration: 98s; animation-delay: -50s; }

    .page {
      position: relative;
      z-index: 2;
    }

    .landing {
      position: fixed;
      inset: 0;
      display: grid;
      place-items: center;
      padding: 2rem;
      z-index: 5;
      transition:
        opacity 1.8s var(--ease),
        visibility 1.8s var(--ease),
        transform 1.8s var(--ease),
        filter 1.8s var(--ease);
      background: rgba(0,0,0,0);
    }

    body.entered .landing {
      opacity: 0;
      visibility: hidden;
      transform: scale(1.04);
      filter: blur(8px);
      pointer-events: none;
    }

    .landing-inner {
      display: grid;
      gap: 1.6rem;
      place-items: center;
      text-align: center;
      max-width: 44rem;
    }

    .seal-button {
      appearance: none;
      border: 0;
      background: none;
      cursor: pointer;
      padding: 0;
      position: relative;
      width: min(54vw, 420px);
      aspect-ratio: 1 / 1;
      display: grid;
      place-items: center;
      transition: transform 0.45s var(--ease), filter 0.45s var(--ease);
      filter: drop-shadow(0 28px 50px rgba(35, 6, 7, 0.22));
    }

    .seal-button:hover {
      transform: translateY(-4px) scale(1.015);
    }

    .seal-button:active {
      transform: scale(0.99);
    }

    .seal-shadow {
      position: absolute;
      inset: 5%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(18, 2, 3, 0.52) 0%, rgba(18, 2, 3, 0.24) 46%, transparent 72%);
      transform: translateY(10%);
      filter: blur(26px);
    }

    .seal-surface {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 24%, rgba(255, 188, 162, 0.18) 0%, rgba(255, 188, 162, 0.08) 10%, transparent 22%),
        radial-gradient(circle at 64% 72%, rgba(255, 120, 96, 0.08) 0%, transparent 18%),
        radial-gradient(circle at 50% 44%, var(--wax-light) 0%, var(--wax-rich) 26%, var(--wax-mid) 56%, var(--wax-dark) 78%, var(--wax-darkest) 100%);
      box-shadow:
        inset 0 30px 35px rgba(255, 180, 150, 0.10),
        inset 0 -42px 54px rgba(14, 0, 2, 0.60),
        inset 32px 0 40px rgba(125, 6, 10, 0.18),
        inset -30px 0 38px rgba(20, 0, 3, 0.24),
        0 28px 65px rgba(35, 6, 7, 0.24);
    }

    .seal-surface::before {
      content: "";
      position: absolute;
      inset: 3.7%;
      border-radius: 50%;
      border: 3px solid rgba(188, 137, 54, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(255, 225, 155, 0.12),
        0 0 12px rgba(140, 90, 20, 0.14);
      opacity: 0.98;
    }

    .seal-surface::after {
      content: "";
      position: absolute;
      inset: 16.7%;
      border-radius: 50%;
      border: 2px solid rgba(168, 112, 36, 0.34);
      box-shadow: inset 0 0 14px rgba(255, 195, 120, 0.06);
    }

    .seal-light {
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      background:
        linear-gradient(
          115deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 235, 195, 0.00) 43%,
          rgba(255, 235, 195, 0.14) 47%,
          rgba(255, 250, 230, 0.24) 50%,
          rgba(255, 225, 180, 0.10) 53%,
          transparent 58%,
          transparent 100%
        );
      mix-blend-mode: screen;
      transform: translateX(-95%) rotate(8deg);
      animation: sweep 8s ease-in-out infinite;
      pointer-events: none;
    }

    .seal-text {
      position: relative;
      z-index: 2;
      display: grid;
      place-items: center;
      text-align: center;
