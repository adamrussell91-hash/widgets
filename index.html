<!DOCTYPE html>
<html>
<head>
<title>Widget Test</title>
<style>
body {
font-family: Arial;
display: flex;
justify-content: center;
align-items: center;
height: 100vh;
background: #f4f4f4;
}

.card {
background: green;
padding: 30px;
border-radius: 12px;
box-shadow: 0 6px 20px rgba(0,0,0,0.1);
text-align: center;
}

button {
padding: 10px 20px;
font-size: 18px;
border-radius: 8px;
border: none;
background: #6366f1;
color: white;
cursor: pointer;
}

.number {
font-size: 48px;
margin: 20px 0;
}
</style>
</head>

<body>

<div class="card">
<h2>Random Number</h2>
<div class="number" id="number">0</div>
<button onclick="generate()">Generate</button>
</div>

<script>
function generate() {
document.getElementById("number").innerText =
Math.floor(Math.random()*100)+1;
}
</script>

</body>
</html>
