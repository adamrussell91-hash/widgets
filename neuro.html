<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neuro Word Spinner</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: Arial, sans-serif;
      background: #f4f7fb;
      color: #1f2937;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .app {
      width: 100%;
      max-width: 1150px;
      background: white;
      border-radius: 24px;
      padding: 32px;
      box-shadow: 0 12px 40px rgba(0, 0, 0, 0.10);
      text-align: center;
    }

    h1 {
      margin: 0 0 8px;
      font-size: 42px;
    }

    .subtitle {
      margin: 0 0 28px;
      font-size: 18px;
      color: #4b5563;
    }

    .slots {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 16px;
      margin-bottom: 28px;
    }

    .slot {
      border-radius: 20px;
      padding: 18px;
      min-height: 160px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      border: 4px solid transparent;
    }

    .prefix {
      background: #dbeafe;
      border-color: #3b82f6;
    }

    .root {
      background: #dcfce7;
      border-color: #22c55e;
    }

    .middle {
      background: #ede9fe;
      border-color: #8b5cf6;
    }

    .suffix {
      background: #ffedd5;
      border-color: #f97316;
    }

    .label {
      font-size: 15px;
      font-weight: bold;
      letter-spacing: 1px;
      text-transform: uppercase;
      margin-bottom: 14px;
      color: #374151;
    }

    .word-part {
      font-size: 38px;
      font-weight: 800;
      line-height: 1;
      word-break: break-word;
    }

    .result-box {
      background: #f9fafb;
      border: 2px solid #e5e7eb;
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 24px;
    }

    .result-label {
      font-size: 16px;
      font-weight: bold;
      color: #6b7280;
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-bottom: 8px;
    }

    #resultWord {
      font-size: 54px;
      font-weight: 900;
      color: #111827;
      min-height: 66px;
      word-break: break-word;
    }

    button {
      border: none;
      background: #111827;
      color: white;
      font-size: 22px;
      font-weight: bold;
      padding: 16px 32px;
      border-radius: 999px;
      cursor: pointer;
      transition: transform 0.15s ease, background 0.15s ease;
    }

    button:hover {
      background: #374151;
      transform: translateY(-2px);
    }

    button:active {
      transform: translateY(1px);
    }

    .challenge {
      margin-top: 24px;
      font-size: 18px;
      color: #374151;
      background: #eef2ff;
      border-radius: 16px;
      padding: 16px;
    }

    .spin {
      animation: pulse 0.12s linear infinite;
    }

    @keyframes pulse {
      0% { transform: scale(1); opacity: 1; }
      50% { transform: scale(1.08); opacity: 0.65; }
      100% { transform: scale(1); opacity: 1; }
    }

    @media (max-width: 900px) {
      .slots {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 560px) {
      .slots {
        grid-template-columns: 1fr;
      }

      h1 {
        font-size: 32px;
      }

      .word-part {
        font-size: 42px;
      }

      #resultWord {
        font-size: 40px;
      }
    }
  </style>
</head>
<body>
  <main class="app">
    <h1>Neuro Word Spinner</h1>
    <p class="subtitle">Spin the cards. Build a strange neuroscience word. Then explain what it might mean.</p>

    <section class="slots">
      <div class="slot prefix">
        <div class="label">Prefix</div>
        <div class="word-part" id="prefixSlot">hypo</div>
      </div>

      <div class="slot root">
        <div class="label">Root</div>
        <div class="word-part" id="rootSlot">neuro</div>
      </div>

      <div class="slot middle">
        <div class="label">Middle</div>
        <div class="word-part" id="middleSlot">sensory</div>
      </div>

      <div class="slot suffix">
        <div class="label">Suffix</div>
        <div class="word-part" id="suffixSlot">itis</div>
      </div>
    </section>

    <section class="result-box">
      <div class="result-label">Your neuro word</div>
      <div id="resultWord">hyponeurosensoryitis</div>
    </section>

    <button onclick="spinWords()">Spin Neuro Word</button>

    <div class="challenge" id="challengeText">
      Challenge: What could this word mean in plain English?
    </div>
  </main>

  <script>
    const prefixes = [
      "hypo", "hyper", "micro", "macro", "poly",
      "mono", "hemi", "peri", "epi", "auto",
      "syn", "anti", "dys", "neo", "sub"
    ];

    const roots = [
      "neuro", "encephal", "soma", "therm", "vaso",
      "dendro", "cardio", "cortex", "gluco", "psych",
      "cranio", "sensory", "motor", "astro", "myelo"
    ];

    const middles = [
      "sensory", "motor", "visual", "auditory", "memory",
      "cognitive", "emotional", "spinal", "cranial", "cortical",
      "synaptic", "limbic", "plastic", "chemical", "signal"
    ];

    const suffixes = [
      "itis", "ectomy", "logy", "oma", "plasty",
      "graphy", "pathy", "genesis", "osis", "ia",
      "al", "ic", "tion", "scope", "meter"
    ];

    const challenges = [
      "Challenge: Define this word in plain English.",
      "Challenge: Is this a real condition, a fake condition, or a possible future term? Defend your answer.",
      "Challenge: Draw what this word might look like in the brain.",
      "Challenge: Use this word in a serious scientific sentence.",
      "Challenge: Invent a patient case study for this word.",
      "Challenge: Decide which part of the brain this word might involve.",
      "Challenge: Explain whether this word sounds dangerous, harmless, or useful.",
      "Challenge: Break the word into parts and explain each part."
    ];

    function randomItem(list) {
      return list[Math.floor(Math.random() * list.length)];
    }

    function cleanWord(prefix, root, middle, suffix) {
      return prefix + root + middle + suffix;
    }

    function spinWords() {
      const prefixSlot = document.getElementById("prefixSlot");
      const rootSlot = document.getElementById("rootSlot");
      const middleSlot = document.getElementById("middleSlot");
      const suffixSlot = document.getElementById("suffixSlot");
      const resultWord = document.getElementById("resultWord");
      const challengeText = document.getElementById("challengeText");

      prefixSlot.classList.add("spin");
      rootSlot.classList.add("spin");
      middleSlot.classList.add("spin");
      suffixSlot.classList.add("spin");
      resultWord.textContent = "Spinning...";

      let spinCount = 0;

      const spinner = setInterval(() => {
        const tempPrefix = randomItem(prefixes);
        const tempRoot = randomItem(roots);
        const tempMiddle = randomItem(middles);
        const tempSuffix = randomItem(suffixes);

        prefixSlot.textContent = tempPrefix;
        rootSlot.textContent = tempRoot;
        middleSlot.textContent = tempMiddle;
        suffixSlot.textContent = tempSuffix;

        spinCount++;

        if (spinCount > 18) {
          clearInterval(spinner);

          const finalPrefix = randomItem(prefixes);
          const finalRoot = randomItem(roots);
          const finalMiddle = randomItem(middles);
          const finalSuffix = randomItem(suffixes);
          const finalWord = cleanWord(finalPrefix, finalRoot, finalMiddle, finalSuffix);

          prefixSlot.textContent = finalPrefix;
          rootSlot.textContent = finalRoot;
          middleSlot.textContent = finalMiddle;
          suffixSlot.textContent = finalSuffix;
          resultWord.textContent = finalWord;
          challengeText.textContent = randomItem(challenges);

          prefixSlot.classList.remove("spin");
          rootSlot.classList.remove("spin");
          middleSlot.classList.remove("spin");
          suffixSlot.classList.remove("spin");
        }
      }, 80);
    }
  </script>
</body>
</html>
