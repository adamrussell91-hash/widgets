<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13th July</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Great+Vibes&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper-1: #efe4cf;
      --paper-2: #e3d5bc;
      --paper-3: #d7c6aa;
      --wax-dark: #4f0508;
      --wax-mid: #7d0a0f;
      --wax-rich: #990d13;
      --wax-light: #b71b1e;
      --gold-1: #f3df9b;
      --gold-2: #d8b76b;
      --gold-3: #9d6f21;
      --gold-4: #6b4610;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #16110c;
    }

    body {
      position: relative;
      font-family: "Cormorant Garamond", serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 18% 20%, rgba(255, 249, 235, 0.32) 0 90px, transparent 180px),
        radial-gradient(circle at 82% 24%, rgba(255, 246, 228, 0.22) 0 70px, transparent 170px),
        radial-gradient(circle at 24% 78%, rgba(255, 247, 232, 0.16) 0 100px, transparent 200px),
        radial-gradient(circle at 78% 76%, rgba(255, 245, 225, 0.16) 0 90px, transparent 180px),
        linear-gradient(180deg, rgba(255,255,255,0.04), rgba(0,0,0,0.03)),
        linear-gradient(180deg, var(--paper-1), var(--paper-2) 48%, var(--paper-3));
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.14;
      background-image:
        linear-gradient(rgba(118, 92, 53, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(118, 92, 53, 0.06) 1px, transparent 1px);
      background-size: 34px 34px, 34px 34px;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 75, 18, 0.08), transparent 58%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 72%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 42%, rgba(40, 24, 12, 0.18) 72%, rgba(18, 10, 6, 0.42) 100%);
      pointer-events: none;
      z-index: 2;
    }

    .bokeh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .bokeh span {
      position: absolute;
      top: -20vh;
      border-radius: 50%;
      opacity: 0;
      filter: blur(2px);
      animation: floatDown linear infinite;
      box-shadow: 0 0 30px rgba(255, 248, 230, 0.18);
    }

    .bokeh span:nth-child(1) {
      left: 6%;
      width: 110px;
      height: 110px;
      background: radial-gradient(circle, rgba(255,255,255,0.28) 0%, rgba(255,247,228,0.16) 40%, transparent 78%);
      animation-duration: 18s;
      animation-delay: 0s;
    }

    .bokeh span:nth-child(2) {
      left: 16%;
      width: 60px;
      height: 60px;
      background: radial-gradient(circle, rgba(255,255,255,0.26) 0%, rgba(255,241,215,0.14) 42%, transparent 78%);
      animation-duration: 14s;
      animation-delay: 3s;
    }

    .bokeh span:nth-child(3) {
      left: 28%;
      width: 140px;
      height: 140px;
      background: radial-gradient(circle, rgba(255,249,240,0.24) 0%, rgba(255,239,208,0.12) 44%, transparent 78%);
      animation-duration: 22s;
      animation-delay: 1s;
    }

    .bokeh span:nth-child(4) {
      left: 43%;
      width: 80px;
      height: 80px;
      background: radial-gradient(circle, rgba(255,255,255,0.25) 0%, rgba(255,245,223,0.13) 42%, transparent 78%);
      animation-duration: 16s;
      animation-delay: 6s;
    }

    .bokeh span:nth-child(5) {
      left: 58%;
      width: 150px;
      height: 150px;
      background: radial-gradient(circle, rgba(255,250,240,0.24) 0%, rgba(255,237,206,0.12) 44%, transparent 78%);
      animation-duration: 24s;
      animation-delay: 2s;
    }

    .bokeh span:nth-child(6) {
      left: 72%;
      width: 72px;
      height: 72px;
      background: radial-gradient(circle, rgba(255,255,255,0.22) 0%, rgba(255,242,214,0.12) 42%, transparent 78%);
      animation-duration: 17s;
      animation-delay: 4s;
    }

    .bokeh span:nth-child(7) {
      left: 84%;
      width: 125px;
      height: 125px;
      background: radial-gradient(circle, rgba(255,249,235,0.22) 0%, rgba(255,236,205,0.11) 45%, transparent 78%);
      animation-duration: 20s;
      animation-delay: 7s;
    }

    .bokeh span:nth-child(8) {
      left: 92%;
      width: 56px;
      height: 56px;
      background: radial-gradient(circle, rgba(255,255,255,0.24) 0%, rgba(255,240,210,0.12) 42%, transparent 78%);
      animation-duration: 15s;
      animation-delay: 9s;
    }

    .seal-wrap {
      position: relative;
      width: min(52vw, 700px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
    }

    .seal-shadow {
      position: absolute;
      width: 92%;
      height: 92%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(30, 7, 6, 0.42) 0%, rgba(30, 7, 6, 0.18) 46%, transparent 72%);
      transform: translateY(8%);
      filter: blur(22px);
    }

    .seal {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 28%, rgba(255, 160, 130, 0.18) 0%, transparent 18%),
        radial-gradient(circle at 50% 45%, var(--wax-light) 0%, var(--wax-rich) 32%, var(--wax-mid) 62%, var(--wax-dark) 100%);
      box-shadow:
        inset 0 22px 28px rgba(255, 170, 135, 0.14),
        inset 0 -30px 42px rgba(45, 2, 6, 0.48),
        inset 22px 0 28px rgba(130, 8, 12, 0.24),
        inset -22px 0 28px rgba(48, 2, 6, 0.22),
        0 24px 60px rgba(55, 10, 10, 0.32);
    }

    .seal::before {
      content: "";
      position: absolute;
      inset: 3.6%;
      border-radius: 50%;
      border: 3px solid rgba(188, 137, 54, 0.72);
      box-shadow:
        inset 0 0 0 1px rgba(255, 220, 150, 0.12),
        0 0 10px rgba(140, 90, 20, 0.12);
      opacity: 0.95;
    }

    .seal::after {
      content: "";
      position: absolute;
      inset: 17%;
      border-radius: 50%;
      border: 2px solid rgba(168, 112, 36, 0.34);
      box-shadow: inset 0 0 14px rgba(255, 195, 120, 0.06);
    }

    .wax-texture {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.07) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 44%, rgba(255,255,255,0.05) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 70%, rgba(255,255,255,0.05) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 58%, rgba(0,0,0,0.08) 0 1px, transparent 2px);
      background-size: 120px 120px, 160px 160px, 180px 180px, 140px 140px;
      mix-blend-mode: soft-light;
      opacity: 0.55;
      pointer-events: none;
    }

    .highlight {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 24%, rgba(255, 198, 166, 0.22) 0%, rgba(255, 198, 166, 0.08) 16%, transparent 28%),
        radial-gradient(ellipse at 50% 50%, transparent 58%, rgba(40, 4, 5, 0.10) 85%, rgba(20, 2, 2, 0.18) 100%);
      pointer-events: none;
    }

    .title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 3;
      pointer-events: none;
    }

    .title span {
      font-family: "Great Vibes", cursive;
      font-size: clamp(4.2rem, 7.2vw, 7.8rem);
      font-weight: 400;
      line-height: 1;
      color: var(--gold-2);
      background: linear-gradient(180deg, var(--gold-1) 0%, #ebd18c 18%, var(--gold-2) 42%, var(--gold-3) 76%, var(--gold-4) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 1px 0 rgba(255, 239, 190, 0.22),
        0 2px 2px rgba(86, 47, 6, 0.22),
        0 5px 10px rgba(48, 16, 4, 0.12);
      transform: translateY(-2%);
      letter-spacing: 0.02em;
      filter: drop-shadow(0 2px 4px rgba(75, 32, 8, 0.22));
    }

    .seal-sparkles,
    .bg-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      opacity: 0;
      animation: twinkle 5.5s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,255,255,0.98) 0%, rgba(255,241,202,0.82) 28%, rgba(255,217,154,0.36) 55%, transparent 78%);
      border-radius: 999px;
      filter: blur(0.2px);
    }

    .sparkle::before {
      width: 2px;
      height: 20px;
    }

    .sparkle::after {
      width: 20px;
      height: 2px;
    }

    .seal-sparkles .sparkle {
      width: 22px;
      height: 22px;
    }

    .seal-sparkles .sparkle:nth-child(1) { top: 19%; left: 24%; animation-delay: 0.2s; }
    .seal-sparkles .sparkle:nth-child(2) { top: 23%; right: 19%; animation-delay: 2.2s; }
    .seal-sparkles .sparkle:nth-child(3) { top: 43%; right: 10%; animation-delay: 3.1s; }
    .seal-sparkles .sparkle:nth-child(4) { bottom: 16%; left: 48%; animation-delay: 1.6s; }
    .seal-sparkles .sparkle:nth-child(5) { bottom: 30%; left: 18%; animation-delay: 4.2s; }

    .bg-sparkles .sparkle {
      width: 34px;
      height: 34px;
      animation-duration: 7.5s;
    }

    .bg-sparkles .sparkle:nth-child(1) { top: 10%; left: 12%; animation-delay: 0s; }
    .bg-sparkles .sparkle:nth-child(2) { top: 16%; right: 11%; animation-delay: 1.8s; }
    .bg-sparkles .sparkle:nth-child(3) { bottom: 18%; left: 11%; animation-delay: 3.3s; }
    .bg-sparkles .sparkle:nth-child(4) { bottom: 14%; right: 13%; animation-delay: 2.5s; }
    .bg-sparkles .sparkle:nth-child(5) { top: 46%; left: 6%; animation-delay: 4.4s; }
    .bg-sparkles .sparkle:nth-child(6) { top: 62%; right: 7%; animation-delay: 5.2s; }

    @keyframes floatDown {
      0% {
        transform: translate3d(0, -18vh, 0) scale(0.92);
        opacity: 0;
      }
      8% {
        opacity: 0.72;
      }
      55% {
        opacity: 0.34;
      }
      100% {
        transform: translate3d(24px, 120vh, 0) scale(1.14);
        opacity: 0;
      }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.55);
        opacity: 0.08;
      }
      22% {
        transform: scale(1.08);
        opacity: 0.92;
      }
      46% {
        transform: scale(0.72);
        opacity: 0.24;
      }
    }

    @media (max-width: 900px) {
      .seal-wrap {
        width: min(72vw, 620px);
      }

      .title span {
        font-size: clamp(3.6rem, 10vw, 6.2rem);
      }
    }

    @media (max-width: 600px) {
      .seal-wrap {
        width: min(84vw, 520px);
      }

      .bokeh span:nth-child(1),
      .bokeh span:nth-child(3),
      .bokeh span:nth-child(5),
      .bokeh span:nth-child(7) {
        width: 90px;
        height: 90px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bokeh">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="bg-sparkles">
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
    </div>

    <div class="seal-wrap">
      <div class="seal-shadow"></div>
      <div class="seal">
        <div class="wax-texture"></div>
        <div class="highlight"></div>

        <div class="seal-sparkles">
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
        </div>

        <div class="title">
          <span>13th July</span>
        </div>
      </div>
    </div>

    <div class="vignette"></div>
  </div>
</body>
</html>
