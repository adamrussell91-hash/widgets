<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13th July</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Luxurious+Script&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper-1: #efe5d1;
      --paper-2: #e3d4ba;
      --paper-3: #d7c5a7;

      --wax-darkest: #2b0205;
      --wax-dark: #430407;
      --wax-mid: #5d060b;
      --wax-rich: #760b10;
      --wax-light: #9a1218;

      --gold-1: #f7e8bb;
      --gold-2: #dfc37f;
      --gold-3: #bc9342;
      --gold-4: #8a611d;
      --gold-5: #5b390d;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #130c08;
    }

    body {
      position: relative;
      font-family: "Cormorant Garamond", serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 249, 235, 0.42) 0 120px, transparent 260px),
        radial-gradient(circle at 84% 22%, rgba(255, 245, 225, 0.32) 0 110px, transparent 240px),
        radial-gradient(circle at 23% 80%, rgba(255, 247, 232, 0.22) 0 130px, transparent 260px),
        radial-gradient(circle at 80% 78%, rgba(255, 244, 220, 0.22) 0 120px, transparent 250px),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.04)),
        linear-gradient(180deg, var(--paper-1), var(--paper-2) 48%, var(--paper-3));
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        linear-gradient(rgba(118, 92, 53, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(118, 92, 53, 0.06) 1px, transparent 1px);
      background-size: 34px 34px, 34px 34px;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 75, 18, 0.10), transparent 58%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 72%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 40%, rgba(40, 24, 12, 0.20) 72%, rgba(18, 10, 6, 0.46) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .bokeh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
    }

    .bokeh span {
      position: absolute;
      top: -30vh;
      border-radius: 50%;
      opacity: 0;
      filter: blur(2px);
      animation: floatDown linear infinite;
      box-shadow:
        0 0 30px rgba(255, 248, 232, 0.32),
        0 0 70px rgba(255, 239, 210, 0.16);
    }

    .bokeh span:nth-child(1)  { left: 3%;  width: 120px; height: 120px; animation-duration: 16s; animation-delay: 0s;  background: radial-gradient(circle, rgba(255,255,255,0.48) 0%, rgba(255,245,225,0.26) 42%, transparent 78%); }
    .bokeh span:nth-child(2)  { left: 10%; width: 76px;  height: 76px;  animation-duration: 12s; animation-delay: 2s;  background: radial-gradient(circle, rgba(255,255,255,0.40) 0%, rgba(255,240,215,0.22) 42%, transparent 78%); }
    .bokeh span:nth-child(3)  { left: 18%; width: 155px; height: 155px; animation-duration: 20s; animation-delay: 4s;  background: radial-gradient(circle, rgba(255,249,240,0.38) 0%, rgba(255,238,206,0.22) 44%, transparent 78%); }
    .bokeh span:nth-child(4)  { left: 27%; width: 95px;  height: 95px;  animation-duration: 15s; animation-delay: 1s;  background: radial-gradient(circle, rgba(255,255,255,0.40) 0%, rgba(255,242,218,0.24) 42%, transparent 78%); }
    .bokeh span:nth-child(5)  { left: 36%; width: 175px; height: 175px; animation-duration: 22s; animation-delay: 5s;  background: radial-gradient(circle, rgba(255,248,236,0.36) 0%, rgba(255,235,205,0.20) 44%, transparent 78%); }
    .bokeh span:nth-child(6)  { left: 46%; width: 84px;  height: 84px;  animation-duration: 13s; animation-delay: 3s;  background: radial-gradient(circle, rgba(255,255,255,0.42) 0%, rgba(255,240,210,0.22) 42%, transparent 78%); }
    .bokeh span:nth-child(7)  { left: 56%; width: 145px; height: 145px; animation-duration: 19s; animation-delay: 6s;  background: radial-gradient(circle, rgba(255,250,240,0.36) 0%, rgba(255,236,205,0.20) 44%, transparent 78%); }
    .bokeh span:nth-child(8)  { left: 66%; width: 70px;  height: 70px;  animation-duration: 11s; animation-delay: 1.5s;background: radial-gradient(circle, rgba(255,255,255,0.40) 0%, rgba(255,241,214,0.22) 42%, transparent 78%); }
    .bokeh span:nth-child(9)  { left: 73%; width: 165px; height: 165px; animation-duration: 23s; animation-delay: 7s;  background: radial-gradient(circle, rgba(255,248,235,0.34) 0%, rgba(255,234,203,0.18) 44%, transparent 78%); }
    .bokeh span:nth-child(10) { left: 81%; width: 92px;  height: 92px;  animation-duration: 14s; animation-delay: 2.5s;background: radial-gradient(circle, rgba(255,255,255,0.42) 0%, rgba(255,240,212,0.22) 42%, transparent 78%); }
    .bokeh span:nth-child(11) { left: 88%; width: 135px; height: 135px; animation-duration: 18s; animation-delay: 5.5s;background: radial-gradient(circle, rgba(255,249,238,0.34) 0%, rgba(255,235,205,0.18) 44%, transparent 78%); }
    .bokeh span:nth-child(12) { left: 95%; width: 64px;  height: 64px;  animation-duration: 12s; animation-delay: 8s;  background: radial-gradient(circle, rgba(255,255,255,0.42) 0%, rgba(255,239,210,0.20) 42%, transparent 78%); }

    .seal-wrap {
      position: relative;
      width: min(54vw, 720px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .seal-shadow {
      position: absolute;
      width: 94%;
      height: 94%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(18, 2, 3, 0.52) 0%, rgba(18, 2, 3, 0.24) 46%, transparent 72%);
      transform: translateY(10%);
      filter: blur(24px);
    }

    .seal {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 24%, rgba(255, 188, 162, 0.18) 0%, rgba(255, 188, 162, 0.08) 10%, transparent 22%),
        radial-gradient(circle at 64% 72%, rgba(255, 120, 96, 0.08) 0%, transparent 18%),
        radial-gradient(circle at 50% 44%, var(--wax-light) 0%, var(--wax-rich) 26%, var(--wax-mid) 56%, var(--wax-dark) 78%, var(--wax-darkest) 100%);
      box-shadow:
        inset 0 30px 35px rgba(255, 180, 150, 0.10),
        inset 0 -42px 54px rgba(14, 0, 2, 0.60),
        inset 32px 0 40px rgba(125, 6, 10, 0.18),
        inset -30px 0 38px rgba(20, 0, 3, 0.24),
        0 28px 65px rgba(35, 6, 7, 0.34);
    }

    .seal::before {
      content: "";
      position: absolute;
      inset: 3.7%;
      border-radius: 50%;
      border: 3px solid rgba(188, 137, 54, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(255, 225, 155, 0.12),
        0 0 12px rgba(140, 90, 20, 0.14);
      opacity: 0.98;
      z-index: 2;
    }

    .seal::after {
      content: "";
      position: absolute;
      inset: 16.7%;
      border-radius: 50%;
      border: 2px solid rgba(168, 112, 36, 0.34);
      box-shadow: inset 0 0 14px rgba(255, 195, 120, 0.06);
      z-index: 2;
    }

    .wax-texture {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 44%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 70%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 58%, rgba(0,0,0,0.10) 0 1px, transparent 2px);
      background-size: 120px 120px, 160px 160px, 180px 180px, 140px 140px;
      mix-blend-mode: soft-light;
      opacity: 0.60;
      pointer-events: none;
      z-index: 1;
    }

    .highlight {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 23%, rgba(255, 205, 175, 0.22) 0%, rgba(255, 205, 175, 0.08) 16%, transparent 28%),
        radial-gradient(ellipse at 50% 50%, transparent 58%, rgba(20, 2, 2, 0.12) 85%, rgba(10, 0, 1, 0.20) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .light-sweep {
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      background:
        linear-gradient(
          115deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 235, 195, 0.00) 43%,
          rgba(255, 235, 195, 0.14) 47%,
          rgba(255, 250, 230, 0.24) 50%,
          rgba(255, 225, 180, 0.10) 53%,
          transparent 58%,
          transparent 100%
        );
      mix-blend-mode: screen;
      transform: translateX(-95%) rotate(8deg);
      animation: sweep 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    .title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
      pointer-events: none;
    }

    .title span {
      font-family: "Luxurious Script", cursive;
      font-size: clamp(4.8rem, 8vw, 8.8rem);
      font-weight: 400;
      line-height: 1;
      color: var(--gold-2);
      background: linear-gradient(180deg, var(--gold-1) 0%, #edd897 16%, var(--gold-2) 40%, var(--gold-3) 70%, var(--gold-4) 88%, var(--gold-5) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 1px 0 rgba(255, 243, 205, 0.26),
        0 2px 2px rgba(86, 47, 6, 0.24),
        0 6px 14px rgba(48, 16, 4, 0.16);
      transform: translateY(-3%) scale(1.02);
      letter-spacing: 0.02em;
      filter: drop-shadow(0 2px 5px rgba(75, 32, 8, 0.20));
    }

    .seal-sparkles,
    .bg-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      opacity: 0;
      animation: twinkle 5.4s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,255,255,0.98) 0%, rgba(255,241,202,0.82) 28%, rgba(255,217,154,0.36) 55%, transparent 78%);
      border-radius: 999px;
      filter: blur(0.2px);
    }

    .sparkle::before {
      width: 2px;
      height: 22px;
    }

    .sparkle::after {
      width: 22px;
      height: 2px;
    }

    .seal-sparkles .sparkle {
      width: 24px;
      height: 24px;
    }

    .seal-sparkles .sparkle:nth-child(1) { top: 16%; left: 23%; animation-delay: 0.2s; }
    .seal-sparkles .sparkle:nth-child(2) { top: 21%; right: 18%; animation-delay: 2.2s; }
    .seal-sparkles .sparkle:nth-child(3) { top: 41%; right: 10%; animation-delay: 3.1s; }
    .seal-sparkles .sparkle:nth-child(4) { bottom: 16%; left: 49%; animation-delay: 1.6s; }
    .seal-sparkles .sparkle:nth-child(5) { bottom: 28%; left: 17%; animation-delay: 4.2s; }
    .seal-sparkles .sparkle:nth-child(6) { top: 58%; left: 11%; animation-delay: 2.9s; }
    .seal-sparkles .sparkle:nth-child(7) { top: 30%; left: 70%; animation-delay: 5.1s; }

    .bg-sparkles .sparkle {
      width: 34px;
      height: 34px;
      animation-duration: 7.5s;
    }

    .bg-sparkles .sparkle:nth-child(1)  { top: 8%;  left: 10%; animation-delay: 0s; }
    .bg-sparkles .sparkle:nth-child(2)  { top: 13%; right: 12%; animation-delay: 1.2s; }
    .bg-sparkles .sparkle:nth-child(3)  { bottom: 18%; left: 10%; animation-delay: 3.1s; }
    .bg-sparkles .sparkle:nth-child(4)  { bottom: 14%; right: 13%; animation-delay: 2.5s; }
    .bg-sparkles .sparkle:nth-child(5)  { top: 45%; left: 5%; animation-delay: 4.4s; }
    .bg-sparkles .sparkle:nth-child(6)  { top: 61%; right: 6%; animation-delay: 5.2s; }
    .bg-sparkles .sparkle:nth-child(7)  { top: 24%; left: 24%; animation-delay: 2.9s; }
    .bg-sparkles .sparkle:nth-child(8)  { top: 28%; right: 24%; animation-delay: 4.8s; }
    .bg-sparkles .sparkle:nth-child(9)  { bottom: 28%; left: 24%; animation-delay: 1.8s; }
    .bg-sparkles .sparkle:nth-child(10) { bottom: 26%; right: 24%; animation-delay: 6.1s; }
    .bg-sparkles .sparkle:nth-child(11) { top: 52%; left: 18%; animation-delay: 3.8s; }
    .bg-sparkles .sparkle:nth-child(12) { top: 56%; right: 18%; animation-delay: 2.2s; }

    @keyframes floatDown {
      0% {
        transform: translate3d(0, -22vh, 0) scale(0.92);
        opacity: 0;
      }
      8% {
        opacity: 0.95;
      }
      50% {
        opacity: 0.46;
      }
      100% {
        transform: translate3d(26px, 122vh, 0) scale(1.16);
        opacity: 0;
      }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.5);
        opacity: 0.08;
      }
      22% {
        transform: scale(1.1);
        opacity: 0.96;
      }
      46% {
        transform: scale(0.72);
        opacity: 0.26;
      }
    }

    @keyframes sweep {
      0% {
        transform: translateX(-95%) rotate(8deg);
        opacity: 0;
      }
      12% {
        opacity: 0.9;
      }
      42% {
        opacity: 0.95;
      }
      58% {
        opacity: 0.35;
      }
      100% {
        transform: translateX(95%) rotate(8deg);
        opacity: 0;
      }
    }

    @media (max-width: 900px) {
      .seal-wrap {
        width: min(74vw, 620px);
      }

      .title span {
        font-size: clamp(4rem, 11vw, 7rem);
      }
    }

    @media (max-width: 600px) {
      .seal-wrap {
        width: min(86vw, 520px);
      }

      .bokeh span:nth-child(1),
      .bokeh span:nth-child(3),
      .bokeh span:nth-child(5),
      .bokeh span:nth-child(7),
      .bokeh span:nth-child(9),
      .bokeh span:nth-child(11) {
        width: 110px;
        height: 110px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bokeh">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="bg-sparkles">
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
    </div>

    <div class="seal-wrap">
      <div class="seal-shadow"></div>

      <div class="seal">
        <div class="wax-texture"></div>
        <div class="highlight"></div>
        <div class="light-sweep"></div>

        <div class="seal-sparkles">
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
          <span class="sparkle"></span>
        </div>

        <div class="title">
          <span>13th July</span>
        </div>
      </div>
    </div>

    <div class="vignette"></div>
  </div>
</body>
</html>
