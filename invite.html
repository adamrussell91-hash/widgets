<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>13th July</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500;600&family=Luxurious+Script&display=swap" rel="stylesheet">

  <style>
    :root {
      --paper-1: #efe5d1;
      --paper-2: #e3d4ba;
      --paper-3: #d7c5a7;

      --wax-darkest: #220103;
      --wax-dark: #350306;
      --wax-mid: #4d0508;
      --wax-rich: #66080d;
      --wax-light: #891015;

      --gold-1: #f7e8bb;
      --gold-2: #dfc37f;
      --gold-3: #bc9342;
      --gold-4: #8a611d;
      --gold-5: #5b390d;
    }

    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #130c08;
    }

    body {
      position: relative;
      font-family: "Cormorant Garamond", serif;
    }

    .scene {
      position: relative;
      width: 100vw;
      height: 100vh;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      background:
        radial-gradient(circle at 15% 18%, rgba(255, 249, 235, 0.42) 0 120px, transparent 260px),
        radial-gradient(circle at 84% 22%, rgba(255, 245, 225, 0.32) 0 110px, transparent 240px),
        radial-gradient(circle at 23% 80%, rgba(255, 247, 232, 0.22) 0 130px, transparent 260px),
        radial-gradient(circle at 80% 78%, rgba(255, 244, 220, 0.22) 0 120px, transparent 250px),
        linear-gradient(180deg, rgba(255,255,255,0.05), rgba(0,0,0,0.04)),
        linear-gradient(180deg, var(--paper-1), var(--paper-2) 48%, var(--paper-3));
    }

    .scene::before {
      content: "";
      position: absolute;
      inset: 0;
      opacity: 0.12;
      background-image:
        linear-gradient(rgba(118, 92, 53, 0.08) 1px, transparent 1px),
        linear-gradient(90deg, rgba(118, 92, 53, 0.06) 1px, transparent 1px);
      background-size: 34px 34px, 34px 34px;
      mix-blend-mode: multiply;
      pointer-events: none;
    }

    .scene::after {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 50% 50%, rgba(120, 75, 18, 0.10), transparent 58%),
        radial-gradient(circle at 50% 50%, rgba(255,255,255,0.05), transparent 72%);
      pointer-events: none;
    }

    .vignette {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at center, transparent 40%, rgba(40, 24, 12, 0.20) 72%, rgba(18, 10, 6, 0.46) 100%);
      pointer-events: none;
      z-index: 3;
    }

    .bokeh {
      position: absolute;
      inset: 0;
      overflow: hidden;
      pointer-events: none;
      z-index: 1;
      isolation: isolate;
    }

    .bokeh span {
      position: absolute;
      display: block;
      border-radius: 50%;
      opacity: 0;
      filter: blur(18px);
      mix-blend-mode: screen;
      animation-name: floatDown;
      animation-timing-function: linear;
      animation-iteration-count: infinite;
      background:
        radial-gradient(circle,
          rgba(255,255,255,1) 0%,
          rgba(255,249,237,0.98) 12%,
          rgba(255,244,224,0.82) 28%,
          rgba(255,236,204,0.48) 48%,
          rgba(255,230,194,0.18) 68%,
          rgba(255,225,185,0.05) 82%,
          transparent 100%);
      box-shadow:
        0 0 80px rgba(255,255,255,0.50),
        0 0 160px rgba(255,242,214,0.38),
        0 0 260px rgba(255,232,194,0.26),
        0 0 360px rgba(255,225,180,0.14);
    }

    .bokeh span:nth-child(1)  { left: -4%; top: -8%;  width: 180px; height: 180px; animation-duration: 42s; animation-delay: -12s; }
    .bokeh span:nth-child(2)  { left: 4%;  top: 18%;  width: 540px; height: 540px; animation-duration: 68s; animation-delay: -28s; }
    .bokeh span:nth-child(3)  { left: 12%; top: 42%;  width: 250px; height: 250px; animation-duration: 46s; animation-delay: -19s; }
    .bokeh span:nth-child(4)  { left: 17%; top: -16%; width: 760px; height: 760px; animation-duration: 88s; animation-delay: -41s; }
    .bokeh span:nth-child(5)  { left: 24%; top: 8%;   width: 120px; height: 120px; animation-duration: 34s; animation-delay: -8s; }
    .bokeh span:nth-child(6)  { left: 29%; top: 56%;  width: 420px; height: 420px; animation-duration: 60s; animation-delay: -33s; }
    .bokeh span:nth-child(7)  { left: 37%; top: -22%; width: 920px; height: 920px; animation-duration: 104s; animation-delay: -57s; }
    .bokeh span:nth-child(8)  { left: 46%; top: 12%;  width: 210px; height: 210px; animation-duration: 40s; animation-delay: -14s; }
    .bokeh span:nth-child(9)  { left: 53%; top: 38%;  width: 620px; height: 620px; animation-duration: 76s; animation-delay: -35s; }
    .bokeh span:nth-child(10) { left: 61%; top: -10%; width: 150px; height: 150px; animation-duration: 36s; animation-delay: -11s; }
    .bokeh span:nth-child(11) { left: 66%; top: 20%;  width: 860px; height: 860px; animation-duration: 96s; animation-delay: -49s; }
    .bokeh span:nth-child(12) { left: 74%; top: 58%;  width: 280px; height: 280px; animation-duration: 48s; animation-delay: -26s; }
    .bokeh span:nth-child(13) { left: 80%; top: -18%; width: 480px; height: 480px; animation-duration: 64s; animation-delay: -38s; }
    .bokeh span:nth-child(14) { left: 88%; top: 14%;  width: 130px; height: 130px; animation-duration: 34s; animation-delay: -9s; }
    .bokeh span:nth-child(15) { left: 93%; top: 44%;  width: 700px; height: 700px; animation-duration: 82s; animation-delay: -47s; }
    .bokeh span:nth-child(16) { left: 8%;  top: 72%;  width: 340px; height: 340px; animation-duration: 54s; animation-delay: -31s; }
    .bokeh span:nth-child(17) { left: 21%; top: 30%;  width: 1040px; height: 1040px; animation-duration: 116s; animation-delay: -63s; }
    .bokeh span:nth-child(18) { left: 33%; top: 74%;  width: 160px; height: 160px; animation-duration: 38s; animation-delay: -13s; }
    .bokeh span:nth-child(19) { left: 43%; top: 24%;  width: 560px; height: 560px; animation-duration: 70s; animation-delay: -43s; }
    .bokeh span:nth-child(20) { left: 58%; top: 70%;  width: 240px; height: 240px; animation-duration: 44s; animation-delay: -18s; }
    .bokeh span:nth-child(21) { left: 69%; top: 34%;  width: 980px; height: 980px; animation-duration: 110s; animation-delay: -59s; }
    .bokeh span:nth-child(22) { left: 82%; top: 74%;  width: 190px; height: 190px; animation-duration: 39s; animation-delay: -17s; }
    .bokeh span:nth-child(23) { left: -8%; top: 62%;  width: 640px; height: 640px; animation-duration: 74s; animation-delay: -45s; }
    .bokeh span:nth-child(24) { left: 48%; top: -28%; width: 1180px; height: 1180px; animation-duration: 120s; animation-delay: -70s; }
    .bokeh span:nth-child(25) { left: 86%; top: -30%; width: 820px; height: 820px; animation-duration: 94s; animation-delay: -52s; }
    .bokeh span:nth-child(26) { left: 14%; top: -34%; width: 300px; height: 300px; animation-duration: 50s; animation-delay: -24s; }
    .bokeh span:nth-child(27) { left: 31%; top: 6%;   width: 140px; height: 140px; animation-duration: 35s; animation-delay: -10s; }
    .bokeh span:nth-child(28) { left: 57%; top: 4%;   width: 400px; height: 400px; animation-duration: 58s; animation-delay: -30s; }
    .bokeh span:nth-child(29) { left: 72%; top: -6%;  width: 220px; height: 220px; animation-duration: 42s; animation-delay: -16s; }
    .bokeh span:nth-child(30) { left: 90%; top: 28%;  width: 1080px; height: 1080px; animation-duration: 118s; animation-delay: -66s; }

    .seal-wrap {
      position: relative;
      width: min(54vw, 720px);
      aspect-ratio: 1 / 1;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 5;
    }

    .seal-shadow {
      position: absolute;
      width: 94%;
      height: 94%;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(18, 2, 3, 0.52) 0%, rgba(18, 2, 3, 0.24) 46%, transparent 72%);
      transform: translateY(10%);
      filter: blur(24px);
    }

    .seal {
      position: relative;
      width: 100%;
      height: 100%;
      border-radius: 50%;
      overflow: hidden;
      background:
        radial-gradient(circle at 34% 24%, rgba(255, 188, 162, 0.18) 0%, rgba(255, 188, 162, 0.08) 10%, transparent 22%),
        radial-gradient(circle at 64% 72%, rgba(255, 120, 96, 0.08) 0%, transparent 18%),
        radial-gradient(circle at 50% 44%, var(--wax-light) 0%, var(--wax-rich) 26%, var(--wax-mid) 56%, var(--wax-dark) 78%, var(--wax-darkest) 100%);
      box-shadow:
        inset 0 30px 35px rgba(255, 180, 150, 0.10),
        inset 0 -42px 54px rgba(14, 0, 2, 0.60),
        inset 32px 0 40px rgba(125, 6, 10, 0.18),
        inset -30px 0 38px rgba(20, 0, 3, 0.24),
        0 28px 65px rgba(35, 6, 7, 0.34);
    }

    .seal::before {
      content: "";
      position: absolute;
      inset: 3.7%;
      border-radius: 50%;
      border: 3px solid rgba(188, 137, 54, 0.78);
      box-shadow:
        inset 0 0 0 1px rgba(255, 225, 155, 0.12),
        0 0 12px rgba(140, 90, 20, 0.14);
      opacity: 0.98;
      z-index: 2;
    }

    .seal::after {
      content: "";
      position: absolute;
      inset: 16.7%;
      border-radius: 50%;
      border: 2px solid rgba(168, 112, 36, 0.34);
      box-shadow: inset 0 0 14px rgba(255, 195, 120, 0.06);
      z-index: 2;
    }

    .wax-texture {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(circle at 30% 25%, rgba(255,255,255,0.08) 0 1px, transparent 2px),
        radial-gradient(circle at 62% 44%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 55% 70%, rgba(255,255,255,0.06) 0 1px, transparent 2px),
        radial-gradient(circle at 42% 58%, rgba(0,0,0,0.10) 0 1px, transparent 2px);
      background-size: 120px 120px, 160px 160px, 180px 180px, 140px 140px;
      mix-blend-mode: soft-light;
      opacity: 0.60;
      pointer-events: none;
      z-index: 1;
    }

    .highlight {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background:
        radial-gradient(ellipse at 34% 23%, rgba(255, 205, 175, 0.22) 0%, rgba(255, 205, 175, 0.08) 16%, transparent 28%),
        radial-gradient(ellipse at 50% 50%, transparent 58%, rgba(20, 2, 2, 0.12) 85%, rgba(10, 0, 1, 0.20) 100%);
      pointer-events: none;
      z-index: 1;
    }

    .light-sweep {
      position: absolute;
      inset: -12%;
      border-radius: 50%;
      background:
        linear-gradient(
          115deg,
          transparent 0%,
          transparent 38%,
          rgba(255, 235, 195, 0.00) 43%,
          rgba(255, 235, 195, 0.14) 47%,
          rgba(255, 250, 230, 0.24) 50%,
          rgba(255, 225, 180, 0.10) 53%,
          transparent 58%,
          transparent 100%
        );
      mix-blend-mode: screen;
      transform: translateX(-95%) rotate(8deg);
      animation: sweep 8s ease-in-out infinite;
      pointer-events: none;
      z-index: 2;
    }

    .title {
      position: absolute;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 4;
      pointer-events: none;
    }

    .title span {
      font-family: "Luxurious Script", cursive;
      font-size: clamp(4.8rem, 8vw, 8.8rem);
      font-weight: 400;
      line-height: 1;
      color: var(--gold-2);
      background: linear-gradient(180deg, var(--gold-1) 0%, #edd897 16%, var(--gold-2) 40%, var(--gold-3) 70%, var(--gold-4) 88%, var(--gold-5) 100%);
      -webkit-background-clip: text;
      background-clip: text;
      -webkit-text-fill-color: transparent;
      text-shadow:
        0 1px 0 rgba(255, 243, 205, 0.26),
        0 2px 2px rgba(86, 47, 6, 0.24),
        0 6px 14px rgba(48, 16, 4, 0.16);
      transform: translateY(-3%) scale(1.02);
      letter-spacing: 0.02em;
      filter: drop-shadow(0 2px 5px rgba(75, 32, 8, 0.20));
    }

    .seal-sparkles,
    .bg-sparkles {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .sparkle {
      position: absolute;
      opacity: 0;
      animation: twinkle 5.4s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      background: radial-gradient(circle, rgba(255,255,255,0.98) 0%, rgba(255,241,202,0.82) 28%, rgba(255,217,154,0.36) 55%, transparent 78%);
      border-radius: 999px;
      filter: blur(0.2px);
    }

    .sparkle::before {
      width: 2px;
      height: 22px;
    }

    .sparkle::after {
      width: 22px;
      height: 2px;
    }

    .seal-sparkles .sparkle {
      width: 24px;
      height: 24px;
    }

    .seal-sparkles .sparkle:nth-child(1) { top: 16%; left: 23%; animation-delay: 0.2s; }
    .seal-sparkles .sparkle:nth-child(2) { top: 21%; right: 18%; animation-delay: 2.2s; }
    .seal-sparkles .sparkle:nth-child(3) { top: 41%; right: 10%; animation-delay: 3.1s; }
    .seal-sparkles .sparkle:nth-child(4) { bottom: 16%; left: 49%; animation-delay: 1.6s; }
    .seal-sparkles .sparkle:nth-child(5) { bottom: 28%; left: 17%; animation-delay: 4.2s; }
    .seal-sparkles .sparkle:nth-child(6) { top: 58%; left: 11%; animation-delay: 2.9s; }
    .seal-sparkles .sparkle:nth-child(7) { top: 30%; left: 70%; animation-delay: 5.1s; }

    .bg-sparkles .sparkle {
      width: 34px;
      height: 34px;
      animation-duration: 7.5s;
    }

    .bg-sparkles .sparkle:nth-child(1)  { top: 8%;  left: 10%; animation-delay: 0s; }
    .bg-sparkles .sparkle:nth-child(2)  { top: 13%; right: 12%; animation-delay: 1.2s; }
    .bg-sparkles .sparkle:nth-child(3)  { bottom: 18%; left: 10%; animation-delay: 3.1s; }
    .bg-sparkles .sparkle:nth-child(4)  { bottom: 14%; right: 13%; animation-delay: 2.5s; }
    .bg-sparkles .sparkle:nth-child(5)  { top: 45%; left: 5%; animation-delay: 4.4s; }
    .bg-sparkles .sparkle:nth-child(6)  { top: 61%; right: 6%; animation-delay: 5.2s; }
    .bg-sparkles .sparkle:nth-child(7)  { top: 24%; left: 24%; animation-delay: 2.9s; }
    .bg-sparkles .sparkle:nth-child(8)  { top: 28%; right: 24%; animation-delay: 4.8s; }
    .bg-sparkles .sparkle:nth-child(9)  { bottom: 28%; left: 24%; animation-delay: 1.8s; }
    .bg-sparkles .sparkle:nth-child(10) { bottom: 26%; right: 24%; animation-delay: 6.1s; }
    .bg-sparkles .sparkle:nth-child(11) { top: 52%; left: 18%; animation-delay: 3.8s; }
    .bg-sparkles .sparkle:nth-child(12) { top: 56%; right: 18%; animation-delay: 2.2s; }

    @keyframes floatDown {
      0% {
        transform: translate3d(0, 0, 0) scale(0.96);
        opacity: 0.92;
      }
      65% {
        opacity: 0.88;
      }
      100% {
        transform: translate3d(40px, 145vh, 0) scale(1.10);
        opacity: 0;
      }
    }

    @keyframes twinkle {
      0%, 100% {
        transform: scale(0.5);
        opacity: 0.08;
      }
      22% {
        transform: scale(1.1);
        opacity: 0.96;
      }
      46% {
        transform: scale(0.72);
        opacity: 0.26;
      }
    }

    @keyframes sweep {
      0% {
        transform: translateX(-95%) rotate(8deg);
        opacity: 0;
      }
      12% {
        opacity: 0.9;
      }
      42% {
        opacity: 0.95;
      }
      58% {
        opacity: 0.35;
      }
      100% {
        transform: translateX(95%) rotate(8deg);
        opacity: 0;
      }
    }

    @media (max-width: 900px) {
      .seal-wrap {
        width: min(74vw, 620px);
      }

      .title span {
        font-size: clamp(4rem, 11vw, 7rem);
      }

      .bokeh span {
        filter: blur(14px);
      }
    }

    @media (max-width: 600px) {
      .seal-wrap {
        width: min(86vw, 520px);
      }

      .bokeh span {
        box-shadow:
          0 0 50px rgba(255,255,255,0.42),
          0 0 110px rgba(255,242,214,0.30),
          0 0 180px rgba(255,232,194,0.18);
      }

      .bokeh span:nth-child(4),
      .bokeh span:nth-child(7),
      .bokeh span:nth-child(11),
      .bokeh span:nth-child(17),
      .bokeh span:nth-child(21),
      .bokeh span:nth-child(24),
      .bokeh span:nth-child(30) {
        width: 560px;
        height: 560px;
      }
    }
  </style>
</head>
<body>
  <div class="scene">
    <div class="bokeh">
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>

      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
      <span></span>
    </div>

    <div class="bg-sparkles">
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>
      <span class="sparkle"></span>

      <div class="seal-shadow"></div>

      <div class="seal">

</html>
