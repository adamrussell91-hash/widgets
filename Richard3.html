document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

d: var(--blue-dark);\n    font-family: var(--font-text);\n    color: var(--ink);\n    min-height: 100vh;\n    background-image:\n      radial-gradient(ellipse at 20% 0%, #0000cc 0%, transparent 60%),\n      radial-gradient(ellipse at 80% 100%, #000077 0%, transparent 60%);\n  }\n\n  /* ── HEADER ── */\n  .site-header {\n    background: var(--blue);\n    border-bottom: 4px solid var(--gold);\n    position: sticky;\n    top: 0;\n    z-index: 100;\n    box-shadow: 0 4px 24px rgba(0,0,0,0.5);\n  }\n  .header-inner {\n    max-width: 1400px;\n    margin: 0 auto;\n    display: flex;\n    align-items: center;\n    gap: 0;\n    padding: 14px 32px;\n  }\n  .header-titles { flex: 1; }\n  .header-institution {\n    font-family: var(--font-display);\n    font-size: 11px;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold);\n    opacity: 0.85;\n    margin-bottom: 3px;\n  }\n  .header-play-title {\n    font-family: var(--font-display);\n    font-size: 22px;\n    font-weight: 700;\n    color: #ffffff;\n    letter-spacing: 0.08em;\n    line-height: 1;\n  }\n  .header-play-subtitle {\n    font-family: var(--font-text);\n    font-style: italic;\n    font-size: 13px;\n    color: var(--gold-light);\n    margin-top: 3px;\n  }\n\n  /* ── SCENE NAV ── */\n  .scene-nav-bar {\n    background: var(--blue-dark);\n    border-top: 1px solid rgba(255,204,0,0.15);\n  }\n  .scene-nav {\n    max-width: 1400px;\n    margin: 0 auto;\n    padding: 0 32px;\n    display: flex;\n    align-items: center;\n    gap: 0;\n  }\n  .scene-nav-label {\n    font-family: var(--font-display);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--gold);\n    opacity: 0.6;\n    padding-right: 20px;\n    border-right: 1px solid rgba(255,204,0,0.2);\n    margin-right: 16px;\n    white-space: nowrap;\n  }\n  .scene-tab {\n    font-family: var(--font-display);\n    font-size: 12px;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.55);\n    padding: 13px 20px;\n    cursor: pointer;\n    border: none;\n    background: none;\n    border-bottom: 3px solid transparent;\n    transition: color 0.2s, border-color 0.2s;\n    white-space: nowrap;\n  }\n  .scene-tab:hover { color: var(--gold-light); }\n  .scene-tab.active { color: var(--gold); border-bottom-color: var(--gold); }\n\n  /* ── MAIN LAYOUT ── */\n  .page-wrapper {\n    max-width: 1400px;\n    margin: 0 auto;\n    padding: 40px 32px 80px;\n    display: grid;\n    grid-template-columns: 1fr 400px;\n    gap: 40px;\n    align-items: start;\n  }\n\n  /* ── SCRIPT COLUMN ── */\n  .script-column {\n    background: var(--parchment);\n    border: 1px solid rgba(255,204,0,0.3);\n    position: relative;\n    box-shadow: 0 0 0 1px rgba(255,204,0,0.08), 0 8px 40px rgba(0,0,0,0.4);\n  }\n  .script-column::before {\n    content: '';\n    position: absolute;\n    inset: 6px;\n    border: 1px solid rgba(200,160,0,0.2);\n    pointer-events: none;\n    z-index: 1;\n  }\n\n  /* ── SCENE SECTIONS ── */\n  .scene-section { display: none; padding: 48px 56px 56px; }\n  .scene-section.active { display: block; }\n\n  /* ── SCENE HEADER ── */\n  .scene-header {\n    text-align: center;\n    margin-bottom: 40px;\n    padding-bottom: 32px;\n    border-bottom: 2px solid var(--gold-dark);\n  }\n  .scene-header::after {\n    content: '✦';\n    display: block;\n    color: var(--gold-dark);\n    font-size: 18px;\n    margin-top: 16px;\n    letter-spacing: 12px;\n  }\n  .scene-act-label {\n    font-family: var(--font-display);\n    font-size: 11px;\n    letter-spacing: 0.28em;\n    text-transform: uppercase;\n    color: var(--blue);\n    opacity: 0.65;\n    margin-bottom: 8px;\n  }\n  .scene-title {\n    font-family: var(--font-display);\n    font-size: 26px;\n    font-weight: 700;\n    color: var(--blue);\n    letter-spacing: 0.06em;\n    line-height: 1.2;\n    margin-bottom: 8px;\n  }\n  .scene-location {\n    font-family: var(--font-text);\n    font-style: italic;\n    font-size: 16px;\n    color: #555;\n  }\n\n  /* ── STAGE DIRECTIONS ── */\n  .stage-direction {\n    font-style: italic;\n    font-size: 17px;\n    color: #664400;\n    text-align: center;\n    margin: 20px 0 16px;\n    opacity: 0.82;\n  }\n\n  /* ── SPEECH ── */\n  .speech { margin-bottom: 24px; }\n  .speaker {\n    font-family: var(--font-display);\n    font-size: 13px;\n    font-weight: 700;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: var(--blue);\n    margin-bottom: 6px;\n    display: block;\n  }\n  .lines { font-size: 19px; line-height: 1.85; color: var(--ink); text-wrap: pretty; }\n  .lines .line { display: block; }\n\n  /* ── ANNOTATED PASSAGE ── */\n  .ann {\n    cursor: pointer;\n    border-bottom: 2px solid var(--gold-dark);\n    background: linear-gradient(to bottom, transparent 60%, rgba(255,204,0,0.18) 60%);\n    padding-bottom: 1px;\n    transition: background 0.15s, border-color 0.15s;\n    position: relative;\n  }\n  .ann:hover {\n    background: linear-gradient(to bottom, transparent 40%, rgba(255,204,0,0.32) 40%);\n    border-bottom-color: var(--gold);\n  }\n  .ann.active-ann {\n    background: linear-gradient(to bottom, transparent 30%, rgba(255,204,0,0.45) 30%);\n    border-bottom-color: var(--gold);\n  }\n  .ann-marker {\n    font-family: var(--font-display);\n    font-size: 10px;\n    font-weight: 700;\n    color: var(--blue);\n    vertical-align: super;\n    margin-left: 1px;\n    background: var(--gold);\n    padding: 0 3px 1px;\n    border-radius: 2px;\n    cursor: pointer;\n    transition: background 0.15s;\n    position: relative;\n    top: -2px;\n    line-height: 1;\n  }\n  .ann:hover .ann-marker,\n  .ann.active-ann .ann-marker { background: var(--gold-dark); color: white; }\n\n  /* ── SCENE DIVIDER ── */\n  .scene-divider {\n    text-align: center;\n    margin: 36px 0 28px;\n    color: var(--gold-dark);\n    font-size: 13px;\n    letter-spacing: 10px;\n    opacity: 0.5;\n  }\n\n  /* ── ANNOTATION PANEL ── */\n  .annotation-panel {\n    position: sticky;\n    top: 120px;\n    background: var(--blue);\n    border: 1px solid var(--gold-dark);\n    box-shadow: 0 8px 40px rgba(0,0,0,0.5);\n    min-height: 300px;\n    max-height: calc(100vh - 140px);\n    overflow-y: auto;\n    scrollbar-width: thin;\n    scrollbar-color: var(--gold-dark) rgba(0,0,0,0.3);\n  }\n  .annotation-panel::-webkit-scrollbar { width: 6px; }\n  .annotation-panel::-webkit-scrollbar-track { background: rgba(0,0,0,0.3); }\n  .annotation-panel::-webkit-scrollbar-thumb { background: var(--gold-dark); border-radius: 3px; }\n  .annotation-panel::before {\n    content: '';\n    position: absolute;\n    inset: 5px;\n    border: 1px solid rgba(255,204,0,0.18);\n    pointer-events: none;\n  }\n\n  /* Empty state */\n  .panel-empty {\n    display: flex;\n    flex-direction: column;\n    align-items: center;\n    justify-content: center;\n    padding: 60px 32px;\n    text-align: center;\n    gap: 16px;\n  }\n  .panel-empty-icon { font-size: 32px; color: var(--gold); opacity: 0.4; font-family: var(--font-display); }\n  .panel-empty-text {\n    font-family: var(--font-text);\n    font-style: italic;\n    font-size: 16px;\n    color: rgba(255,255,255,0.4);\n    line-height: 1.6;\n  }\n\n  /* Panel content */\n  .panel-content { display: none; }\n  .panel-content.visible { display: block; }\n\n  /* Panel quote strip */\n  .panel-quote-strip {\n    background: var(--gold);\n    padding: 16px 24px 14px;\n    border-bottom: 2px solid var(--gold-dark);\n  }\n  .panel-quote {\n    font-family: var(--font-text);\n    font-style: italic;\n    font-size: 15px;\n    color: var(--blue-dark);\n    line-height: 1.5;\n    font-weight: 700;\n  }\n\n  /* Technique block */\n  .panel-technique-block {\n    background: rgba(0,0,0,0.25);\n    border-bottom: 1px solid rgba(255,204,0,0.15);\n    padding: 16px 24px;\n  }\n  .panel-block-label {\n    font-family: var(--font-display);\n    font-size: 9px;\n    font-weight: 700;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold);\n    opacity: 0.7;\n    margin-bottom: 10px;\n  }\n  .technique-rows { display: flex; flex-direction: column; gap: 10px; }\n  .technique-row {}\n  .technique-name {\n    font-family: var(--font-display);\n    font-size: 11px;\n    font-weight: 700;\n    letter-spacing: 0.1em;\n    text-transform: uppercase;\n    color: var(--gold);\n    display: inline;\n  }\n  .technique-sep {\n    color: rgba(255,204,0,0.4);\n    margin: 0 5px;\n    font-family: var(--font-display);\n    font-size: 11px;\n  }\n  .technique-effect {\n    font-family: var(--font-text);\n    font-size: 15px;\n    color: rgba(255,255,255,0.82);\n    display: inline;\n    line-height: 1.55;\n  }\n\n  /* Context block */\n  .panel-context-block {\n    padding: 18px 24px 6px;\n    border-bottom: 1px solid rgba(255,204,0,0.1);\n  }\n  .context-note {\n    font-family: var(--font-text);\n    font-size: 15.5px;\n    line-height: 1.78;\n    color: rgba(255,255,255,0.78);\n    margin-bottom: 14px;\n    text-wrap: pretty;\n  }\n  .context-note b, .context-note strong {\n    color: var(--gold-light);\n    font-style: italic;\n    font-weight: normal;\n  }\n\n  /* Close button */\n  .panel-close {\n    display: block;\n    margin: 14px 24px 20px;\n    font-family: var(--font-display);\n    font-size: 10px;\n    letter-spacing: 0.18em;\n    text-transform: uppercase;\n    color: rgba(255,204,0,0.5);\n    cursor: pointer;\n    background: none;\n    border: 1px solid rgba(255,204,0,0.2);\n    padding: 8px 16px;\n    transition: color 0.15s, border-color 0.15s;\n    text-align: center;\n    width: calc(100% - 48px);\n  }\n  .panel-close:hover { color: var(--gold); border-color: rgba(255,204,0,0.5); }\n\n  /* ── LEGEND ── */\n  .legend {\n    margin-top: 24px;\n    background: rgba(0,0,0,0.2);\n    border: 1px solid rgba(255,204,0,0.15);\n    padding: 18px 24px;\n  }\n  .legend-title {\n    font-family: var(--font-display);\n    font-size: 9px;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    color: var(--gold);\n    opacity: 0.6;\n    margin-bottom: 12px;\n  }\n  .legend-item {\n    display: flex;\n    align-items: center;\n    gap: 10px;\n    margin-bottom: 8px;\n    font-family: var(--font-text);\n    font-size: 14px;\n    color: rgba(255,255,255,0.6);\n  }\n  .legend-mark {\n    display: inline-block;\n    width: 28px;\n    height: 16px;\n    background: linear-gradient(to bottom, transparent 50%, rgba(255,204,0,0.35) 50%);\n    border-bottom: 2px solid var(--gold-dark);\n    flex-shrink: 0;\n  }\n\n  /* ── RESPONSIVE ── */\n  @media (max-width: 900px) {\n    .page-wrapper { grid-template-columns: 1fr; padding: 20px 16px 60px; }\n    .annotation-panel { position: static; order: -1; }\n    .scene-section { padding: 32px 24px 40px; }\n    .lines { font-size: 17px; }\n  }\n\n  /* ── ACT-GROUP NAV ── */\n  .scene-nav { flex-wrap: wrap; gap: 0; padding-bottom: 0; }\n  .act-group { display: flex; flex-direction: column; border-right: 1px solid rgba(255,204,0,0.12); }\n  .act-group:last-child { border-right: none; }\n  .act-group-btn {\n    font-family: var(--font-display);\n    font-size: 10px;\n    letter-spacing: 0.16em;\n    text-transform: uppercase;\n    color: rgba(255,255,255,0.45);\n    background: none;\n    border: none;\n    padding: 8px 20px 6px;\n    cursor: pointer;\n    text-align: left;\n    border-bottom: 2px solid transparent;\n    transition: color 0.2s;\n    display: flex;\n    align-items: center;\n    gap: 6px;\n    white-space: nowrap;\n  }\n  .act-group-btn:hover { color: var(--gold-light); }\n  .act-group-btn.active { color: var(--gold); border-bottom-color: var(--gold); }\n  .act-caret { font-size: 10px; transition: transform 0.2s; }\n  .act-group-items { display: flex; flex-wrap: wrap; }\n  .scene-tab { border-bottom: 2px solid transparent; }\n\n<\u002Fstyle>\n\n<\u002Fhead>\n<body>\n\n<header class=\"site-header\">\n  <div class=\"header-inner\">\n    <div class=\"header-titles\">\n      <div class=\"header-institution\">St Aloysius' College &nbsp;·&nbsp; English Advanced<\u002Fdiv>\n      <div class=\"header-play-title\">Richard III<\u002Fdiv>\n      <div class=\"header-play-subtitle\">Annotated Text — Acts I, III &amp; V &nbsp;·&nbsp; Cambridge School Shakespeare<\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Fdiv>\n  <div class=\"scene-nav-bar\">\n    <nav class=\"scene-nav\" id=\"sceneNav\">\n      <span class=\"scene-nav-label\">Jump to<\u002Fspan>\n      <div class=\"act-group\">\n        <button class=\"act-group-btn active\" id=\"act1btn\" onclick=\"toggleActGroup('act1', this)\">Act I <span class=\"act-caret\">▾<\u002Fspan><\u002Fbutton>\n        <div class=\"act-group-items\" id=\"act1\" style=\"display:flex\">\n          <button class=\"scene-tab active\" onclick=\"switchScene('s1', this)\">Scene 1 — Soliloquy<\u002Fbutton>\n          <button class=\"scene-tab\" onclick=\"switchScene('s2', this)\">Scene 2 — Wooing of Anne<\u002Fbutton>\n          <button class=\"scene-tab\" onclick=\"switchScene('s3', this)\">Scene 3 — Margaret's Curses<\u002Fbutton>\n          <button class=\"scene-tab\" onclick=\"switchScene('s4', this)\">Scene 4 — Murder of Clarence<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"act-group\">\n        <button class=\"act-group-btn\" id=\"act3btn\" onclick=\"toggleActGroup('act3', this)\">Act III <span class=\"act-caret\">▾<\u002Fspan><\u002Fbutton>\n        <div class=\"act-group-items\" id=\"act3\" style=\"display:none\">\n          <button class=\"scene-tab\" onclick=\"switchScene('s37', this)\">Scene 7 — Richard Accepts the Crown<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"act-group\">\n        <button class=\"act-group-btn\" id=\"act5btn\" onclick=\"toggleActGroup('act5', this)\">Act V <span class=\"act-caret\">▾<\u002Fspan><\u002Fbutton>\n        <div class=\"act-group-items\" id=\"act5\" style=\"display:none\">\n          <button class=\"scene-tab\" onclick=\"switchScene('s53', this)\">Scene 3 — Bosworth Eve &amp; Ghosts<\u002Fbutton>\n          <button class=\"scene-tab\" onclick=\"switchScene('s54', this)\">Scene 4 — Bosworth &amp; Death<\u002Fbutton>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fnav>\n  <\u002Fdiv>\n<\u002Fheader>\n\n<main class=\"page-wrapper\">\n\n  <!-- SCRIPT COLUMN -->\n  <article class=\"script-column\">\n\n    <!-- ═══════════════════════ ACT I SCENE 1 ═══════════════════════ -->\n    <section class=\"scene-section active\" id=\"s1\" data-screen-label=\"Act I Scene 1\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act I · Scene 1<\u002Fdiv>\n        <h1 class=\"scene-title\">Richard's Opening Soliloquy &amp; the Deception of Clarence<\u002Fh1>\n        <div class=\"scene-location\">London. A street.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Enter RICHARD, DUKE OF GLOUCESTER, alone.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"1\">Now is the winter of our discontent<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"1\">Made glorious summer by this sun of York;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"1\">And all the clouds that lour'd upon our house<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"1\">In the deep bosom of the ocean buried.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"2\">Now are our brows bound with victorious wreaths;<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"2\">Our bruisèd arms hung up for monuments;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"2\">Our stern alarums changed to merry meetings,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"2\">Our dreadful marches to delightful measures.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"3\">Grim-visaged war hath smoothed his wrinkled front;<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"3\">And now, instead of mounting barbèd steeds<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"3\">To fright the souls of fearful adversaries,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"3\">He capers nimbly in a lady's chamber<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"3\">To the lascivious pleasing of a lute.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">But I, that am not shap'd for sportive tricks,<span class=\"ann-marker\">4<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">Nor made to court an amorous looking-glass;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">I, that am rudely stamp'd, and want love's majesty<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">To strut before a wanton ambling nymph;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">I, that am curtail'd of this fair proportion,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">Cheated of feature by dissembling Nature,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">Deform'd, unfinish'd, sent before my time<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">Into this breathing world, scarce half made up,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">And that so lamely and unfashionable<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"4\">That dogs bark at me as I halt by them —<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">Why, I, in this weak piping time of peace,<span class=\"ann-marker\">5<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">Have no delight to pass away the time,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">Unless to spy my shadow in the sun<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">And descant on mine own deformity.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">And therefore, since I cannot prove a lover,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">To entertain these fair well-spoken days,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">I am determinèd to prove a villain<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"5\">And hate the idle pleasures of these days.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">Plots have I laid, inductions dangerous,<span class=\"ann-marker\">6<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">By drunken prophecies, libels, and dreams,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">To set my brother Clarence and the King<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">In deadly hate the one against the other;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">And if King Edward be as true and just<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">As I am subtle, false, and treacherous,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">This day should Clarence closely be mew'd up<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">About a prophecy, which says that G<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"6\">Of Edward's heirs the murderer shall be.<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Dive, thoughts, down to my soul, here Clarence comes.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter CLARENCE, guarded, and BRAKENBURY.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"7\">Brother, good day. What means this armèd guard<span class=\"ann-marker\">7<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"7\">That waits upon your Grace?<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">His Majesty,<\u002Fspan>\n          <span class=\"line\">Tend'ring my person's safety, hath appointed<\u002Fspan>\n          <span class=\"line\">This conduct to convey me to the Tower.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Upon what cause?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Because my name is George.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Alack, my lord, that fault is none of yours;<\u002Fspan>\n          <span class=\"line\">He should, for that, commit your godfathers.<\u002Fspan>\n          <span class=\"line\">O, belike his Majesty hath some intent<\u002Fspan>\n          <span class=\"line\">That you should be new-christen'd in the Tower.<\u002Fspan>\n          <span class=\"line\">But what's the matter, Clarence? May I know?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Yea, Richard, when I know; for I protest<\u002Fspan>\n          <span class=\"line\">As yet I do not. But, as I can learn,<\u002Fspan>\n          <span class=\"line\">He hearkens after prophecies and dreams;<\u002Fspan>\n          <span class=\"line\">And from the cross-row plucks the letter G,<\u002Fspan>\n          <span class=\"line\">And says a wizard told him that by G<\u002Fspan>\n          <span class=\"line\">His issue disinherited should be;<\u002Fspan>\n          <span class=\"line\">And, for my name of George begins with G,<\u002Fspan>\n          <span class=\"line\">It follows in his thought that I am he.<\u002Fspan>\n          <span class=\"line\">These, as I learn, and such like toys as these,<\u002Fspan>\n          <span class=\"line\">Hath moved his Highness to commit me now.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">Why, this it is when men are ruled by women.<span class=\"ann-marker\">8<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">'Tis not the King that sends you to the Tower;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">My Lady Grey his wife, Clarence, 'tis she<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">That tempers him to this extremity.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">Was it not she, and that good man of worship,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">Antony Woodville, her brother there,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">That made him send Lord Hastings to the Tower,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">From whence this present day he is deliver'd?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"8\">We are not safe, Clarence, we are not safe.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">By heaven, I think there is no man is secure<\u002Fspan>\n          <span class=\"line\">But the Queen's kindred, and night-walking heralds<\u002Fspan>\n          <span class=\"line\">That trudge betwixt the King and Mistress Shore.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Humbly complaining to her deity<\u002Fspan>\n          <span class=\"line\">Got my Lord Chamberlain his liberty.<\u002Fspan>\n          <span class=\"line\">I'll tell you what, I think it is our way,<\u002Fspan>\n          <span class=\"line\">If we will keep in favour with the King,<\u002Fspan>\n          <span class=\"line\">To be her men and wear her livery.<\u002Fspan>\n          <span class=\"line\">The jealous o'erworn widow and herself,<\u002Fspan>\n          <span class=\"line\">Since that our brother dubb'd them gentlefolks,<\u002Fspan>\n          <span class=\"line\">Are mighty gossips in our monarchy.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exeunt Clarence with Brakenbury and guard.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"10\">Go, tread the path that thou shalt ne'er return.<span class=\"ann-marker\">9<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"10\">Simple, plain Clarence! I do love thee so,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"10\">That I will shortly send thy soul to heaven,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"10\">If heaven will take the present at our hands.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter LORD HASTINGS.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Hastings<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Good time of day unto my gracious lord!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">As much unto my good Lord Chamberlain!<\u002Fspan>\n          <span class=\"line\">Well are you welcome to the open air.<\u002Fspan>\n          <span class=\"line\">How hath your lordship brook'd imprisonment?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Hastings<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">With patience, noble lord, as prisoners must;<\u002Fspan>\n          <span class=\"line\">But I shall live, my lord, to give them thanks<\u002Fspan>\n          <span class=\"line\">That were the cause of my imprisonment.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"11\">No doubt, no doubt; and so shall Clarence too,<span class=\"ann-marker\">10<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"11\">For they that were your enemies are his,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"11\">And have prevail'd as much on him as you.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Hastings<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">More pity that the eagle should be mew'd,<\u002Fspan>\n          <span class=\"line\">While kites and buzzards prey at liberty.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">What news abroad?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Hastings<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">No news so bad abroad as this at home:<\u002Fspan>\n          <span class=\"line\">The King is sickly, weak, and melancholy,<\u002Fspan>\n          <span class=\"line\">And his physicians fear him mightily.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"12\">Now, by Saint Paul, this news is bad indeed.<span class=\"ann-marker\">11<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"12\">O, he hath kept an evil diet long,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"12\">And overmuch consum'd his royal person:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"12\">'Tis very grievous to be thought upon.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"12\">What, is he in his bed?<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Hastings<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">He is.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Go you before, and I will follow you.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exit Hastings.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">He cannot live, I hope, and must not die<span class=\"ann-marker\">12<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">Till George be pack'd with post-horse up to heaven.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">I'll in, to urge his hatred more to Clarence,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">With lies well steel'd with weighty arguments;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">And, if I fail not in my deep intent,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">Clarence hath not another day to live:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">Which done, God take King Edward to his mercy,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">And leave the world for me to bustle in!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">For then I'll marry Warwick's youngest daughter.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">What though I kill'd her husband and her father?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">The readiest way to make the wench amends<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">Is to become her husband and her father:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">The which will I; not all so much for love<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">As for another secret close intent<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"13\">By marrying her which I must reach unto.<\u002Fspan><\u002Fspan>\n          <span class=\"line\">But yet I run before my horse to market:<\u002Fspan>\n          <span class=\"line\">Clarence still breathes; Edward still lives and reigns;<\u002Fspan>\n          <span class=\"line\">When they are gone, then must I count my gains.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection><!-- /s1 -->\n\n    <!-- ═══════════════════════ ACT I SCENE 2 ═══════════════════════ -->\n    <section class=\"scene-section\" id=\"s2\" data-screen-label=\"Act I Scene 2\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act I · Scene 2<\u002Fdiv>\n        <h1 class=\"scene-title\">The Wooing of Anne over Henry's Corpse<\u002Fh1>\n        <div class=\"scene-location\">London. Another street.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Enter the corpse of KING HENRY THE SIXTH, Gentlemen with halberds to guard it; LADY ANNE being the mourner.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">Set down, set down your honourable load,<span class=\"ann-marker\">13<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">If honour may be shrouded in a hearse,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">Whilst I awhile obsequiously lament<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">The untimely fall of virtuous Lancaster.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">Poor key-cold figure of a holy king!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">Pale ashes of the house of Lancaster!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"14\">Thou bloodless remnant of that royal blood!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Be it lawful that I invocate thy ghost,<\u002Fspan>\n          <span class=\"line\">To hear the lamentations of poor Anne,<\u002Fspan>\n          <span class=\"line\">Wife to thy Edward, to thy slaughter'd son,<\u002Fspan>\n          <span class=\"line\">Stabb'd by the selfsame hand that made these wounds!<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Lo, in these windows that let forth thy life,<span class=\"ann-marker\">14<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">I pour the helpless balm of my poor eyes.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Cursed be the hand that made these fatal holes!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Cursed be the heart that had the heart to do it!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Cursed the blood that let this blood from hence!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">More direful hap betide that hated wretch,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">That makes us wretched by the death of thee,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Than I can wish to adders, spiders, toads,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Or any creeping venom'd thing that lives!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">If ever he have child, abortive be it,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Prodigious, and untimely brought to light,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">Whose ugly and unnatural aspect<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">May fright the hopeful mother at the view;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"15\">And that be heir to his unhappiness!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">If ever he have wife, let her be made<\u002Fspan>\n          <span class=\"line\">More miserable by the death of him<\u002Fspan>\n          <span class=\"line\">Than I am made by my young lord and thee!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">The Gentlemen set down the coffin. Enter RICHARD, DUKE OF GLOUCESTER.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"16\">Stay, you that bear the corse, and set it down.<span class=\"ann-marker\">15<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">What black magician conjures up this fiend,<\u002Fspan>\n          <span class=\"line\">To stop devoted charitable deeds?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Villains, set down the corse; or, by Saint Paul,<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"16\">I'll make a corse of him that disobeys.<span class=\"ann-marker\">↑<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Gentleman<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">My lord, stand back, and let the coffin pass.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Unmanner'd dog! stand thou, when I command:<\u002Fspan>\n          <span class=\"line\">Advance thy halberd higher than my breast,<\u002Fspan>\n          <span class=\"line\">Or, by Saint Paul, I'll strike thee to my foot,<\u002Fspan>\n          <span class=\"line\">And spurn upon thee, beggar, for thy boldness.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">What, do you tremble? Are you all afraid?<span class=\"ann-marker\">16<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">Alas, I blame you not; for you are mortal,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">And mortal eyes cannot endure the devil.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">Avaunt, thou dreadful minister of hell!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">Thou hadst but power over his mortal body,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"17\">His soul thou canst not have; therefore be gone.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Sweet saint, for charity, be not so curst.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">Foul devil, for God's sake, hence, and trouble us not;<span class=\"ann-marker\">17<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">For thou hast made the happy earth thy hell,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">Fill'd it with cursing cries and deep exclaims.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">If thou delight to view thy heinous deeds,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">Behold this pattern of thy butcheries.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">O, gentlemen, see, see! Dead Henry's wounds<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">Open their congeal'd mouths and bleed afresh!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">Blush, blush, thou lump of foul deformity;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">For 'tis thy presence that exhales this blood<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"18\">From cold and empty veins, where no blood dwells;<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Thy deed, inhuman and unnatural,<\u002Fspan>\n          <span class=\"line\">Provokes this deluge most unnatural.<\u002Fspan>\n          <span class=\"line\">O God, which this blood mad'st, revenge his death!<\u002Fspan>\n          <span class=\"line\">O earth, which this blood drink'st, revenge his death!<\u002Fspan>\n          <span class=\"line\">Either heaven with lightning strike the murderer dead,<\u002Fspan>\n          <span class=\"line\">Or earth, gape open wide and eat him quick,<\u002Fspan>\n          <span class=\"line\">As thou dost swallow up this good king's blood,<\u002Fspan>\n          <span class=\"line\">Which his hell-govern'd arm hath butchered!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Lady, you know no rules of charity,<\u002Fspan>\n          <span class=\"line\">Which renders good for bad, blessings for curses.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Villain, thou know'st no law of God nor man:<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">No beast so fierce but knows some touch of pity.<span class=\"ann-marker\">18<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">But I know none, and therefore am no beast.<span class=\"ann-marker\">↑<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">O wonderful, when devils tell the truth!<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">More wonderful, when angels are so angry.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">Vouchsafe, divine perfection of a woman,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">Of these supposed evils, to give me leave,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"19\">By circumstance, but to acquit myself.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">Vouchsafe, defused infection of a man,<span class=\"ann-marker\">19<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">For these known evils, but to give me leave,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">By circumstance, to curse thy cursed self.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">Fairer than tongue can name thee, let me have<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">Some patient leisure to excuse myself.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">Fouler than heart can think thee, thou canst make<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"20\">No excuse current, but to hang thyself.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">By such despair, I should accuse myself.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">And, by despairing, shouldst thou stand excused;<\u002Fspan>\n          <span class=\"line\">For doing worthy vengeance on thyself,<\u002Fspan>\n          <span class=\"line\">Which didst unworthy slaughter upon others.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I did not kill your husband.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why, then he is alive.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Nay, he is dead; and slain by Edward's hand.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"21\">In thy foul throat thou liest: Queen Margaret saw<span class=\"ann-marker\">20<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"21\">Thy murd'rous falchion smoking in his blood;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"21\">The which thou once didst bend against her breast,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"21\">But that thy brothers beat aside the point.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I was provoked by her sland'rous tongue,<\u002Fspan>\n          <span class=\"line\">Which laid their guilt upon my guiltless shoulders.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Thou wast provoked by thy bloody mind,<\u002Fspan>\n          <span class=\"line\">Which never dreamt on aught but butcheries.<\u002Fspan>\n          <span class=\"line\">Didst thou not kill this king?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I grant ye.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Dost grant me, hedgehog? Then God grant me too<\u002Fspan>\n          <span class=\"line\">Thou mayst be damned for that wicked deed!<\u002Fspan>\n          <span class=\"line\">O, he was gentle, mild, and virtuous!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">The fitter for the King of Heaven, that hath him.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">He is in heaven, where thou shalt never come.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Let him thank me, that holp to send him thither;<\u002Fspan>\n          <span class=\"line\">For he was fitter for that place than earth.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">And thou unfit for any place but hell.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"22\">Yes, one place else, if you will hear me name it.<span class=\"ann-marker\">21<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Some dungeon.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"22\">Your bed-chamber.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Ill rest betide the chamber where thou liest!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">So will it, madam, till I lie with you.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I hope so.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"23\">Your beauty was the cause of that effect —<span class=\"ann-marker\">22<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"23\">Your beauty, that did haunt me in my sleep<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"23\">To undertake the death of all the world,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"23\">So I might live one hour in your sweet bosom.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">If I thought that, I tell thee, homicide,<\u002Fspan>\n          <span class=\"line\">These nails should rend that beauty from my cheeks.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">These eyes could not endure that beauty's wreck;<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"24\">You should not blemish it, if I stood by.<span class=\"ann-marker\">23<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"24\">As all the world is cheered by the sun,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"24\">So I by that; it is my day, my life.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Anne spits at him.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why dost thou spit at me?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Would it were mortal poison for thy sake!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Never came poison from so sweet a place.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Never hung poison on a fouler toad.<\u002Fspan>\n          <span class=\"line\">Out of my sight! Thou dost infect mine eyes.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Thine eyes, sweet lady, have infected mine.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Would they were basilisks, to strike thee dead!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I would they were, that I might die at once;<\u002Fspan>\n          <span class=\"line\">For now they kill me with a living death.<\u002Fspan>\n          <span class=\"line\">Those eyes of thine from mine have drawn salt tears,<\u002Fspan>\n          <span class=\"line\">Sham'd their aspects with store of childish drops.<\u002Fspan>\n          <span class=\"line\">These eyes, which never shed remorseful tear —<\u002Fspan>\n          <span class=\"line\">No, when my father York and Edward wept,<\u002Fspan>\n          <span class=\"line\">To hear the piteous moan that Rutland made<\u002Fspan>\n          <span class=\"line\">When black-fac'd Clifford shook his sword at him;<\u002Fspan>\n          <span class=\"line\">Nor when thy warlike father, like a child,<\u002Fspan>\n          <span class=\"line\">Told the sad story of my father's death,<\u002Fspan>\n          <span class=\"line\">And twenty times made pause to sob and weep,<\u002Fspan>\n          <span class=\"line\">That all the standers-by had wet their cheeks<\u002Fspan>\n          <span class=\"line\">Like trees bedash'd with rain —<\u002Fspan>\n          <span class=\"line\">My manly eyes did scorn an humble tear;<\u002Fspan>\n          <span class=\"line\">And what these sorrows could not thence exhale,<\u002Fspan>\n          <span class=\"line\">Thy beauty hath, and made them blind with weeping.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Teach not thy lip such scorn, for it were made<\u002Fspan>\n          <span class=\"line\">For kissing, lady, not for such contempt.<\u002Fspan>\n          <span class=\"line\">If thy revengeful heart cannot forgive,<\u002Fspan>\n          <span class=\"line\">Lo, here I lend thee this sharp-pointed sword,<\u002Fspan>\n          <span class=\"line\">Which if thou please to hide in this true breast,<\u002Fspan>\n          <span class=\"line\">And let the soul forth that adoreth thee,<\u002Fspan>\n          <span class=\"line\">I lay it naked to the deadly stroke,<\u002Fspan>\n          <span class=\"line\">And humbly beg the death upon my knee.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">He kneels and lays his breast open; she offers at it with his sword.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">Nay, do not pause; for I did kill King Henry —<span class=\"ann-marker\">24<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">But 'twas thy beauty that provoked me.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">Nay, now dispatch; 'twas I that stabb'd young Edward —<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">But 'twas thy heavenly face that set me on.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">Take up the sword again, or take up me.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">Arise, dissembler; though I wish thy death,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"25\">I will not be thy executioner.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Then bid me kill myself, and I will do it.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I have already.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">That was in thy rage.<\u002Fspan>\n          <span class=\"line\">Speak it again, and even with the word<\u002Fspan>\n          <span class=\"line\">That hand which for thy love did kill thy love<\u002Fspan>\n          <span class=\"line\">Shall for thy love kill a far truer love:<\u002Fspan>\n          <span class=\"line\">To both their deaths shalt thou be accessary.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I would I knew thy heart.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">'Tis figur'd in my tongue.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I fear me both are false.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Then never was man true.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Well, well, put up your sword.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Say, then, my peace is made.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">That shalt thou know hereafter.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">But shall I live in hope?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">All men, I hope, live so.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"26\">Vouchsafe to wear this ring.<span class=\"ann-marker\">25<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Lady Anne<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"26\">To take is not to give.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exeunt all except RICHARD.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Was ever woman in this humour woo'd?<span class=\"ann-marker\">26<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Was ever woman in this humour won?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">I'll have her; but I will not keep her long.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">What! I, that kill'd her husband and his father,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">To take her in her heart's extremest hate,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">With curses in her mouth, tears in her eyes,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">The bleeding witness of my hatred by;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Having God, her conscience, and these bars against me,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">And I no friends to back my suit withal,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">But the plain devil and dissembling looks,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">And yet to win her, all the world to nothing!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Hath she forgot already that brave prince,<\u002Fspan>\n          <span class=\"line\">Edward, her lord, whom I, some three months since,<\u002Fspan>\n          <span class=\"line\">Stabb'd in my angry mood at Tewkesbury?<\u002Fspan>\n          <span class=\"line\">A sweeter and a lovelier gentleman,<\u002Fspan>\n          <span class=\"line\">Framed in the prodigality of nature,<\u002Fspan>\n          <span class=\"line\">Young, valiant, wise, and, no doubt, right royal,<\u002Fspan>\n          <span class=\"line\">The spacious world cannot again afford;<\u002Fspan>\n          <span class=\"line\">And will she yet debase her eyes on me,<\u002Fspan>\n          <span class=\"line\">That cropp'd the golden prime of this sweet prince,<\u002Fspan>\n          <span class=\"line\">And made her widow to a woeful bed?<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">On me, whose all not equals Edward's moi'ty?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">On me, that halts and am misshapen thus?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">My dukedom to a beggarly denier,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">I do mistake my person all this while!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Upon my life, she finds, although I cannot,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Myself to be a marvellous proper man.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">I'll be at charges for a looking-glass,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">And entertain a score or two of tailors,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">To study fashions to adorn my body:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Since I am crept in favour with myself,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">I will maintain it with some little cost.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">But first I'll turn yon fellow in his grave,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">And then return lamenting to my love.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">Shine out, fair sun, till I have bought a glass,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"27\">That I may see my shadow as I pass.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exit.<\u002Fp>\n    <\u002Fsection><!-- /s2 -->\n\n\n    <!-- ═══ ACT I SCENE 3 ═══ -->\n    <section class=\"scene-section\" id=\"s3\" data-screen-label=\"Act I Scene 3\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act I · Scene 3<\u002Fdiv>\n        <h1 class=\"scene-title\">Richard vs the Court — Margaret's Curses<\u002Fh1>\n        <div class=\"scene-location\">London. The Palace.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Enter QUEEN ELIZABETH, LORD RIVERS, and LORD GREY.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Rivers<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Have patience, madam; there's no doubt his Majesty<\u002Fspan>\n          <span class=\"line\">Will soon recover his accustomed health.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Grey<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">In that you brook it ill, it makes him worse:<\u002Fspan>\n          <span class=\"line\">Therefore, for God's sake, entertain good comfort,<\u002Fspan>\n          <span class=\"line\">And cheer his Grace with quick and merry words.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">If he were dead, what would betide of me?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Rivers<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">No other harm but loss of such a lord.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">The loss of such a lord includes all harm.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Grey<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">The heavens have bless'd you with a goodly son,<\u002Fspan>\n          <span class=\"line\">To be your comforter when he is gone.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Ah, he is young; and his minority<\u002Fspan>\n          <span class=\"line\">Is put unto the trust of Richard Gloucester,<\u002Fspan>\n          <span class=\"line\">A man that loves not me, nor none of you.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_eliz\">I fear our happiness is at the height.<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter RICHARD and LORD HASTINGS.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\"
