 data-ann=\"s3_1\">They do me wrong, and I will not endure it!<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\">Who is it that complains unto the King<\u002Fspan>\n          <span class=\"line\">That I, forsooth, am stern, and love them not?<\u002Fspan>\n          <span class=\"line\">By holy Paul, they love his Grace but lightly<\u002Fspan>\n          <span class=\"line\">That fill his ears with such dissentious rumours.<\u002Fspan>\n          <span class=\"line\">Because I cannot flatter and speak fair,<\u002Fspan>\n          <span class=\"line\">Smile in men's faces, smooth, deceive and cog,<\u002Fspan>\n          <span class=\"line\">Duck with French nods and apish courtesy,<\u002Fspan>\n          <span class=\"line\">I must be held a rancorous enemy.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_plain\">Cannot a plain man live and think no harm,<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_plain\">But thus his simple truth must be abus'd<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_plain\">By silken, sly, insinuating Jacks?<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Rivers<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">To whom in all this presence speaks your Grace?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">To thee, that hast nor honesty nor grace.<\u002Fspan>\n          <span class=\"line\">When have I injur'd thee? When done thee wrong?<\u002Fspan>\n          <span class=\"line\">Or thee? Or thee? Or any of your faction?<\u002Fspan>\n          <span class=\"line\">A plague upon you all!<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_wrens\">I cannot tell: the world is grown so bad,<span class=\"ann-marker\">4<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_wrens\">That wrens make prey where eagles dare not perch.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_wrens\">Since every Jack became a gentleman,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_wrens\">There's many a gentle person made a Jack.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Come, come, we know your meaning, brother Gloucester;<\u002Fspan>\n          <span class=\"line\">You envy my advancement and my friends'.<\u002Fspan>\n          <span class=\"line\">God grant we never may have need of you!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Meantime, God grants that we have need of you:<\u002Fspan>\n          <span class=\"line\">Our brother is imprison'd by your means,<\u002Fspan>\n          <span class=\"line\">Myself disgrac'd, and the nobility<\u002Fspan>\n          <span class=\"line\">Held in contempt, whilst many fair promotions<\u002Fspan>\n          <span class=\"line\">Are daily given to ennoble those<\u002Fspan>\n          <span class=\"line\">That scarce, some two days since, were worth a noble.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter QUEEN MARGARET, apart and unseen.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_enter\">Hear me, you wrangling pirates, that fall out<span class=\"ann-marker\">5<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_enter\">In sharing that which you have pill'd from me!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_enter\">Which of you trembles not that looks on me?<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Out, devil! I remember them too well:<\u002Fspan>\n          <span class=\"line\">Thou kill'dst my husband Henry in the Tower,<\u002Fspan>\n          <span class=\"line\">And Edward, my poor son, at Tewkesbury.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_list\">Thou slewest my husband Henry in the Tower,<span class=\"ann-marker\">6<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_list\">And Edward, my poor son, at Tewkesbury;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_list\">And thou hadst made me the common scoff<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_marg_list\">Of Fortune's yoke, to wail his doom and thine.<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Thou art the cause, and most accursed effect.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_tricolon\">Thy honour, state and seat is due to me.<span class=\"ann-marker\">7<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Were you well serv'd, you would be taught your duty.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">To serve me well, you all should do me duty,<\u002Fspan>\n          <span class=\"line\">Teach me to be your queen, and you my subjects:<\u002Fspan>\n          <span class=\"line\">O, serve me well, and teach yourselves that duty!<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">Long mayst thou live to wail thy children's loss,<span class=\"ann-marker\">8<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">And see another, as I see thee now,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">Deck'd in thy rights, as thou art stall'd in mine!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">Long die thy happy days before thy death,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">And, after many lengthen'd hours of grief,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_struct\">Die neither mother, wife, nor England's queen!<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">If heaven have any grievous plague in store<span class=\"ann-marker\">9<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">Exceeding those that I can wish upon thee,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">O, let them keep it till thy sins be ripe,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">And then hurl down their indignation<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">On thee, the troubler of the poor world's peace!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">The worm of conscience still begnaw thy soul!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">Thy friends suspect for traitors while thou liv'st,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">And take deep traitors for thy dearest friends!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">No sleep close up that deadly eye of thine,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">Unless it be while some tormenting dream<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_worm\">Affrights thee with a hell of ugly devils!<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">Thou elvish-mark'd, abortive, rooting hog!<span class=\"ann-marker\">10<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">Thou that wast seal'd in thy nativity<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">The slave of Nature and the son of hell!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">Thou slander of thy mother's heavy womb!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">Thou loathed issue of thy father's loins!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_hog\">Thou rag of honour! thou detested —<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Margaret!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Richard!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Ha!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I call thee not.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I cry thee mercy then, for I had thought<\u002Fspan>\n          <span class=\"line\">That thou hadst call'd me all these bitter names.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why, so I did; but look'd for no reply.<\u002Fspan>\n          <span class=\"line\">O, let me make the period to my curse!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">'Tis done by me, and ends in \"Margaret.\"<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Elizabeth<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Thus have you breath'd your curse against yourself.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Queen Margaret<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_q\">Can curses pierce the clouds and enter heaven?<span class=\"ann-marker\">11<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_curse_q\">Why, then give way, dull clouds, to my quick curses!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Though not by war, by surfeit die your king,<\u002Fspan>\n          <span class=\"line\">As ours by murder, to make him a king!<\u002Fspan>\n          <span class=\"line\">Edward thy son, which now is Prince of Wales,<\u002Fspan>\n          <span class=\"line\">For Edward my son, which was Prince of Wales,<\u002Fspan>\n          <span class=\"line\">Die in his youth by like untimely violence!<\u002Fspan>\n          <span class=\"line\">Thyself a queen, for me that was a queen,<\u002Fspan>\n          <span class=\"line\">Outlive thy glory, like my wretched self!<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_prophecy\">The day will come that thou shalt wish for me<span class=\"ann-marker\">12<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_prophecy\">To help thee curse that poisonous bunch-back'd toad.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exit Queen Margaret.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">I cannot blame her: by God's holy mother,<\u002Fspan>\n          <span class=\"line\">She hath had too much wrong; and I repent<\u002Fspan>\n          <span class=\"line\">My part thereof that I have done to her.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">I do the wrong, and first begin to brawl.<span class=\"ann-marker\">13<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">The secret mischiefs that I set abroach<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">I lay unto the grievous charge of others.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">Clarence, whom I, indeed, have laid in darkness,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">I do beweep to many simple gulls —<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">Namely, to Hastings, Stanley, Buckingham;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">And say it is the Queen and her allies<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_aside\">That stir the King against the Duke my brother.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter two Murderers.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_naked\">And thus I clothe my naked villainy<span class=\"ann-marker\">14<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_naked\">With odd old ends, stol'n forth of holy writ;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s3_naked\">And seem a saint, when most I play the devil.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Go, go, there is your warrant; sign'd upon a piece of paper<\u002Fspan>\n          <span class=\"line\">That tells you what you will do. Well have you perform'd<\u002Fspan>\n          <span class=\"line\">The work that I have set you on.<\u002Fspan>\n          <span class=\"line\">Away, be gone!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exeunt.<\u002Fp>\n    <\u002Fsection>\n    <!-- ═══ ACT I SCENE 4 ═══ -->\n    <section class=\"scene-section\" id=\"s4\" data-screen-label=\"Act I Scene 4\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act I · Scene 4<\u002Fdiv>\n        <h1 class=\"scene-title\">Clarence's Dream &amp; Murder<\u002Fh1>\n        <div class=\"scene-location\">London. The Tower.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Enter CLARENCE and BRAKENBURY.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Brakenbury<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why looks your Grace so heavily today?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">O, I have pass'd a miserable night,<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">So full of ugly sights, of ghastly dreams,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">That, as I am a Christian faithful man,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">I would not spend another such a night,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">Though 'twere to buy a world of happy days,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_open\">So full of dismal terror was the time!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">Methought that I had broken from the Tower,<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">And was embark'd to cross to Burgundy;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">And, in my company, my brother Gloucester;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">Who from my cabin tempted me to walk<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">Upon the hatches: thence we look'd toward England,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">And cited up a thousand heavy times,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">During the wars of York and Lancaster,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_voyage\">That had befall'n us.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_push\">As we pac'd along<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_push\">Upon the giddy footing of the hatches,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_push\">Methought that Gloucester stumbled; and, in falling,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_push\">Struck me, that thought to stay him, overboard,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_push\">Into the tumbling billows of the main.<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Lord, Lord! methought, what pain it was to drown!<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_sensory\">What dreadful noise of waters in mine ears!<span class=\"ann-marker\">4<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_sensory\">What ugly sights of death within mine eyes!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">Methought I saw a thousand fearful wracks;<span class=\"ann-marker\">5<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">A thousand men that fishes gnaw'd upon;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">Wedges of gold, great anchors, heaps of pearl,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">Inestimable stones, unvalued jewels,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">All scatter'd in the bottom of the sea:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">Some lay in dead men's skulls; and, in those holes<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">Where eyes did once inhabit, there were crept,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">As 'twere in scorn of eyes, reflecting gems,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">That woo'd the slimy bottom of the deep,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_seabed\">And mock'd the dead bones that lay scatter'd by.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Brakenbury<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Had you such leisure in the time of death<\u002Fspan>\n          <span class=\"line\">To gaze upon the secrets of the deep?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Methought I had; and often did I strive<\u002Fspan>\n          <span class=\"line\">To yield the ghost: but still the envious flood<\u002Fspan>\n          <span class=\"line\">Kept in my soul, and would not let it forth<\u002Fspan>\n          <span class=\"line\">To seek the empty, vast, and wand'ring air;<\u002Fspan>\n          <span class=\"line\">But smother'd it within my panting bulk,<\u002Fspan>\n          <span class=\"line\">Which almost burst to belch it in the sea.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">With that, methought, a legion of foul fiends<span class=\"ann-marker\">6<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">Environ'd me about, and howled in mine ears<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">Such hideous cries, that, with the very noise<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">I trembling wak'd, and, for a season after<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">Could not believe but that I was in hell,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_underworld\">Such terrible impression made the dream.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_confession\">O Brakenbury, I have done those things<span class=\"ann-marker\">7<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_confession\">Which now bear evidence against my soul,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_confession\">For Edward's sake; and see how he requites me!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">O God! if my deep prayers cannot appease thee,<\u002Fspan>\n          <span class=\"line\">But thou wilt be aveng'd on my misdeeds,<\u002Fspan>\n          <span class=\"line\">Yet execute thy wrath on me alone:<\u002Fspan>\n          <span class=\"line\">O, spare my guiltless wife and my poor children!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter the two MURDERERS.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">What, shall we stab him as he sleeps?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">No; then he will say 'twas done cowardly, when he wakes.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">When he wakes! why, fool, he shall never wake till<\u002Fspan>\n          <span class=\"line\">the judgment day.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why, then he'll say we stabbed him sleeping.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">The urging of that word \"judgment\" hath bred a kind of remorse in me.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Remember our reward, when the deed is done.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Zounds, he dies: I had forgot the reward.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Where's thy conscience now?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">In the Duke of Gloucester's purse.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Enter CLARENCE waking.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">In God's name, what art thou?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">A man, as you are.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">But not, as I am, royal.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Nor you, as we are, loyal.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">Have you that holy feeling in your souls<span class=\"ann-marker\">8<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">To counsel me to make my peace with God,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">And are you yet to your own souls so blind<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">That you will war with God by murd'ring me?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">Ah, sirs, consider, he that set you on<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_appeal\">To do this deed will hate you for the deed.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">What shall we do?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Relent! No: 'tis cowardly and womanish.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Not to relent is beastly, savage, devilish.<\u002Fspan>\n          <span class=\"line\">Which of you, if you were a prince's son,<\u002Fspan>\n          <span class=\"line\">Being pent from liberty, as I am now,<\u002Fspan>\n          <span class=\"line\">If two such murderers as yourselves came to you,<\u002Fspan>\n          <span class=\"line\">Would not entreat for life? Ay, you would beg,<\u002Fspan>\n          <span class=\"line\">Were you in my distress.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Your brother Gloucester hates you.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">O no, he loves me, and he holds me dear:<\u002Fspan>\n          <span class=\"line\">Go you to him from me.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">Ay, so we will.<span class=\"ann-marker\">9<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">Tell him, when that our princely father York<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">Bless'd his three sons with his victorious arm,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">And charg'd us from his soul to love each other,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">He little thought of this divided friendship.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_irony\">Bid Gloucester think of this, and he will weep.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Ay, millstones; as he lessoned us to weep.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">O, do not slander him, for he is kind.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Right, as snow in harvest. Thou deceiv'st thyself:<\u002Fspan>\n          <span class=\"line\">'Tis he that sends us to destroy you here.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Clarence<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">It cannot be; for when I parted with him,<\u002Fspan>\n          <span class=\"line\">He hugg'd me in his arms, and swore, with sobs,<\u002Fspan>\n          <span class=\"line\">That he would labour my delivery.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Why, so he doth, now he delivers you<\u002Fspan>\n          <span class=\"line\">From this world's thraldom to the joys of heaven.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">First Murderer stabs Clarence.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_conscience\">A bloody deed, and desperately dispatch'd!<span class=\"ann-marker\">10<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_conscience\">How fain, like Pilate, would I wash my hands<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_conscience\">Of this most grievous guilty murder done!<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">First Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">How now! What mean'st thou that thou lock'st me out?<\u002Fspan>\n          <span class=\"line\">I would speak with Clarence, and I came hither on my legs.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Second Murderer<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_malmsey\">Take that, and that: if all this will not do,<span class=\"ann-marker\">11<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s4_malmsey\">I'll drown you in the malmsey-butt within.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Exeunt with the body.<\u002Fp>\n    <\u002Fsection>\n    <!-- ═══ ACT III SCENE 7 ═══ -->\n    <section class=\"scene-section\" id=\"s37\" data-screen-label=\"Act III Scene 7\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act III · Scene 7<\u002Fdiv>\n        <h1 class=\"scene-title\">Richard 'Reluctantly' Accepts the Crown<\u002Fh1>\n        <div class=\"scene-location\">London. Baynard's Castle.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Enter RICHARD above, between two BISHOPS. BUCKINGHAM and the MAYOR below.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Buckingham<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">See where his Grace stands, 'tween two clergymen!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Mayor<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Two props of virtue for a Christian prince,<\u002Fspan>\n          <span class=\"line\">To stay him from the fall of vanity:<\u002Fspan>\n          <span class=\"line\">And, see, a book of prayer in his hand,<\u002Fspan>\n          <span class=\"line\">True ornaments to know a holy man.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_2\">I do suspect I have done some offence<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_2\">That seems disgracious in the city's eye,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_2\">And that you come to reprehend my ignorance.<\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Buckingham<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">You have, my lord; would it might please your Grace,<\u002Fspan>\n          <span class=\"line\">On our entreaties, to amend your fault!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Else wherefore breathe I in a Christian land?<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Buckingham<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Know then, it is your fault that you resign<\u002Fspan>\n          <span class=\"line\">The supreme seat, the throne majestical,<\u002Fspan>\n          <span class=\"line\">The scepter'd office of your ancestors,<\u002Fspan>\n          <span class=\"line\">Your state of fortune and your due of birth.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_1\">I am not in the giving vein to-day.<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Buckingham<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Then I salute you with this royal title:<\u002Fspan>\n          <span class=\"line\">Long live Richard, England's worthy King!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Mayor and Citizens<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Amen.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Will you enforce me to a world of cares?<\u002Fspan>\n          <span class=\"line\">Call them again. I am not made of stone,<\u002Fspan>\n          <span class=\"line\">But penetrable to your kind entreaties,<\u002Fspan>\n          <span class=\"line\">Albeit against my conscience and my soul.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_3\">Your mere enforcement shall acquittance me<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_3\">From all the impure blots and stains thereof;<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_3\">For God doth know, and you may partly see,<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s37_3\">How far I am from the desire of this.<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Since you will buckle fortune on my back,<\u002Fspan>\n          <span class=\"line\">To bear her burden, whether I will or no,<\u002Fspan>\n          <span class=\"line\">I must have patience to endure the load;<\u002Fspan>\n          <span class=\"line\">But if black scandal or foul-fac'd reproach<\u002Fspan>\n          <span class=\"line\">Attend the sequel of your imposition,<\u002Fspan>\n          <span class=\"line\">Your mere enforcement shall acquittance me<\u002Fspan>\n          <span class=\"line\">From all the impure blots and stains thereof.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Buckingham<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">God bless your Grace! We see it, and will say it.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">In saying so, you shall but say the truth.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══ ACT V SCENE 3 ═══ -->\n    <section class=\"scene-section\" id=\"s53\" data-screen-label=\"Act V Scene 3\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act V · Scene 3<\u002Fdiv>\n        <h1 class=\"scene-title\">The Eve of Bosworth: Ghosts &amp; the Divided Self<\u002Fh1>\n        <div class=\"scene-location\">Bosworth Field. Richard's tent.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Richard wakes suddenly from sleep.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_1\">Give me another horse! Bind up my wounds!<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_1\">Have mercy, Jesu! — Soft! I did but dream.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_1\">O coward conscience, how dost thou afflict me!<\u002Fspan><\u002Fspan>\n          <span class=\"line\">The lights burn blue. It is now dead midnight.<\u002Fspan>\n          <span class=\"line\">Cold fearful drops stand on my trembling flesh.<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">What do I fear? Myself? There's none else by.<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Richard loves Richard; that is, I am I.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Is there a murderer here? No. Yes, I am:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Then fly. What, from myself? Great reason why —<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Lest I revenge. Myself upon myself?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Alack, I love myself. Wherefore? for any good<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">That I myself have done unto myself?<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">O, no! alas, I rather hate myself<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">For hateful deeds committed by myself!<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">I am a villain: yet I lie, I am not.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_2\">Fool, of thyself speak well: fool, do not flatter.<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_3\">I shall despair. There is no creature loves me;<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_3\">And if I die, no soul will pity me:<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_3\">Nay, wherefore should they, since that I myself<\u002Fspan><\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s53_3\">Find in myself no pity to myself?<\u002Fspan><\u002Fspan>\n          <span class=\"line\">Methought the souls of all that I had murder'd<\u002Fspan>\n          <span class=\"line\">Came to my tent; and every one did threat<\u002Fspan>\n          <span class=\"line\">To-morrow's vengeance on the head of Richard.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n\n    <!-- ═══ ACT V SCENE 4 ═══ -->\n    <section class=\"scene-section\" id=\"s54\" data-screen-label=\"Act V Scene 4\">\n      <header class=\"scene-header\">\n        <div class=\"scene-act-label\">Act V · Scene 4 &amp; 5<\u002Fdiv>\n        <h1 class=\"scene-title\">Bosworth Field — Richard's Death<\u002Fh1>\n        <div class=\"scene-location\">Bosworth Field.<\u002Fdiv>\n      <\u002Fheader>\n\n      <p class=\"stage-direction\">Alarum. Enter RICHARD.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s54_1\">A horse! A horse! My kingdom for a horse!<span class=\"ann-marker\">1<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Catesby<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Withdraw, my lord; I'll help you to a horse.<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richard<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">Slave, I have set my life upon a cast,<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s54_2\">And I will stand the hazard of the die:<span class=\"ann-marker\">2<\u002Fspan><\u002Fspan><\u002Fspan>\n          <span class=\"line\">I think there be six Richmonds in the field;<\u002Fspan>\n          <span class=\"line\">Five have I slain to-day instead of him.<\u002Fspan>\n          <span class=\"line\">A horse! A horse! My kingdom for a horse!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <p class=\"stage-direction\">Alarum. Enter RICHMOND and RICHARD; they fight; RICHARD is slain.<\u002Fp>\n      <p class=\"stage-direction\">Retreat and flourish. Enter RICHMOND, and the other Lords.<\u002Fp>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richmond<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">God and your arms be praised, victorious friends;<\u002Fspan>\n          <span class=\"line\"><span class=\"ann\" data-ann=\"s54_3\">The day is ours; the bloody dog is dead.<span class=\"ann-marker\">3<\u002Fspan><\u002Fspan><\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n\n      <div class=\"speech\">\n        <span class=\"speaker\">Richmond<\u002Fspan>\n        <div class=\"lines\">\n          <span class=\"line\">England hath long been mad, and scarr'd herself;<\u002Fspan>\n          <span class=\"line\">The brother blindly shed the brother's blood,<\u002Fspan>\n          <span class=\"line\">The father rashly slaughter'd his own son,<\u002Fspan>\n          <span class=\"line\">The son, compell'd, been butcher to the sire:<\u002Fspan>\n          <span class=\"line\">All this divided York and Lancaster,<\u002Fspan>\n          <span class=\"line\">Divided in their dire division.<\u002Fspan>\n          <span class=\"line\">O, now let Richmond and Elizabeth,<\u002Fspan>\n          <span class=\"line\">The true succeeders of each royal house,<\u002Fspan>\n          <span class=\"line\">By God's fair ordinance conjoin together!<\u002Fspan>\n          <span class=\"line\">And let their heirs, God, if thy will be so,<\u002Fspan>\n          <span class=\"line\">Enrich the time to come with smooth-fac'd peace,<\u002Fspan>\n          <span class=\"line\">With smiling plenty and fair prosperous days!<\u002Fspan>\n          <span class=\"line\">Abate the edge of traitors, gracious Lord,<\u002Fspan>\n          <span class=\"line\">That would reduce these bloody days again,<\u002Fspan>\n          <span class=\"line\">And make poor England weep in streams of blood!<\u002Fspan>\n          <span class=\"line\">Let them not live to taste this land's increase<\u002Fspan>\n          <span class=\"line\">That would with treason wound this fair land's peace!<\u002Fspan>\n          <span class=\"line\">Now civil wounds are stopp'd, peace lives again:<\u002Fspan>\n          <span class=\"line\">That she may long live here, God say amen!<\u002Fspan>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fsection>\n  <\u002Farticle><!-- /script-column -->\n\n  <!-- ═══════════════ ANNOTATION PANEL ═══════════════ -->\n  <aside class=\"annotation-panel\" id=\"annotationPanel\">\n    <div class=\"panel-empty\" id=\"panelEmpty\">\n      <div class=\"panel-empty-icon\">✦<\u002Fdiv>\n      <p class=\"panel-empty-text\">Select any <span style=\"border-bottom:2px solid #FFCC00; padding-bottom:1px;\">underlined passage<\u002Fspan> to open its annotation.<\u002Fp>\n    <\u002Fdiv>\n\n    <div class=\"panel-content\" id=\"panelContent\">\n      <div class=\"panel-quote-strip\">\n        <div class=\"panel-quote\" id=\"panelQuote\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel-technique-block\">\n        <div class=\"panel-block-label\">Literary Techniques &amp; Effects<\u002Fdiv>\n        <div class=\"technique-rows\" id=\"panelTechniques\"><\u002Fdiv>\n      <\u002Fdiv>\n      <div class=\"panel-context-block\" id=\"panelContext\"><\u002Fdiv>\n      <button class=\"panel-close\" onclick=\"closePanel()\">✕ &nbsp; Close<\u002Fbutton>\n    <\u002Fdiv>\n\n    <div class=\"legend\">\n      <div class=\"legend-title\">How to use this text<\u002Fdiv>\n      <div class=\"legend-item\">\n        <span class=\"legend-mark\"><\u002Fspan>\n        <span>Underlined text has an annotation<\u002Fspan>\n      <\u002Fdiv>\n      <div class=\"legend-item\" style=\"gap:10px; align-items:flex-start;\">\n        <span style=\"font-family:'Cinzel',serif;font-size:9px;background:#FFCC00;color:#000099;padding:2px 5px;flex-shrink:0;margin-top:2px;\">1<\u002Fspan>\n        <span>Click badge or underlined text to open<\u002Fspan>\n      <\u002Fdiv>\n    <\u002Fdiv>\n  <\u002Faside>\n\n<\u002Fmain>\n\n\n<script src=\"803bb417-9fc0-4fa7-bb39-1105de43e35e\"><\u002Fscript>\n<script>\n// ── ANNOTATION DATA ─────────────────────────────────────────────────\n// Each annotation has:\n//   quote    — the passage quoted\n//   techniques — array of { name, effect } objects (technique name + its specific effect)\n//   context  — array of contextual notes (strings, may contain <b>)\nconst ANNOTATIONS = {\n  \"1\": {\n    quote: \"\\u201cNow is the winter of our discontent / Made glorious summer by this sun of York\\u201d\",\n    techniques: [\n      { name: \"Antithesis\", effect: \"\\u2018winter\\u2019 and \\u2018summer\\u2019 are placed in opposition within a single sentence, creating an immediate tension between despair and triumph \\u2014 which Richard will reveal is entirely false.\" },\n      { name: \"Pathetic Fallacy\", effect: \"The seasons encode the political world: civil war as winter, Yorkist victory as summer, suggesting nature itself mirrors human affairs \\u2014 a harmony Richard is about to violate.\" },\n      { name: \"Pun on \\u2018sun/son\\u2019\", effect: \"The homophones allow Richard to simultaneously praise Edward IV as king and refer to him as merely a man \\u2014 the punning ambiguity lets us hear his private contempt beneath the public celebration.\" }\n    ],\n    context: [\n      \"Richard speaks directly to the audience in a <b>soliloquy<\u002Fb>, a convention that grants him intimacy and positions us as his confidants. We share knowledge no other character has, making us complicit in his schemes from the play\\u2019s first line.\",\n      \"The speech begins with apparent celebration of Yorkist victory after the Wars of the Roses \\u2014 but the antitheses and the pun signal immediately that Richard\\u2019s relationship to the peace is ironic. He celebrates a world he intends to destroy.\"\n    ]\n  },\n  \"2\": {\n    quote: \"\\u201cOur bruiséd arms hung up for monuments; / Our stern alarums changed to merry meetings\\u201d\",\n    techniques: [\n      { name: \"Inclusive Pronoun \\u2018our\\u2019\", effect: \"The repeated \\u2018our\\u2019 appears to align Richard with the Yorkist nation, performing solidarity with a dynasty he privately intends to undermine \\u2014 the pronoun is itself a lie.\" },\n      { name: \"Antithesis\", effect: \"\\u2018bruiséd arms\\u2019 versus \\u2018merry meetings\\u2019; \\u2018stern alarums\\u2019 versus \\u2018delightful measures\\u2019 \\u2014 each pair enacts the shift from war to peace, making the contrast feel total and celebratory.\" },\n      { name: \"Alliteration\", effect: \"\\u2018merry meetings,\\u2019 \\u2018dreadful marches,\\u2019 \\u2018delightful deasures\\u2019: the repeated consonants create rhythmic pleasure, making the peace sound attractive \\u2014 the very thing Richard will declare himself contemptuous of.\" }\n    ],\n    context: [\n      \"The lexical field of warfare (\\u2018alarums,\\u2019 \\u2018marches,\\u2019 \\u2018bruiséd arms\\u2019) is deliberately contrasted with the lexical field of peacetime festivity (\\u2018merry meetings,\\u2019 \\u2018delightful measures\\u2019). Richard performs the expected rhetoric of relief \\u2014 before revealing he finds peace intolerable.\"\n    ]\n  },\n  \"3\": {\n    quote: \"\\u201cGrim-visaged war hath smoothed his wrinkled front; / He capers nimbly in a lady\\u2019s chamber\\u201d\",\n    techniques: [\n      { name: \"Personification\", effect: \"War is given a human body \\u2014 a \\u2018grim visage,\\u2019 a \\u2018wrinkled front\\u2019 now smoothed. This makes the transformation of the warrior world into peacetime frivolity vivid and physical, setting up Richard\\u2019s claim that he cannot belong to it.\" },\n      { name: \"Semantic Shift / Bathos\", effect: \"The shift from \\u2018mounting barbèd steeds\\u2019 (heroic) to \\u2018capering nimbly in a lady\\u2019s chamber\\u2019 (trivial) is deliberately bathetic \\u2014 the contrast belittles the peace and implies only Richard truly understands what has been lost.\" }\n    ],\n    context: [\n      \"The feminisation of peacetime \\u2014 \\u2018a lady\\u2019s chamber,\\u2019 \\u2018the lascivious pleasing of a lute\\u2019 \\u2014 is culturally loaded. Richard aligns martial masculinity with value, and erotic, courtly culture with emptiness. This is the ideological scaffolding for his self-exclusion.\",\n      \"He presents himself as a man whose skills are irrelevant in peacetime, establishing the motive for villainy. But, as the play demonstrates, this is performance: Richard is more than capable of seduction.\"\n    ]\n  },\n  \"4\": {\n    quote: \"\\u201cI, that am not shap\\u2019d for sportive tricks, / \\u2026 Cheated of feature by dissembling Nature\\u201d\",\n    techniques: [\n      { name: \"Anaphora (\\u2018I, that am\\u2019)\", effect: \"The triple repetition builds syntactic momentum, creating a catalogue of grievances that positions Richard as victim before he declares himself villain \\u2014 the rhetorical structure solicits sympathy even as he announces evil.\" },\n      { name: \"Personification of Nature\", effect: \"\\u2018Dissembling Nature\\u2019 is blamed as a deliberate deceiver \\u2014 Richard displaces agency onto a cosmic force. This exculpates him even as he takes credit for choosing villainy.\" },\n      { name: \"Hyperbole\", effect: \"\\u2018That dogs bark at me as I halt by them\\u2019 is deliberately extreme, inviting dark comedy. It makes Richard\\u2019s self-pity seem absurd, but also signals his awareness of how he is seen, which he weaponises throughout the play.\" }\n    ],\n    context: [\n      \"Renaissance <b>physiognomy<\u002Fb> (the belief that physical appearance reflects inner character) meant that Shakespeare\\u2019s audience would read Richard\\u2019s deformity as outward proof of inner corruption. Shakespeare uses and complicates this: Richard names the prejudice, then exploits the audience\\u2019s awareness of it.\",\n      \"The passage is a masterclass in double-voiced rhetoric: Richard performs self-pity while the audience can already sense the calculation behind every phrase.\"\n    ]\n  },\n  \"5\": {\n    quote: \"\\u201cI am determinèd to prove a villain / And hate the idle pleasures of these days\\u201d\",\n    techniques: [\n      { name: \"Pun on \\u2018determinèd\\u2019\", effect: \"The word means both \\u2018resolved to\\u2019 (free will) and \\u2018fated to\\u2019 (predestination). Richard leaves open whether villainy is his choice or his destiny, making it impossible to assign simple moral responsibility.\" },\n      { name: \"Direct Address to Audience\", effect: \"Richard announces his intentions openly to us, creating a relationship of dramatic irony: we will watch every scene knowing what other characters cannot. This shared secret is the foundation of his theatrical power.\" }\n    ],\n    context: [\n      \"This is Richard\\u2019s explicit thesis statement: he will transform personal resentment into political evil. The logical progression \\u2014 \\u2018I cannot be a lover, therefore I will be a villain\\u2019 \\u2014 is deliberate sophistry. The play will reveal that he is perfectly capable of seduction.\",\n      \"\\u2018Weak piping time of peace\\u2019: the contemptuous compound adjective dismisses the peace as effeminate and trivial. The alliteration (\\u2018piping / peace\\u2019) underscores the disdain.\"\n    ]\n  },\n  \"6\": {\n    quote: \"\\u201cPlots have I laid, inductions dangerous, / By drunken prophecies, libels, and dreams\\u201d\",\n    techniques: [\n      { name: \"Tricolon\", effect: \"\\u2018prophecies, libels, and dreams\\u2019 \\u2014 three instruments listed in a single rhythm. The trio makes Richard\\u2019s manipulation feel comprehensive and systematic rather than improvised.\" },\n      { name: \"Dramatic Irony\", effect: \"Richard reveals that the prophecy about the letter \\u2018G\\u2019 is his own fabrication. When Clarence appears moments later and explains the prophecy as if it were real, the audience watches Richard perform ignorance of something he engineered.\" },\n      { name: \"Inversion (\\u2018Plots have I laid\\u2019)\", effect: \"The inverted syntax foregrounds \\u2018Plots\\u2019 \\u2014 placing the crime first, then the agent. This dramatises Richard\\u2019s pride in his schemes.\" }\n    ],\n    context: [\n      \"The prophecy about \\u2018G\\u2019 is doubly ironic: it could point to <b>George<\u002Fb> (Clarence) or to <b>Gloucester<\u002Fb> (Richard himself). Richard has engineered an ambiguity that implicates his brother while protecting himself.\",\n      \"The passage establishes Richard as a manipulator of superstition and irrationality \\u2014 he weaponises the very human tendency to believe in prophecy and omens.\"\n    ]\n  },\n  \"7\": {\n    quote: \"\\u201cBrother, good day. What means this armèd guard / That waits upon your Grace?\\u201d\",\n    techniques: [\n      { name: \"Dramatic Irony\", effect: \"The audience knows Richard arranged Clarence\\u2019s arrest. His greeting \\u2014 courteous, concerned \\u2014 is a performance of innocence that is immediately legible to us as false, creating ironic distance between what Richard says and what we know.\" },\n      { name: \"Feigned Ignorance (Rhetorical Erotesis)\", effect: \"\\u2018What means this armèd guard?\\u2019 is a false question \\u2014 Richard knows exactly why the guard is there. The technique makes him appear brotherly and outraged on Clarence\\u2019s behalf while concealing his guilt.\" }\n    ],\n    context: [\n      \"The gap between Richard\\u2019s public mask \\u2014 brotherly concern \\u2014 and his private intent \\u2014 fratricide \\u2014 is established in a single breath. This establishes the play\\u2019s central dynamic: Richard\\u2019s theatrical ability to occupy two positions simultaneously, known to us but invisible to other characters.\"\n    ]\n  },\n  \"8\": {\n    quote: \"\\u201cWhy, this it is when men are ruled by women \\u2026 We are not safe, Clarence, we are not safe.\\u201d\",\n    techniques: [\n      { name: \"Scapegoating / Blame-Shifting\", effect: \"Richard attributes Clarence\\u2019s imprisonment to Queen Elizabeth (\\u2018My Lady Grey his wife\\u2019) rather than to himself, its actual cause. The device deflects suspicion and simultaneously poisons Clarence\\u2019s relationship with the Queen.\" },\n      { name: \"Repetition (\\u2018We are not safe\\u2019)\", effect: \"The repeated phrase, positioned as the climax of the speech, creates a false sense of shared danger and vulnerability. It performs solidarity with Clarence \\u2014 the very man Richard is about to have killed.\" },\n      { name: \"Misogynistic Generalisation\", effect: \"The opening statement \\u2014 \\u2018when men are ruled by women\\u2019 \\u2014 exploits patriarchal cultural anxieties to make his scapegoating seem like political analysis rather than self-interested manipulation.\" }\n    ],\n    context: [\n      \"This is Richard as political manipulator in action for the first time in dialogue: he redirects blame, manufactures a shared enemy, and performs brotherly concern. Every line is calculated. Compare this to his private voice in the soliloquies.\"\n    ]\n  },\n  \"10\": {\n    quote: \"\\u201cSimple, plain Clarence! I do love thee so, / That I will shortly send thy soul to heaven\\u201d\",\n    techniques: [\n      { name: \"Parodic Tenderness / Antiphrase\", effect: \"\\u2018I do love thee so\\u2019 is used as the premise for announcing murder. Love is perverted into its opposite, and familial language is weaponised \\u2014 the shock is that the grammar of affection carries the content of assassination.\" },\n      { name: \"Blasphemous Irony\", effect: \"Sending Clarence\\u2019s soul \\u2018to heaven\\u2019 is presented as a gift (\\u2018If heaven will take the present at our hands\\u2019). Richard trivialises divine judgement, reducing the fate of a soul to a commercial transaction.\" }\n    ],\n    context: [\n      \"Spoken directly to the audience the moment Clarence exits, this marks Richard\\u2019s return to his \\u2018true voice.\\u2019 The contrast between his public performance (concerned brother) and this private declaration (murderer) is total \\u2014 and makes the gap between appearance and reality visible as a structural principle of the play.\",\n      \"\\u2018Simple, plain Clarence\\u2019 \\u2014 Richard\\u2019s contemptuous epithet for his brother reveals how he regards those who cannot see through his performances: as instruments, not people.\"\n    ]\n  },\n  \"11\": {\n    quote: \"\\u201cNo doubt, no doubt; and so shall Clarence too, / For they that were your enemies are his\\u201d\",\n    techniques: [\n      { name: \"Dramatic Irony\", effect: \"Richard tells Hastings that Clarence will also \\u2018give thanks\\u2019 to his enemies. The audience knows Richard is planning Clarence\\u2019s death, not his release \\u2014 the line is simultaneously a false comfort and a dark private joke.\" }\n    ],\n    context: [\n      \"Richard\\u2019s easy duplicity in social exchanges \\u2014 cheerful, concerned, politically adroit \\u2014 shows how seamlessly he moves between his private and public selves. There is no visible seam.\"\n    ]\n  },\n  \"12\": {\n    quote: \"\\u201cNow, by Saint Paul, this news is bad indeed \\u2026 \\u2018Tis very grievous to be thought upon.\\u201d\",\n    techniques: [\n      { name: \"Dramatic Irony\", effect: \"Richard\\u2019s expression of grief at the King\\u2019s illness is calculated performance: the audience knows Edward\\u2019s death is a precondition for Richard\\u2019s rise. Every expression of concern is a lie we can decode.\" },\n      { name: \"Oath (\\u2018by Saint Paul\\u2019)\", effect: \"Richard\\u2019s oath on a saint is deeply ironic given his context \\u2014 he is about to plot murder. The religious formula performs piety while enacting its opposite, a pattern recurring throughout the play.\" }\n    ],\n    context: [\n      \"This exchange with Hastings shows Richard shifting between registers effortlessly: warrior, schemer, concerned courtier. His performance is so skilled that Hastings suspects nothing.\"\n    ]\n  },\n  \"13\": {\n    quote: \"\\u201cHe cannot live, I hope, and must not die / Till George be pack\\u2019d with post-horse up to heaven\\u201d\",\n    techniques: [\n      { name: \"Macabre Humour / Dark Wit\", effect: \"\\u2018Pack\\u2019d with post-horse up to heaven\\u2019 trivialises Clarence\\u2019s death with a comic travel metaphor. The flippancy is disturbing precisely because it reveals how little weight Richard gives to human life.\" },\n      { name: \"Parallelism (\\u2018husband and her father\\u2019)\", effect: \"\\u2018The readiest way to make the wench amends / Is to become her husband and her father\\u2019 \\u2014 the mirroring structure of the two roles exposes Richard\\u2019s logic as grotesquely transactional. Murder is reframed as a service.\" },\n      { name: \"Rhyming Couplet (closing)\", effect: \"\\u2018When they are gone, then must I count my gains\\u2019 \\u2014 the couplet brings a sense of cool, businesslike finality to his murder plans. It sounds like a proverb, not a conspiracy.\" }\n    ],\n    context: [\n      \"Richard\\u2019s closing soliloquy reveals his full Machiavellian roadmap: eliminate Clarence, wait for Edward to die, then marry Lady Anne \\u2014 all steps toward the crown. His admission, \\u2018What though I kill\\u2019d her husband and her father?\\u2019 directly foreshadows the extraordinary wooing scene in Act 1.2.\",\n      \"The reference to \\u2018another secret close intent\\u2019 withholds information even from the audience. Richard keeps us in his confidence, but not entirely \\u2014 he retains a private layer we cannot access.\"\n    ]\n  },\n  \"14\": {\n    quote: \"\\u201cPoor key-cold figure of a holy king! / Pale ashes of the house of Lancaster!\\u201d\",\n    techniques: [\n      { name: \"Apostrophe\", effect: \"Anne addresses Henry\\u2019s corpse directly, a rhetorical device that sacralises the body and establishes the scene as a site of mourning ritual. It also signals Anne\\u2019s isolation: she speaks to the dead because the living have failed her.\" },\n      { name: \"Compound Epithets\", effect: \"\\u2018Key-cold\\u2019 (cold as iron) and \\u2018pale ashes\\u2019 create a precise physical image of the corpse while positioning Henry as sacred relic rather than mere body. The epithets perform reverence.\" },\n      { name: \"Anaphora (\\u2018Poor \\u2026 Pale \\u2026 Thou bloodless\\u2019)\", effect: \"The three-part structure of the opening lament builds rhythmic intensity and emphasises Henry\\u2019s victimhood through accumulation.\" }\n    ],\n    context: [\n      \"Anne opens the scene as a figure of moral order: grief, ceremony, and religious duty. Her language defines a world of righteous mourning that Richard is about to violate. The contrast between her solemnity and his intrusion is the central visual and moral drama of the scene.\",\n      \"Anne identifies herself entirely through the men she has lost: \\u2018wife to thy Edward, to thy slaughter\\u2019d son.\\u2019 This is not weakness: it positions her grief as politically significant and her curses as legitimate claims for justice.\"\n    ]\n  },\n  \"15\": {\n    quote: \"\\u201cCursed be the hand that made these fatal holes! / Cursed be the heart that had the heart to do it!\\u201d\",\n    techniques: [\n      { name: \"Anaphora (\\u2018Cursed be\\u2019)\", effect: \"The triple curse structure \\u2014 hand, heart, blood \\u2014 enacts a formal ritual of damnation. The repetition gives Anne\\u2019s words the force of an incantation, not mere emotional outburst.\" },\n      { name: \"Polyptoton (\\u2018heart that had the heart\\u2019)\", effect: \"The repetition of \\u2018heart\\u2019 in different senses (the organ / the courage) creates a verbal knot: the killer used the physical organ as the seat of cruelty. The wordplay draws attention to the horror of deliberate violence.\" },\n      { name: \"Ironic Foreshadowing / Self-Curse\", effect: \"Anne prays that Richard\\u2019s future wife will be \\u2018more miserable by the death of him / Than I am made by my young lord.\\u2019 This is unknowingly a curse on herself, since she will become his wife.\" }\n    ],\n    context: [\n      \"The series of curses establishes the play\\u2019s recurring motif: <b>curses that rebound on their speakers<\u002Fb>. Anne\\u2019s invocation of retribution \\u2014 through deformed children, a wretched wife \\u2014 will be partly fulfilled, but turned back on herself.\",\n      \"For a Renaissance audience, formal cursing had genuine force. Anne\\u2019s language here is not hysterical but liturgical \\u2014 she calls upon heaven, earth, and God to enact justice.\"\n    ]\n  },\n  \"16\": {\n    quote: \"\\u201cStay, you that bear the corse, and set it down \\u2026 I\\u2019ll make a corse of him that disobeys.\\u201d\",\n    techniques: [\n      { name: \"Pun on \\u2018corse/corpse\\u2019\", effect: \"Richard\\u2019s threat \\u2014 \\u2018I\\u2019ll make a corse of him that disobeys\\u2019 \\u2014 collapses the dead body before them and the bodies he will create into a single word. It signals his complete indifference to the sacred ritual he interrupts.\" },\n      { name: \"Imperative Mood\", effect: \"Richard\\u2019s first words in the scene are commands. He takes authority instantly, without invitation \\u2014 the grammar of power overrides the social hierarchy of grief.\" }\n    ],\n    context: [\n      \"Richard\\u2019s violent intrusion into the funeral procession is a theatrical provocation: he overrides ceremony, grief, and common decency. The effect on Anne \\u2014 and the audience \\u2014 is shock. His claim to social space is based entirely on intimidation, not right.\"\n    ]\n  },\n  \"17\": {\n    quote: \"\\u201cAvaunt, thou dreadful minister of hell! / Thou hadst but power over his mortal body\\u201d\",\n    techniques: [\n      { name: \"Demon Imagery\", effect: \"Anne calls Richard a \\u2018minister of hell,\\u2019 framing their confrontation as <b>spiritual warfare<\u002Fb> rather than political dispute. This elevated register gives her resistance moral weight and positions Richard as literally diabolical.\" },\n      { name: \"Antithesis (\\u2018mortal body\\u2019 vs soul)\", effect: \"Anne draws a boundary: Richard has power over bodies, not souls. The distinction insists on a spiritual order he cannot touch \\u2014 though his rhetoric is about to test whether that is true.\" }\n    ],\n    context: [\n      \"Anne\\u2019s language of hell and heaven, devil and soul, frames the scene as a test of whether moral and spiritual categories can withstand Richard\\u2019s rhetorical assault. Her defeat \\u2014 or partial defeat \\u2014 raises disturbing questions about the limits of righteous language against skilled manipulation.\"\n    ]\n  },\n  \"18\": {\n    quote: \"\\u201cBlush, blush, thou lump of foul deformity; / For \\u2019tis thy presence that exhales this blood\\u201d\",\n    techniques: [\n      { name: \"Renaissance Belief (Cruentation)\", effect: \"The claim that a murdered body bleeds in the presence of its killer was widely credited in Shakespeare\\u2019s era. Anne presents the bleeding wounds as supernatural accusation \\u2014 heaven itself points its finger at Richard.\" },\n      { name: \"Physiognomy\", effect: \"\\u2018Thou lump of foul deformity\\u2019 links Richard\\u2019s physical body to his moral corruption \\u2014 the insult is simultaneously descriptive and diagnostic.\" },\n      { name: \"Apostrophe / Direct Address\", effect: \"Addressing Richard as \\u2018thou\\u2019 (intimate, contemptuous) rather than \\u2018you\\u2019 (formal) is a social insult that strips him of the respect owed to a Duke, placing him beneath her.\" }\n    ],\n    context: [\n      \"For the original audience, the bleeding corpse was not merely dramatic: it was a genuine form of evidence. Anne\\u2019s appeal to the supernatural legitimises her accusation and frames Richard\\u2019s guilt as cosmically confirmed, not merely alleged.\"\n    ]\n  },\n  \"19\": {\n    quote: \"\\u201cNo beast so fierce but knows some touch of pity.\\u201d / \\u201cBut I know none, and therefore am no beast.\\u201d\",\n    techniques: [\n      { name: \"Stichomythia\", effect: \"Single-line rapid exchanges show the two characters as intellectual equals \\u2014 Anne is not passive. The technique creates pace and wit, making the verbal combat feel genuinely competitive.\" },\n      { name: \"Paradox / Twisted Logic\", effect: \"Richard inverts Anne\\u2019s proverb: by claiming to know no pity, he argues he is \\u2018no beast\\u2019 \\u2014 something worse. The logic is deliberately outrageous, a display of verbal virtuosity that disarms by its sheer audacity.\" },\n      { name: \"Antithesis (devil / angel)\", effect: \"\\u2018O wonderful, when devils tell the truth!\\u2019 / \\u2018More wonderful, when angels are so angry!\\u2019 \\u2014 the exchange recasts both speakers in mythological terms. Richard wears the devil label with ironic comfort.\" }\n    ],\n    context: [\n      \"This exchange is the verbal centrepiece of the scene. Anne matches Richard line for line, demonstrating her intelligence and moral clarity \\u2014 which makes her eventual capitulation more, not less, disturbing.\",\n      \"Richard\\u2019s willingness to accept the label of \\u2018devil\\u2019 and then turn it into a compliment shows his relationship to language: he does not fear moral categories, he plays with them.\"\n    ]\n  },\n  \"20\": {\n    quote: \"\\u201cVouchsafe, defused infection of a man \\u2026 Fouler than heart can think thee, thou canst make / No excuse current, but to hang thyself.\\u201d\",\n    techniques: [\n      { name: \"Mirroring / Parallelism\", effect: \"Anne echoes Richard\\u2019s phrasing exactly but inverts the valuation: \\u2018divine perfection\\u2019 becomes \\u2018defused infection,\\u2019 \\u2018fairer than tongue can name\\u2019 becomes \\u2018fouler than heart can think.\\u2019 This shows Anne as rhetorically capable \\u2014 she is not overwhelmed, she is countering blow for blow.\" },\n      { name: \"Stichomythia (continued)\", effect: \"The rapid mirroring of structure with inversion of meaning is the formal definition of stichomythia. It creates a sense of perfectly matched combat.\" }\n    ],\n    context: [\n      \"Anne\\u2019s \\u2018defused infection\\u2019 (meaning: scattered, spread-out infection) is a brilliantly precise insult \\u2014 she suggests Richard\\u2019s moral corruption contaminates everything around him, diffused throughout the world like a disease. This is her strongest line in the exchange.\"\n    ]\n  },\n  \"21\": {\n    quote: \"\\u201cIn thy foul throat thou liest: Queen Margaret saw / Thy murd\\u2019rous falchion smoking in his blood\\u201d\",\n    techniques: [\n      { name: \"Eyewitness Testimony as Rhetoric\", effect: \"Anne appeals to Queen Margaret as a witness \\u2014 invoking the evidence of the senses against Richard\\u2019s denials. \\u2018Smoking in his blood\\u2019 is viscerally specific, making abstraction impossible.\" },\n      { name: \"Kenning / Compound Metaphor\", effect: \"\\u2018Foul throat\\u2019 (the seat of speech and lies) and \\u2018murd\\u2019rous falchion\\u2019 (a sword specified by its murder) personalise the accusation \\u2014 the body parts carry the guilt.\" }\n    ],\n    context: [\n      \"Anne\\u2019s appeal to evidence is the correct rhetorical move \\u2014 but Richard will simply circumvent it, not by denying the facts but by reframing their meaning (beauty caused them). This is the pivot from argument to seduction.\"\n    ]\n  },\n  \"22\": {\n    quote: \"\\u201cYes, one place else, if you will hear me name it.\\u201d / \\u201cYour bed-chamber.\\u201d\",\n    techniques: [\n      { name: \"Sexual Double Entendre / Innuendo\", effect: \"The exchange \\u2014 Anne suggests \\u2018some dungeon,\\u2019 Richard names \\u2018your bed-chamber\\u2019 \\u2014 is Richard\\u2019s first direct sexual overture. The comic structure (build-up / deflating punchline) wrong-foots Anne, shifting the tone from elegy to courtship.\" },\n      { name: \"Bathos\", effect: \"The shift from Anne\\u2019s register (\\u2018And thou unfit for any place but hell\\u2019) to Richard\\u2019s answer (\\u2018Your bed-chamber\\u2019) is a deliberate tonal collapse that destabilises her control of the conversation.\" }\n    ],\n    context: [\n      \"This exchange marks the moment the scene\\u2019s register shifts from moral argument to something like flirtation. Richard\\u2019s audacity in making a sexual joke in front of Henry\\u2019s corpse is shocking \\u2014 and this shock is part of his method. He disorients Anne by refusing to stay within the boundaries of appropriate behaviour.\"\n    ]\n  },\n  \"23\": {\n    quote: \"\\u201cYour beauty was the cause of that effect \\u2014 / Your beauty, that did haunt me in my sleep\\u201d\",\n    techniques: [\n      { name: \"Petrarchan Conventions\", effect: \"Richard borrows the language of courtly love poetry (the haunting beauty, the irresistible force) and applies it to political murders. He transforms his crimes into a perverse tribute to Anne\\u2019s power, making her responsible for the deaths.\" },\n      { name: \"Repetition of \\u2018Your beauty\\u2019\", effect: \"The anaphoric repetition flatters obsessively while simultaneously transferring guilt: \\u2018your beauty\\u2019 was the cause, not Richard\\u2019s will. The flattery and the self-exculpation are a single rhetorical move.\" }\n    ],\n    context: [\n      \"Richard appropriates the discourse of romantic love to justify atrocity. By placing Anne within a Petrarchan framework \\u2014 as the tyrannical beloved whose beauty compels action \\u2014 he forces her to respond within those terms rather than on the terrain of guilt and justice.\",\n      \"This is one of the play\\u2019s most disturbing moments: Richard performs sincerity, and we cannot be entirely sure he does not, on some level, mean it \\u2014 the ambiguity is intentional.\"\n    ]\n  },\n  \"24\": {\n    quote: \"\\u201cAs all the world is cheered by the sun, / So I by that; it is my day, my life.\\u201d\",\n    techniques: [\n      { name: \"Simile (sun / Anne)\", effect: \"The simile elevates
