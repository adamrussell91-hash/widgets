 Anne to a cosmic force, likening her to the sun that sustains all life. The hyperbole performs devotion while recycling the sun imagery from the play\\u2019s opening \\u2014 connecting Anne to the Yorkist political sun, which is also a source of Richard\\u2019s ambition.\" },\n      { name: \"Echo of Opening Imagery\", effect: \"The \\u2018sun\\u2019 motif from \\u2018this sun of York\\u2019 (1.1) is reprised here. Richard instrumentalises the language of political triumph and converts it into apparent romantic devotion \\u2014 both suns serve his purposes.\" }\n    ],\n    context: [\n      \"Whether this is performance or a moment of genuine feeling is an interpretive question the play deliberately leaves open. Richard\\u2019s subsequent soliloquy (\\u2018I\\u2019ll have her; but I will not keep her long\\u2019) suggests calculation \\u2014 but his private monologues are also performances, in a sense.\"\n    ]\n  },\n  \"25\": {\n    quote: \"\\u201cNay, do not pause; for I did kill King Henry \\u2014 / But \\u2019twas thy beauty that provoked me.\\u201d\",\n    techniques: [\n      { name: \"Confession as Seduction\", effect: \"Richard confesses both murders openly, but each is immediately qualified by \\u2018but \\u2019twas thy beauty\\u2019 \\u2014 the confession and the flattery are fused into one move. Guilt is converted into devotion.\" },\n      { name: \"Theatrical Gesture (kneeling, sword)\", effect: \"Richard kneels and offers his sword \\u2014 a calculated <b>visual paradox<\u002Fb>: the most powerful person in the scene physically submits to the most vulnerable. He knows she will not kill him; the gesture demonstrates control while performing surrender.\" },\n      { name: \"Oxymoron (\\u2018Arise, dissembler\\u2019)\", effect: \"Anne\\u2019s \\u2018Arise, dissembler\\u2019 is a crucial word: she knows Richard is performing, she names the performance \\u2014 yet she still drops the sword. Her knowledge does not protect her.\" }\n    ],\n    context: [\n      \"The stage business here is central to the scene\\u2019s meaning. Anne raises the sword but cannot use it \\u2014 her hesitation is Richard\\u2019s victory. He has already demonstrated that her moral clarity cannot translate into action against his rhetoric.\",\n      \"Anne\\u2019s \\u2018Arise, dissembler\\u2019 is one of the play\\u2019s most important lines: it shows she is not deceived, she is coerced. There is a difference.\"\n    ]\n  },\n  \"26\": {\n    quote: \"\\u201cVouchsafe to wear this ring.\\u201d / \\u201cTo take is not to give.\\u201d\",\n    techniques: [\n      { name: \"Symbol (the ring)\", effect: \"The ring enacts enclosure and possession. Richard\\u2019s conceit \\u2014 \\u2018even so thy breast encloseth my poor heart\\u2019 \\u2014 frames Anne as already containing him, already bound. The symbol does ideological work: it presents possession as reciprocity.\" },\n      { name: \"Ambiguity (Anne\\u2019s response)\", effect: \"\\u2018To take is not to give\\u2019 is Anne\\u2019s most significant line: she accepts the token but withholds consent. She has not surrendered \\u2014 she has negotiated a fragile, coerced truce under extreme pressure.\" }\n    ],\n    context: [\n      \"Anne is not \\u2018won\\u2019 in any straightforward sense. She is alone, with Henry\\u2019s corpse, under sustained pressure from a man who has already killed her husband and father-in-law and is threatening the guard. Her departure with Richard is not a romantic outcome but a capitulation to power.\",\n      \"Anne\\u2019s final line insists on her agency even in defeat: she distinguishes between accepting and giving. The play invites us to remember this distinction.\"\n    ]\n  },\n  \"27\": {\n    quote: \"\\u201cWas ever woman in this humour woo\\u2019d? / Was ever woman in this humour won?\\u201d\",\n    techniques: [\n      { name: \"Rhetorical Questions (Self-Admiration)\", effect: \"The questions are not requests for an answer but celebrations of Richard\\u2019s own achievement. His marvelling at himself is both comic and chilling \\u2014 he is his own audience, his own judge.\" },\n      { name: \"Return to Opening Sun Imagery\", effect: \"\\u2018Shine out, fair sun, till I have bought a glass, / That I may see my shadow as I pass\\u2019 \\u2014 the sun motif from \\u2018this sun of York\\u2019 (1.1) is reprised and inverted: now Richard is the one who needs the sun to admire his own shadow. His narcissism is complete.\" },\n      { name: \"Meta-theatricality\", effect: \"Richard comments on his own performance as if watching a play: \\u2018Was ever woman in this humour woo\\u2019d?\\u2019 He is simultaneously actor and critic, a self-conscious performer who never forgets the audience \\u2014 including us.\" }\n    ],\n    context: [\n      \"The closing soliloquy is a masterpiece of comic self-aggrandisement: Richard finds Anne\\u2019s apparent consent so extraordinary that he begins to think he may actually be attractive. The joke \\u2014 \\u2018I\\u2019ll be at charges for a looking-glass\\u2019 \\u2014 returns us to his physical self-consciousness from the opening soliloquy, but now inflected with triumph rather than grievance.\",\n      \"\\u2018I\\u2019ll have her; but I will not keep her long\\u2019: his private calculation, stated baldly, strips the romance from every line he has just delivered. Anne is already marked as disposable. The audience\\u2019s complicity in enjoying Richard\\u2019s performance now turns uncomfortable.\"\n    ]\n  }\n};\nObject.assign(ANNOTATIONS, EXTRA_ANNOTATIONS);\n\n\n// ── PANEL LOGIC ──────────────────────────────────────────────\nlet currentAnn = null;\n\nfunction openAnnotation(id) {\n  const data = ANNOTATIONS[id];\n  if (!data) return;\n\n  if (currentAnn) {\n    document.querySelectorAll('.ann[data-ann=\"' + currentAnn + '\"]').forEach(function(el) { el.classList.remove('active-ann'); });\n  }\n\n  currentAnn = id;\n  document.querySelectorAll('.ann[data-ann=\"' + id + '\"]').forEach(function(el) { el.classList.add('active-ann'); });\n\n  // Quote\n  document.getElementById('panelQuote').textContent = data.quote;\n\n  // Techniques\n  var techHtml = '';\n  data.techniques.forEach(function(t) {\n    techHtml += '<div class=\"technique-row\">'\n      + '<span class=\"technique-name\">' + t.name + '<\u002Fspan>'\n      + '<span class=\"technique-sep\">—<\u002Fspan>'\n      + '<span class=\"technique-effect\">' + t.effect + '<\u002Fspan>'\n      + '<\u002Fdiv>';\n  });\n  document.getElementById('panelTechniques').innerHTML = techHtml;\n\n  // Context\n  var ctxHtml = '';\n  data.context.forEach(function(c) {\n    ctxHtml += '<p class=\"context-note\">' + c + '<\u002Fp>';\n  });\n  document.getElementById('panelContext').innerHTML = ctxHtml;\n\n  document.getElementById('panelEmpty').style.display = 'none';\n  document.getElementById('panelContent').classList.add('visible');\n  document.getElementById('annotationPanel').scrollTop = 0;\n}\n\nfunction closePanel() {\n  if (currentAnn) {\n    document.querySelectorAll('.ann[data-ann=\"' + currentAnn + '\"]').forEach(function(el) { el.classList.remove('active-ann'); });\n    currentAnn = null;\n  }\n  document.getElementById('panelEmpty').style.display = 'flex';\n  document.getElementById('panelContent').classList.remove('visible');\n}\n\ndocument.addEventListener('click', function(e) {\n  var annEl = e.target.closest('.ann');\n  if (annEl) {\n    var id = annEl.getAttribute('data-ann');\n    if (id === currentAnn) { closePanel(); } else { openAnnotation(id); }\n    return;\n  }\n  var panel = document.getElementById('annotationPanel');\n  var scriptCol = document.querySelector('.script-column');\n  if (!panel.contains(e.target) && !scriptCol.contains(e.target)) { closePanel(); }\n});\n\nfunction switchScene(id, btn) {\n  closePanel();\n  document.querySelectorAll('.scene-section').forEach(function(s) { s.classList.remove('active'); });\n  document.querySelectorAll('.scene-tab').forEach(function(b) { b.classList.remove('active'); });\n  document.querySelectorAll('.act-group-btn').forEach(function(b) { b.classList.remove('active'); });\n  document.getElementById(id).classList.add('active');\n  btn.classList.add('active');\n  // Highlight parent act group\n  var parentGroup = btn.closest('.act-group');\n  if (parentGroup) { parentGroup.querySelector('.act-group-btn').classList.add('active'); }\n}\n\nfunction toggleActGroup(id, btn) {\n  var el = document.getElementById(id);\n  var isOpen = el.style.display !== 'none';\n  el.style.display = isOpen ? 'none' : 'flex';\n  btn.querySelector('.act-caret').style.transform = isOpen ? '' : 'rotate(180deg)';\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
</body>
